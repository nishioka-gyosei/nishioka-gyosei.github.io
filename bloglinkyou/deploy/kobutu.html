  <script type="text/babel">
    const App = () => (
      <React.Fragment>
        <Header />

        <LPHero
          category="POLICE PERMIT · 古物商許可"
          breadcrumb="古物商許可"
          icon="♻️"
          title={<>中古品の売買を始めるなら、<br/>古物商許可は元警察官行政書士に任せる。</>}
          lead={<>中古車・リサイクルショップ・フリマ転売・せどり——<strong>「中古品を仕入れて売る」</strong>事業を行うには、古物営業法にもとづく許可が必要です。標準処理期間は約40日。申請書類の作成から警察署への提出まで、すべて代行します。</>}
          meta={[
            { label: '料金', value: '60,000', unit: '円〜' },
            { label: '対応エリア', value: '広島県全域' },
            { label: '標準処理', value: '約40', unit: '日' },
            { label: '初回相談', value: '0', unit: '円' },
          ]}
        />

        {/* 01 What */}
        <LPSection num="01" tone="cream" screenLabel="02 What">
          <Eyebrow>WHAT IS</Eyebrow>
          <SectionTitle>「古物商許可」とは何か。</SectionTitle>
          <Lead>
            <strong>古物営業法</strong>にもとづき、中古品（古物）を業として売買・交換する事業者に必要な許可です。盗品の流通を防ぐため、許可を受けた業者だけが古物営業を行えます。
          </Lead>
          <InfoCardGrid items={[
            { icon: '📅', title: '標準処理期間は約40日', body: '申請から許可までの標準処理期間は約40日。営業開始予定日から逆算してご準備ください。' },
            { icon: '🏛️', title: '提出先は所轄警察署', body: '営業所の所在地を管轄する警察署の生活安全課が窓口です。広島市中区なら広島中央警察署。' },
            { icon: '🌐', title: 'URL届出が追加で必要', body: 'メルカリ・ヤフオク・自社ECサイト等で販売する場合は、URLの届出も併せて必要になります。' },
            { icon: '⚠️', title: '無許可営業は罰則', body: '3年以下の懲役または100万円以下の罰金。「自分のものを売るだけ」でも、転売目的の仕入れがあれば必要です。' },
          ]} />
        </LPSection>

        {/* 02 Who */}
        <LPSection num="02" tone="white" screenLabel="03 Who">
          <Eyebrow>WHO NEEDS IT</Eyebrow>
          <SectionTitle>許可が必要な事業</SectionTitle>
          <Lead>「中古品を仕入れて、利益を出して売る」ことが業（継続反復）として行われるなら、原則すべて許可が必要です。個人でもオンラインでも同じです。</Lead>
          <InfoCardGrid items={[
            { icon: '🚗', title: '中古車販売店',          body: '中古車・バイクの仕入れ販売。最も古物商の登録が多い業態。' },
            { icon: '🛍️', title: 'リサイクルショップ',    body: '衣類・家電・書籍・雑貨等の中古品を買い取って販売。' },
            { icon: '💎', title: 'ブランド品・貴金属買取', body: '質屋・ブランド品買取専門店・金プラチナ買取店。' },
            { icon: '📱', title: 'フリマ転売・せどり',     body: 'メルカリ・ヤフオク・Amazon等での継続的な転売事業。' },
            { icon: '🎮', title: 'ゲーム・トレカ買取',     body: '中古ゲーム・トレーディングカード・フィギュア等の専門店。' },
            { icon: '🛠️', title: '中古工具・農機具',      body: '建設業の工具・農機具の中古売買。建設業者の二次収入として人気。' },
          ]} />
          <CTABand
            title="「これって古物商の対象？」迷ったら聞いてください。"
            sub="自分が販売したいものが13品目のどれに該当するか、判定が難しいケースが多いです。LINE で扱う品物の写真を1枚送ってください。"
          />
        </LPSection>

        {/* 03 13 categories */}
        <LPSection num="03" tone="cream" screenLabel="04 Categories">
          <Eyebrow>CATEGORIES</Eyebrow>
          <SectionTitle>古物の13品目</SectionTitle>
          <Lead>古物営業法では、扱う中古品が以下の13品目に分類されます。<strong>申請時に主たる品目を1つ選ぶ</strong>必要があり、後から追加することもできます。</Lead>
          <InfoCardGrid items={[
            { icon: '👕', title: '① 衣類',         body: '衣料品・帽子・カバン・寝具・敷物等。' },
            { icon: '💍', title: '② 美術品',       body: '絵画・書画・彫刻・骨董品等。' },
            { icon: '⌚', title: '③ 時計・宝飾品', body: '時計・宝石・貴金属・アクセサリー等。' },
            { icon: '🚗', title: '④ 自動車',       body: '自動車本体・タイヤ・カーオーディオ等の部品。' },
            { icon: '🏍️', title: '⑤ 自動二輪・原付', body: 'バイク・スクーター本体および部品。' },
            { icon: '🚲', title: '⑥ 自転車類',     body: '自転車本体および部品。' },
            { icon: '📷', title: '⑦ 写真機類',     body: 'カメラ・レンズ・望遠鏡・双眼鏡等。' },
            { icon: '📱', title: '⑧ 事務機器類',   body: 'パソコン・プリンタ・コピー機・電話機等。' },
            { icon: '🛠️', title: '⑨ 機械工具類',   body: '工作機械・電動工具・農機具・建設機械等。' },
            { icon: '🪑', title: '⑩ 道具類',       body: '家具・楽器・玩具・スポーツ用品・CD/DVD等。' },
            { icon: '📕', title: '⑪ 皮革・ゴム製品', body: 'カバン・財布・靴・ベルト等の皮革製品。' },
            { icon: '📚', title: '⑫ 書籍',         body: '雑誌・古本・コミック等。' },
            { icon: '🎫', title: '⑬ 金券類',       body: 'チケット・商品券・収入印紙・郵便切手等。' },
          ]} />
        </LPSection>

        {/* 04 Why ex-officer */}
        <LPSection num="04" tone="navy" screenLabel="05 Why">
          <Eyebrow>WHY EX-OFFICER</Eyebrow>
          <SectionTitle tone="white">古物商の窓口は警察。<br/>元警察官に任せるのが確実。</SectionTitle>
          <Lead tone="on-navy">
            古物商許可の窓口は警察署の生活安全課。広島県警察に13年勤務した私だからこそ、申請書類の細かい記載・URLの届出方法・営業所の管理者要件まで、確実に通る形で準備できます。
          </Lead>
          <QuoteBlock author="代表行政書士 西岡祐也（元広島県警察官）">
            古物商で多い不備は、URL届出書の添付漏れ・営業所と保管場所の住所の食い違い・略歴書の空白期間です。書類は揃っているように見えても、警察が見るポイントは決まっています。だから「最初の提出で受理」させられます。
          </QuoteBlock>
        </LPSection>

        {/* 05 Process */}
        <LPSection num="05" tone="cream" screenLabel="06 Process">
          <Eyebrow>PROCESS</Eyebrow>
          <SectionTitle>ご依頼から許可取得まで、<br/>約2ヶ月。</SectionTitle>
          <ProcessSteps steps={[
            {
              title: 'LINE / 電話でご相談',
              desc: <>扱う品目・営業所の住所・販売方法（実店舗 / オンライン）をお伺いします。<strong>初回相談は無料</strong>です。</>,
              duration: '当日〜翌営業日',
            },
            {
              title: 'お見積もりとご契約',
              desc: '内容に応じた正式お見積もりを提示。納得いただいてから着手します。',
              duration: '1日',
            },
            {
              title: '必要書類の収集',
              desc: <>住民票・身分証明書・<strong>登記されていないことの証明書</strong>・略歴書・誓約書 等。<strong>本人確認書類は全国どこの市町村のものでも対応</strong>します。</>,
              duration: '5〜7日',
            },
            {
              title: '営業所図面・URL情報の作成',
              desc: '営業所の使用承諾書・賃貸借契約書のコピー・営業所の見取図、ECサイト等のURL情報を整理します。',
              duration: '3〜5日',
            },
            {
              title: '警察署への申請',
              desc: '所轄警察署の生活安全課（防犯係）へ申請書を提出。手数料 19,000円（広島県収入証紙）が必要です。',
              duration: '即日',
            },
            {
              title: '許可証の交付',
              desc: <>標準処理期間は<strong>約40日</strong>。許可証と古物商プレートが交付され、営業を開始できます。プレートは営業所に掲示が必要です。</>,
              duration: '申請から約40日',
            },
          ]} />
        </LPSection>

        {/* 06 Pricing */}
        <LPSection num="06" tone="white" id="pricing" screenLabel="07 Pricing">
          <Eyebrow>PRICING</Eyebrow>
          <SectionTitle>料金プラン</SectionTitle>
          <Lead>申請書類の作成から警察署への提出まで、一括で対応します。</Lead>
          <PricingTable
            heading="古物商許可 一括代行プラン"
            price="¥60,000"
            priceNote="〜（税込）"
            rows={[
              { label: '許可申請書の作成', val: '含む' },
              { label: '営業所見取図の作成', val: '含む' },
              { label: 'URL届出書の作成', val: '含む' },
              { label: '添付書類（住民票・身分証明書・登記証明書 等）の取得代行', val: '実費別' },
              { label: '所轄警察署への申請代行', val: '含む' },
              { label: '広島県収入証紙（手数料）', val: '19,000円（実費）' },
              { label: '法人申請・複数営業所の場合', val: '別途お見積もり' },
            ]}
            note="※ 法人申請の場合は役員全員分の書類が必要となり、別途お見積もりとなります。複数の品目を扱う場合でも基本料金は変わりません。"
          />
        </LPSection>

        {/* 07 FAQ */}
        <LPSection num="07" tone="cream" screenLabel="08 FAQ">
          <Eyebrow>FAQ</Eyebrow>
          <SectionTitle>よくあるご質問</SectionTitle>
          <FAQ items={[
            {
              q: 'メルカリやヤフオクで自分の不要品を売るのにも許可が必要ですか？',
              a: '不要になった自分のものを売るだけなら不要です。ただし「転売目的で仕入れた」ものを売る場合は、回数や金額にかかわらず古物商許可が必要になります。年に数回のフリマ販売程度なら通常不要ですが、継続的なせどり・転売事業は明確に許可対象です。',
            },
            {
              q: '自宅を営業所として申請できますか？',
              a: '可能です。ただし賃貸の場合は大家さん（賃貸人）の使用承諾書、または賃貸借契約書で「事業利用可」が明示されている必要があります。マンション規約で事業利用が禁止されているケースもあるので、事前にご確認ください。',
            },
            {
              q: 'インターネットでのみ販売する予定です。実店舗は不要ですか？',
              a: 'はい、実店舗は必須ではありません。営業所（事務所）の住所さえあればOKです。ただしECサイトのURL届出が必要になります。複数のECサイトで販売する場合は、すべてのURLを届け出ます。',
            },
            {
              q: 'バイクや車を扱いたいです。何か追加の手続きはありますか？',
              a: '古物商許可（自動車・自動二輪の品目）で営業できます。ただし、買取りを行う場合は「自動車検査証 / 譲渡証明書」等の確認・保存義務、買取台帳の記載義務など、運用面で厳格な記録管理が求められます。記録方法もあわせてご案内します。',
            },
            {
              q: '複数の品目を扱う予定です。すべて申請できますか？',
              a: '13品目から複数選んで申請できます。基本料金は変わりません。ただし「主として取り扱う品目」は1つを選ぶ必要があります。後から品目を追加することもできます（変更届出が必要）。',
            },
            {
              q: '広島市外でも対応してもらえますか？',
              a: '広島県全域に対応します（呉市・東広島市・福山市・尾道市・三原市・廿日市市・安芸郡（海田町・熊野町）等）。県外の場合はご相談ください。',
            },
          ]} />
        </LPSection>

        {/* 08 Related */}
        <LPSection num="08" tone="white" screenLabel="09 Related">
          <Eyebrow>RELATED</Eyebrow>
          <SectionTitle>関連サービス</SectionTitle>
          <Lead>古物商許可とあわせてご依頼いただくケースが多いサービスです。</Lead>
          <RelatedLPs items={[
            { icon: '🏢', title: '会社設立',     price: '150,000円〜', href: 'kaisha-setsuritsu.html' },
            { icon: '💰', title: '創業融資サポート', price: '55,000円〜+成功報酬', href: 'sogyo-yushi.html' },
            { icon: '🌙', title: '深夜営業届出',  price: '77,000円〜', href: 'shinya-eigyou.html' },
            { icon: '🎤', title: '風営法許可',   price: '要見積もり', href: 'fueihou.html' },
          ]} />
        </LPSection>

        <Contact />
        <InfoStrip />
        <Footer />
        <FloatingLineCTA />
      </React.Fragment>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

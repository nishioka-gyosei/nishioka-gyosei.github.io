  <script type="text/babel">
    const App = () => (
      <React.Fragment>
        <Header />
        <LPHero
          category="POLICE PERMIT · 道路使用・占用許可"
          breadcrumb="道路使用・占用許可"
          icon="🚗"
          title={<>工事・足場・看板の道路使用、<br/>申請は元警察官行政書士に任せる。</>}
          lead={<>工事のための<strong>道路使用許可（警察）</strong>と、足場・看板等の<strong>道路占用許可（道路管理者）</strong>、両方が必要な現場が多くあります。広島県警察 13年の元警察官行政書士が、警察署・道路管理者の両方へ申請を代行します。建設業者からのセット依頼歓迎。</>}
          meta={[
            { label: '料金', value: '要見積もり' },
            { label: '対応エリア', value: '広島県全域' },
            { label: '標準処理', value: '約7〜14', unit: '日' },
            { label: '初回相談', value: '0', unit: '円' },
          ]}
        />

        <LPSection num="01" tone="cream" screenLabel="02 What">
          <Eyebrow>WHAT IS</Eyebrow>
          <SectionTitle>道路使用 vs 道路占用、<br/>2つの違い。</SectionTitle>
          <Lead>
            道路で何かをするには、目的に応じて<strong>2種類の許可</strong>のいずれか（または両方）が必要です。窓口も法律も異なります。
          </Lead>
          <InfoCardGrid items={[
            { icon: '🚨', title: '道路使用許可', body: <><strong>道路交通法 77条</strong>。<strong>警察署長</strong>が窓口。<strong>一時的</strong>に道路を使う行為（工事、撮影、イベント、街頭演説 等）が対象。</> },
            { icon: '🏛️', title: '道路占用許可', body: <><strong>道路法 32条</strong>。<strong>道路管理者</strong>（国・県・市）が窓口。<strong>継続的</strong>に道路に物を置く行為（足場、立看板、地下埋設物 等）が対象。</> },
            { icon: '🔁', title: '両方必要なケース', body: '足場を組んで工事する場合：道路占用許可（足場）+ 道路使用許可（工事）の両方が必要。並行申請が一般的。' },
            { icon: '⏱️', title: '標準処理期間', body: '道路使用許可は約7日、道路占用許可は2〜4週間。緊急対応はご相談ください。' },
          ]} />
        </LPSection>

        <LPSection num="02" tone="white" screenLabel="03 Who">
          <Eyebrow>WHO NEEDS IT</Eyebrow>
          <SectionTitle>許可が必要なケース</SectionTitle>
          <Lead>道路で「工事をする」「物を置く」「人を集める」場合は、ほぼ全てのケースで許可が必要です。</Lead>
          <InfoCardGrid items={[
            { icon: '🏗️', title: '建設工事',            body: '道路上での足場設置、資材搬入、生コン打設、舗装、解体工事等。建設業者の現場で必須。' },
            { icon: '📋', title: '看板・広告物の設置',  body: '電柱広告・突き出し看板・路上立て看板等。継続的な設置は道路占用許可が必要。' },
            { icon: '🚧', title: '電気・ガス・通信工事', body: '電柱の建替、配管工事、通信ケーブル敷設等。道路管理者と警察の両方の許可が必要。' },
            { icon: '🎉', title: 'イベント・撮影',      body: '商店街の祭り、街頭演説、テレビロケ、写真撮影、ロードレース等。' },
            { icon: '🛒', title: '路上販売',            body: '露店、ワゴン販売、キッチンカー出店等。条件が厳しいため事前確認が必須。' },
            { icon: '🚚', title: '駐車禁止除外',        body: '長時間の荷物搬入で駐車禁止場所に停める必要がある場合の「駐車許可」も対応可能。' },
          ]} />
        </LPSection>

        <LPSection num="03" tone="navy" screenLabel="04 Why">
          <Eyebrow>WHY EX-OFFICER</Eyebrow>
          <SectionTitle tone="white">道路使用許可の窓口は警察。<br/>その内側を知っています。</SectionTitle>
          <Lead tone="on-navy">
            道路使用許可は<strong>所轄警察署の交通課</strong>が窓口です。私は広島県警察に13年勤務した経験から、警察の判断基準・申請のコツ・差し戻されやすいポイントを内側から知っています。
          </Lead>
          <QuoteBlock author="代表行政書士 西岡祐也（元広島県警察官）">
            道路使用許可で多い不備は、図面の道路幅員の記載漏れ・交通誘導員の配置図のミス・通行止めの範囲の曖昧さです。警察側からすると「通行人の安全をどう確保するか」が最大の関心事。そこを押さえた図面を最初から作れるので、差し戻しがほぼありません。
          </QuoteBlock>
        </LPSection>

        <LPSection num="04" tone="cream" screenLabel="05 Process">
          <Eyebrow>PROCESS</Eyebrow>
          <SectionTitle>ご依頼から許可取得まで、<br/>約1〜3週間。</SectionTitle>
          <ProcessSteps steps={[
            { title: 'LINE / 電話でご相談', desc: <>工事内容・場所・期間をお伺いします。<strong>急ぎ案件はその場で対応可否をお伝えします</strong>。</>, duration: '当日〜翌営業日' },
            { title: '現地確認・お見積もり', desc: '道路の幅員、交通量、周辺施設を確認。道路使用 / 道路占用のどちらか（または両方）が必要か判定してお見積もり。', duration: '1〜3日' },
            { title: '図面・添付書類の作成', desc: <>位置図・現況図・<strong>占用・使用範囲を示した詳細図</strong>・交通誘導員の配置図・工程表 等。建設業者から提供される図面をベースに整えることもできます。</>, duration: '3〜7日' },
            { title: '警察署 / 道路管理者へ申請', desc: '警察署交通課（道路使用）と、道路管理者（県土木事務所 / 広島市道路整備課 等）へ並行申請。', duration: '即日' },
            { title: '審査・許可', desc: <>道路使用許可は<strong>約7日</strong>、道路占用許可は<strong>2〜4週間</strong>で交付。許可証を持参して現場開始できます。</>, duration: '申請から約7〜30日' },
          ]} />
          <CTABand
            title="工事日程がタイトでも、まずは相談を。"
            sub="建設業者の方は、現場が始まる前の段階でご相談ください。同時並行で進めれば、工程に支障が出ません。"
          />
        </LPSection>

        <LPSection num="05" tone="white" id="pricing" screenLabel="06 Pricing">
          <Eyebrow>PRICING</Eyebrow>
          <SectionTitle>料金プラン</SectionTitle>
          <Lead>工事の規模・必要許可の種類・申請先の数によって料金が変動するため、<strong>お見積もり制</strong>です。</Lead>
          <PricingTable
            heading="道路使用・占用許可 一括代行プラン"
            price="要見積もり"
            priceNote=""
            rows={[
              { label: '現地確認・要件チェック', val: '含む' },
              { label: '申請書・図面の作成', val: '含む' },
              { label: '添付書類の収集代行', val: '実費別' },
              { label: '警察署 / 道路管理者への申請', val: '含む' },
              { label: '警察手数料（道路使用）', val: '2,400円〜（実費）' },
              { label: '道路占用料', val: '案件により変動（実費）' },
              { label: '建設業者向けセット依頼', val: '別途お見積もり（割引あり）' },
            ]}
            note="※ 建設業許可とセットでご依頼の場合は、まとめてお見積もりさせていただきます。複数現場・継続案件の場合も別途お見積もり。"
          />
        </LPSection>

        <LPSection num="06" tone="cream" screenLabel="07 FAQ">
          <Eyebrow>FAQ</Eyebrow>
          <SectionTitle>よくあるご質問</SectionTitle>
          <FAQ items={[
            {
              q: '工事が来週から始まります。間に合いますか？',
              a: '道路使用許可は標準処理期間が約7日です。複雑でない案件であれば、数日で取得できる場合もあります。まずはお電話で状況をお伝えください。緊急対応の可否を即お返事します。',
            },
            {
              q: '足場を組む場合、どちらの許可が必要ですか？',
              a: '足場の継続的な設置は「道路占用許可」、足場を組む作業中の道路使用は「道路使用許可」が必要です。両方を並行申請するのが一般的。当事務所では両方とも一括代行します。',
            },
            {
              q: 'YouTubeの動画撮影でも道路使用許可は必要ですか？',
              a: '道路上で撮影機材を設置したり、通行人に影響を与える形での撮影は許可が必要です。短時間の手持ち撮影・通行の妨げにならない撮影は不要なケースもあります。撮影内容を伺った上で判定します。',
            },
            {
              q: '商店街のお祭りで道路を使う場合は？',
              a: '商店街のイベント・路上ライブ・露店出店等は、道路使用許可（場合により道路占用許可も）が必要です。主催団体の同意書・地域住民への周知方法 等の書類整備もサポートします。',
            },
            {
              q: '建設業許可とセットで依頼すると割引はありますか？',
              a: 'はい、建設業者向けのセット依頼割引をご用意しています。複数現場の継続案件、年間契約等もご相談ください。',
            },
            {
              q: '広島市外でも対応してもらえますか？',
              a: '広島県全域に対応します（呉市・東広島市・福山市・尾道市・三原市・廿日市市・安芸郡（海田町・熊野町）等）。県外の場合はご相談ください。',
            },
          ]} />
        </LPSection>

        <LPSection num="07" tone="white" screenLabel="08 Related">
          <Eyebrow>RELATED</Eyebrow>
          <SectionTitle>関連サービス</SectionTitle>
          <Lead>建設業のお客様にあわせてご依頼いただくケースが多いサービスです。</Lead>
          <RelatedLPs items={[
            { icon: '🏗️', title: '建設業許可',         price: '要見積もり', href: 'kensetsu.html' },
            { icon: '🏢', title: '会社設立',           price: '150,000円〜', href: 'kaisha-setsuritsu.html' },
            { icon: '💰', title: '創業融資サポート',   price: '55,000円〜+成功報酬', href: 'sogyo-yushi.html' },
            { icon: '♻️', title: '古物商許可',         price: '60,000円〜', href: 'kobutu.html' },
          ]} />
        </LPSection>

        <Contact />
        <InfoStrip />
        <Footer />
        <FloatingLineCTA />
      </React.Fragment>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

<meta property="og:description" content="キャバクラ・ガールズバー・ホストクラブの風営法1号許可を、元警察官の視点で代行。広島市中区。土日祝対応。">

<script type="application/ld+json">

  "@context": "https://schema.org",
  "@type": "Service",
  "serviceType": "風俗営業許可 申請代行",
  "provider": {
    "@type": "LegalService",
    "name": "西岡行政書士事務所",
    "url": "https://nishioka-gyosei.github.io/",
    "telephone": "+81-90-8068-8527",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "大手町4-6-22",
      "addressLocality": "広島市中区",
      "addressRegion": "広島県",

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>

<body>
  <div id="root"></div>

  <script type="text/babel" src="atoms.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="lp-sections.jsx"></script>

  <script type="text/babel">
    const App = () => (
      <React.Fragment>
        <Header />

        <LPHero
          category="POLICE PERMIT · 風営法許可"
          breadcrumb="風営法許可"
          icon="🎤"
          title={<>キャバクラ・ホスト・ガールズバー、<br/>風営法の許可は元警察官に任せる。</>}
          lead={<>接待を伴う飲食店（風営法1号）の許可は、図面・場所要件・人的要件のすべてが厳しく審査されます。<strong>標準処理期間は約55日</strong>。広島県警察 13年の経験から、何で却下されるかを知り尽くした行政書士が、最短ルートで許可取得まで導きます。</>}
          meta={[
            { label: '料金', value: '要見積もり' },
            { label: '対応エリア', value: '広島県全域' },
            { label: '標準処理', value: '約55', unit: '日' },
            { label: '初回相談', value: '0', unit: '円' },
          ]}
        />

        {/* 01 What ===== */}
        <LPSection num="01" tone="cream" screenLabel="02 What">
          <Eyebrow>WHAT IS</Eyebrow>
          <SectionTitle>「風俗営業」とは何か。</SectionTitle>
          <Lead>
            <strong>風俗営業等の規制及び業務の適正化等に関する法律</strong>（風営法）にもとづく許可です。
            風俗営業は1号〜5号に分類され、業態によって必要な許可が異なります。
          </Lead>
          <InfoCardGrid items={[
            { icon: '🎤', title: '1号 — 接待飲食店', body: 'キャバクラ・ホストクラブ・スナック（接待あり）・ガールズバー（接待あり）。最も件数が多い類型。' },
            { icon: '☕', title: '2号 — 低照度飲食店', body: '客席の照度が10ルクス以下の喫茶店・バー等。「暗いお店」が該当。' },
            { icon: '🛋️', title: '3号 — 区画席飲食店', body: '客席が他の客から見通しが困難な区画（5㎡以下）になっている飲食店。' },
            { icon: '🎰', title: '4号 — ぱちんこ・スロット', body: 'ぱちんこ店・スロット店・回胴式遊技機を設置する営業所。' },
            { icon: '🎮', title: '5号 — ゲームセンター等', body: '麻雀店・ゲームセンター・賭博性のある遊技機を設置する店舗。' },
            { icon: '🌙', title: '深夜営業届との違い', body: '接待なし・午前0時超えのみは「深夜営業届」。接待ありなら必ず1号の許可が必要。' },
          ]} />
        </LPSection>

        {/* 02 Who needs */}
        <LPSection num="02" tone="white" screenLabel="03 Who">
          <Eyebrow>WHO NEEDS IT</Eyebrow>
          <SectionTitle>1号許可が必要なお店</SectionTitle>
          <Lead>「接待」とは、お客様の話し相手・身体に触れる・お酌・カラオケでのデュエット・隣に座って盛り上げる等の行為。これらが「ある」のなら、必ず1号許可が必要です。</Lead>
          <InfoCardGrid items={[
            { icon: '🍸', title: 'キャバクラ・クラブ', body: '女性キャストがお客様の隣に座って接客するスタイル。1号許可必須。' },
            { icon: '🎩', title: 'ホストクラブ',         body: '男性キャストがお客様（主に女性）の隣で接客。1号許可必須。' },
            { icon: '🎤', title: 'スナック（接待あり）',  body: 'ママ・スタッフがお客様の隣に座る／カラオケで一緒に歌う場合。' },
            { icon: '🍷', title: 'ガールズバー（接待あり）', body: 'カウンター越しのみは原則届出だが、客席で接客があれば1号許可。' },
          ]} />
          <CTABand
            title="うちのスタイル、1号？ 深夜営業届？"
            sub="判断に迷うグレーゾーンが最も多い分野です。LINE で営業形態を1つ送ってください。元警察官の視点で即判定します。"
          />
        </LPSection>

        {/* 03 Why */}
        <LPSection num="03" tone="navy" screenLabel="04 Why">
          <Eyebrow>WHY EX-OFFICER</Eyebrow>
          <SectionTitle tone="white">広島県警察 13年の内側経験を、<br/>あなたの許可申請に。</SectionTitle>
          <Lead tone="on-navy">
            風営法1号は、図面・場所・人物・構造の<strong>すべて</strong>が審査対象。担当部署が「どこをどう見るか」を内側から知っているからこそ、提出前の段階で不備をゼロにできます。
          </Lead>
          <QuoteBlock author="代表行政書士 西岡祐也（元広島県警察官）">
            風営法1号は、許可までに2ヶ月かかります。差し戻されるとそこからまた2ヶ月。お店のオープンが2ヶ月遅れたら家賃・人件費だけで数百万円の損失です。だから「最初の提出で通す」ことが何より大事です。13年間、申請を受ける側にいた私だからこそ、それができます。
          </QuoteBlock>
        </LPSection>

        {/* 04 Requirements - distinctive section for this LP */}
        <LPSection num="04" tone="cream" screenLabel="05 Requirements">
          <Eyebrow>REQUIREMENTS</Eyebrow>
          <SectionTitle>許可の3つの要件</SectionTitle>
          <Lead>風営法1号許可は、以下のすべてを満たさないと取得できません。一つでも欠けると申請自体が出せないため、契約前のチェックが極めて重要です。</Lead>
          <InfoCardGrid items={[
            { icon: '📍', title: '場所的要件', body: '学校・病院・図書館等から半径100m以内は不可。用途地域も商業地域・近隣商業地域に限られます。物件選定の段階でチェックが必要。' },
            { icon: '🏗️', title: '構造的要件', body: '客室の床面積（1室16.5㎡以上または合計33㎡以上）、見通し障害（1m超の遮蔽物不可）、客室出入口の扉施錠不可、照度の確保 等。' },
            { icon: '👤', title: '人的要件', body: '申請者・管理者に欠格事由（過去5年以内の罰金以上・暴力団員等）がないこと。法人の場合は役員全員が対象。' },
          ]} />
          <CTABand
            title="物件が決まる前にご相談ください。"
            sub="場所要件をクリアしていない物件で契約してしまうと、許可が下りずに無駄になります。内見前の段階でチェックすれば、家賃ロスを防げます。"
          />
        </LPSection>

        {/* 05 Process */}
        <LPSection num="05" tone="white" screenLabel="06 Process">
          <Eyebrow>PROCESS</Eyebrow>
          <SectionTitle>ご依頼から許可取得まで、<br/>約2ヶ月。</SectionTitle>
          <ProcessSteps steps={[
            {
              title: 'LINE / 電話でご相談',
              desc: <>店舗の場所・業態・物件状況をお伺いします。<strong>物件契約前のご相談が最も効果的</strong>。場所要件のチェックもこの段階でできます。</>,
              duration: '当日〜翌営業日',
            },
            {
              title: '事前調査・お見積もり',
              desc: '物件の住所から場所要件（学校・病院から100m以内 等）を調査。物件が要件を満たしていれば正式お見積もり。',
              duration: '3〜5日',
            },
            {
              title: '現地調査と図面作成',
              desc: <>店舗にうかがって採寸。<strong>営業所平面図・求積図・客室求積図・照明配置図・音響設備配置図・営業所周辺見取図</strong> を作成。風営法の図面は深夜営業届より複雑です。</>,
              duration: '7〜10日',
            },
            {
              title: '添付書類の収集',
              desc: '住民票・身分証明書・登記されていないことの証明書・誓約書・賃貸借契約書・営業の方法・メニュー等。法人なら役員全員分が必要。',
              duration: '5〜7日',
            },
            {
              title: '警察署への申請',
              desc: '所轄警察署の生活安全課（風俗担当）へ申請書を提出。私が直接窓口対応。提出時の質疑も同席して対応します。',
              duration: '即日',
            },
            {
              title: '実地調査（警察）',
              desc: '警察官が実際に店舗を訪れ、図面通りの構造になっているか確認します。事前に対策方法をお伝えするので心配ありません。',
              duration: '申請後2〜3週間',
            },
            {
              title: '許可証の交付',
              desc: <>標準処理期間は<strong>約55日</strong>。許可証が交付された日から営業開始できます。許可証は店内に掲示が必要です。</>,
              duration: '申請から約55日',
            },
          ]} />
        </LPSection>

        {/* 06 Pricing */}
        <LPSection num="06" tone="cream" id="pricing" screenLabel="07 Pricing">
          <Eyebrow>PRICING</Eyebrow>
          <SectionTitle>料金プラン</SectionTitle>
          <Lead>店舗の規模・図面の複雑さ・法人/個人によって料金が変動するため、<strong>お見積もり制</strong>です。事前に正式な金額を提示し、ご納得いただいてから着手します。</Lead>
          <PricingTable
            heading="風俗営業1号許可 一括代行プラン"
            price="要見積もり"
            priceNote=""
            rows={[
              { label: '事前場所要件調査', val: '含む' },
              { label: '許可申請書の作成', val: '含む' },
              { label: '営業所周辺見取図・各種図面の作成', val: '含む' },
              { label: '添付書類（住民票・身分証明書・登記証明 等）の取得代行', val: '実費別' },
              { label: '所轄警察署への申請代行', val: '含む' },
              { label: '実地調査への立会い', val: '含む' },
              { label: '法人申請・複数店舗の場合', val: '別途お見積もり' },
            ]}
            note="※ 概算は料金シミュレーターでご確認いただけます（12万円〜）。店舗規模が大きい場合・法人申請の場合は別途お見積もり。事前のお見積もりに納得いただいてから着手するので、料金トラブルはありません。"
          />
        </LPSection>

        {/* 07 FAQ */}
        <LPSection num="07" tone="white" screenLabel="08 FAQ">
          <Eyebrow>FAQ</Eyebrow>
          <SectionTitle>よくあるご質問</SectionTitle>
          <FAQ items={[
            {
              q: 'まだ物件が決まっていません。相談できますか？',
              a: 'むしろ物件契約前のご相談を推奨します。場所要件（学校・病院から100m以内不可）や用途地域の制限があるため、契約後に「許可が下りない物件だった」と判明すると家賃が無駄になります。候補物件の住所を教えていただければ、その場で要件チェックします。',
            },
            {
              q: '過去に罰金刑を受けたことがあります。許可は取れますか？',
              a: '風営法では、過去5年以内に罰金以上の刑を受けた方は欠格事由に該当する場合があります。罪名・時期によって判断が分かれるため、詳細をお伺いした上で可能性をお伝えします。法人申請なら、欠格事由のない別の方を申請者にする選択肢もあります。',
            },
            {
              q: '個人事業と法人、どちらで申請すべきですか？',
              a: '将来の店舗拡大・税金対策・銀行融資の受けやすさを考えると法人が有利な場合が多いですが、設立費用が15〜25万円程度かかります。個人申請でも問題なく営業できます。会社設立とセットでご依頼いただくと、申請を並行して進められます。',
            },
            {
              q: 'オープン日が決まっています。間に合いますか？',
              a: '風営法1号は標準処理期間が約55日です。図面作成・書類収集に2〜3週間かかるため、ご依頼から営業開始まで合計2.5〜3ヶ月を見込んでください。オープン3ヶ月前のご相談を強く推奨します。',
            },
            {
              q: '深夜0時を超えて営業したいです。1号許可だけで営業できますか？',
              a: '原則、風営法1号は午前0時までの営業です（地域条例で延長可能な場合あり）。0時超えで営業したい場合は、業態を「接待なし」に変更して深夜営業届を別途出すか、地域の条例を確認する必要があります。営業時間の希望をお伺いした上で最適なプランをご提案します。',
            },
            {
              q: '広島市外でも対応してもらえますか？',
              a: '広島県全域に対応します（呉市・東広島市・福山市・尾道市・三原市・廿日市市・安芸郡（海田町・熊野町）等）。県外の場合はご相談ください。',
            },
          ]} />
        </LPSection>

        {/* 08 Related */}
        <LPSection num="08" tone="cream" screenLabel="09 Related">
          <Eyebrow>RELATED</Eyebrow>
          <SectionTitle>関連サービス</SectionTitle>
          <Lead>風営法許可とあわせてご依頼いただくケースが多いサービスです。</Lead>
          <RelatedLPs items={[
            { icon: '🌙', title: '深夜営業届出', price: '77,000円〜', href: 'shinya-eigyou.html' },
            { icon: '🏢', title: '会社設立',     price: '150,000円〜', href: 'kaisha-setsuritsu.html' },
            { icon: '🍺', title: '飲食店営業許可', price: '55,000円〜', href: 'inshokuten.html' },
            { icon: '💰', title: '創業融資サポート', price: '55,000円〜+成功報酬', href: 'sogyo-yushi.html' },
          ]} />
        </LPSection>

        <Contact />
        <InfoStrip />
        <Footer />
        <FloatingLineCTA />
      </React.Fragment>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script src="enhance.js"></script>
</body>

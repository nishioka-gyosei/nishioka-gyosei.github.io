<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); background: var(--navy); color: #fff; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
  .btn-primary { background: var(--gold); color: var(--navy); font-weight: 700; font-size: 14px; padding: 14px 28px; border-radius: 6px; display: inline-flex; align-items: center; gap: 8px; letter-spacing: 0.04em; font-family: var(--font-sans); border: none; cursor: pointer; }
  .btn-outline { border: 1px solid rgba(255,255,255,0.4); color: #fff; background: transparent; font-weight: 500; font-size: 14px; padding: 14px 28px; border-radius: 6px; display: inline-flex; align-items: center; gap: 8px; letter-spacing: 0.04em; font-family: var(--font-sans); cursor: pointer; }
  .btn-header { background: var(--gold); color: var(--navy); font-size: 12px; font-weight: 700; padding: 8px 16px; border-radius: 4px; letter-spacing: 0.05em; border: none; font-family: var(--font-sans); }
  .btn-line { background: #06C755; color: #fff; font-weight: 700; font-size: 13px; padding: 10px 20px; border-radius: 5px; display: inline-flex; align-items: center; gap: 8px; border: none; font-family: var(--font-sans); }
  .btn-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; color: var(--navy); background: #fff; border: 1px solid var(--border); padding: 5px 12px; border-radius: 4px; font-family: var(--font-sans); }
  .tag { font-family: var(--font-display); font-size: 9px; letter-spacing: 0.16em; color: rgba(255,255,255,0.5); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <button class="btn-primary">📱 LINE で無料相談</button>
    <button class="btn-outline">サービスを見る →</button>
    <span class="tag">Primary · Outline (hero pair)</span>
  </div>
  <div class="row">
    <button class="btn-header">無料相談する</button>
    <button class="btn-line">📱 LINE を開く</button>
    <a class="btn-link">詳しく見る →</a>
    <span class="tag">Header CTA · LINE · Card link</span>
  </div>
</body>
</html>

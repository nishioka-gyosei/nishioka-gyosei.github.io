<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Type — Numerals & Stats</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; font-family: var(--font-sans); background: var(--navy); color: #fff; }
  .row { display: flex; gap: 32px; align-items: flex-end; }
  .item { }
  .num { font-family: var(--font-display); font-weight: 700; font-size: 56px; color: var(--gold); line-height: 1; }
  .num span { font-size: 22px; }
  .label { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 4px; letter-spacing: 0.04em; }
  .reason-num { font-family: var(--font-display); font-weight: 700; font-size: 56px; color: rgba(201,168,76,0.25); line-height: 1; }
  .price { font-family: var(--font-display); font-size: 18px; color: var(--gold); font-weight: 500; letter-spacing: 0.04em; }
  .tag { font-family: var(--font-display); font-size: 9px; letter-spacing: 0.16em; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-top: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item">
      <div class="num">13<span>年</span></div>
      <div class="label">広島県警察 勤務</div>
    </div>
    <div class="item">
      <div class="num">0<span>円</span></div>
      <div class="label">初回相談 無料</div>
    </div>
    <div class="item">
      <div class="num">365<span>日</span></div>
      <div class="label">LINE相談 対応</div>
    </div>
    <div class="item">
      <div class="reason-num">01</div>
      <div class="label">理由番号</div>
    </div>
    <div class="item">
      <div class="price">77,000円〜</div>
      <div class="label">価格 (税込)</div>
    </div>
  </div>
  <div class="tag">All numerals: Oswald 700 — never Noto Sans</div>
</body>
</html>

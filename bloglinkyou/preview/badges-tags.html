<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Badges & Tags</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); background: var(--navy); color: #fff; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.4); color: var(--gold-light); font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 20px; letter-spacing: 0.08em; }
  .hero-badge::before { content: "●"; font-size: 8px; color: var(--gold); }
  .police-tag { background: var(--navy); color: #fff; font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: 4px; border-left: 3px solid var(--gold); border: 1px solid rgba(201,168,76,0.25); border-left: 3px solid var(--gold); }
  .service-label { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; color: #fff; background: var(--navy); display: inline-block; padding: 4px 14px; border-radius: 2px; border: 1px solid rgba(201,168,76,0.3); }
  .service-label.gold { background: var(--gold); color: var(--navy); border: none; }
  .sim-chip { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }
  .tag-label { font-family: var(--font-display); font-size: 9px; letter-spacing: 0.16em; color: rgba(255,255,255,0.45); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="hero-badge">元広島県警察官13年 ｜ 行政書士</div>
    <div class="hero-badge">EX-POLICE OFFICER</div>
    <span class="tag-label">Hero badge — gold tint pill</span>
  </div>
  <div class="row">
    <div class="police-tag">🚨 風俗営業許可（風営法）</div>
    <div class="police-tag">🌙 深夜営業届出</div>
    <div class="police-tag">♻️ 古物商許可</div>
    <span class="tag-label">Police-tag — gold left-bar</span>
  </div>
  <div class="row">
    <span class="service-label">警察窓口の申請</span>
    <span class="service-label gold">事業・開業サポート</span>
    <span class="sim-chip">約60秒</span>
    <span class="sim-chip">個人情報不要</span>
    <span class="sim-chip">完全無料</span>
    <span class="tag-label">Group labels · sim chips</span>
  </div>
</body>
</html>

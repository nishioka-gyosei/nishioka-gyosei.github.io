<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Header</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-sans); background: #f4f3ef; }
  .frame { background: var(--cream); padding: 40px 0; }
  header { background: rgba(13,31,60,0.97); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 60px; border-bottom: 1px solid rgba(201,168,76,0.3); max-width: 1200px; margin: 0 auto; border-radius: 6px; }
  .header-logo { font-family: var(--font-serif); font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 0.02em; line-height: 1.3; }
  .header-logo span { color: var(--gold); display: block; font-size: 9px; font-weight: 400; letter-spacing: 0.12em; }
  .header-nav { display: flex; gap: 18px; align-items: center; }
  .nav-link { color: rgba(255,255,255,0.65); font-size: 12px; text-decoration: none; }
  .header-cta { background: var(--gold); color: var(--navy); font-size: 12px; font-weight: 700; padding: 8px 16px; border-radius: 4px; letter-spacing: 0.05em; text-decoration: none; }
  .caption { text-align: center; font-family: var(--font-display); font-size: 9px; letter-spacing: 0.18em; color: var(--text-light); margin-top: 12px; text-transform: uppercase; }
</style>
</head>
<body>
<div class="frame">
  <header>
    <div class="header-logo">西岡行政書士事務所<span>NISHIOKA GYOSEI SHOSHI OFFICE</span></div>
    <div class="header-nav">
      <a class="nav-link">📚 コラム</a>
      <a class="header-cta">無料相談する</a>
    </div>
  </header>
  <div class="caption">fixed · 60px · navy 97% + 8px blur · gold border-bottom 30%</div>
</div>
</body>
</html>

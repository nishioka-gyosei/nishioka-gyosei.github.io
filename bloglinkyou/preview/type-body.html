<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Type — Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .lead { font-family: var(--font-sans); font-size: 15px; line-height: 1.85; color: var(--text-mid); max-width: 580px; margin-bottom: 14px; }
  .body { font-family: var(--font-sans); font-size: 14px; line-height: 1.85; color: var(--text-mid); max-width: 580px; margin-bottom: 14px; }
  .small { font-family: var(--font-sans); font-size: 12px; line-height: 1.7; color: var(--text-light); }
  .tag { font-family: var(--font-display); font-size: 10px; letter-spacing: 0.14em; color: var(--text-light); text-transform: uppercase; margin-left: 8px; vertical-align: middle; }
</style>
</head>
<body>
  <div class="lead">警察を知る行政書士が、あなたの許可を取る。窓口の審査担当者が何を見ているか、私は知っています。 <span class="tag">LEAD · 15px / 1.85</span></div>
  <div class="body">担当者の判断基準・審査の流れ・不備になりやすいポイント——内側から見てきたからこそ、最短で許可を取る方法がわかります。<span class="tag">BODY · 14px / 1.85</span></div>
  <div class="small">2026.05.03 ／ 元警察官の視点で解説 <span class="tag">SMALL · 12px / 1.7</span></div>
</body>
</html>

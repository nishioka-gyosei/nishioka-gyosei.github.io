<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Hero Pattern</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-sans); }
  .hero { background: var(--navy); padding: 40px 36px; position: relative; overflow: hidden; }
  .pattern { position: absolute; inset: 0; background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(201,168,76,0.06) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(201,168,76,0.06) 40px); pointer-events: none; }
  .badge { position: relative; display: inline-flex; align-items: center; gap: 8px; background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.4); color: var(--gold-light); font-size: 11px; padding: 5px 12px; border-radius: 20px; letter-spacing: 0.08em; margin-bottom: 14px; }
  .badge::before { content: "●"; font-size: 7px; color: var(--gold); }
  .display { position: relative; font-family: var(--font-display); font-weight: 700; font-size: 58px; color: #fff; line-height: 1; letter-spacing: -0.01em; margin-bottom: 6px; }
  .display span { color: var(--gold); }
  .jp { position: relative; font-family: var(--font-serif); font-weight: 700; font-size: 20px; color: rgba(255,255,255,0.92); margin-bottom: 18px; letter-spacing: 0.04em; }
  .copy { position: relative; font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.85; max-width: 460px; margin-bottom: 24px; }
  .copy strong { color: var(--gold-light); font-weight: 500; }
  .btns { position: relative; display: flex; gap: 10px; }
  .btn-p { background: var(--gold); color: var(--navy); font-weight: 700; font-size: 13px; padding: 12px 22px; border-radius: 6px; }
  .btn-o { border: 1px solid rgba(255,255,255,0.4); color: #fff; font-size: 13px; padding: 12px 22px; border-radius: 6px; }
</style>
</head>
<body>
<div class="hero">
  <div class="pattern"></div>
  <div class="badge">元広島県警察官13年 ｜ 行政書士</div>
  <div class="display">EX-POLICE<br>OFFICER<span>.</span></div>
  <div class="jp">警察を知る行政書士が、あなたの許可を取る。</div>
  <div class="copy">風営法・深夜営業届・道路使用許可・古物商許可——<strong>これらはすべて、警察が窓口の申請です。</strong>13年間、広島県警察に勤務した経験があるからこそ、窓口の審査担当者が何を見ているか、私は知っています。</div>
  <div class="btns">
    <div class="btn-p">📱 LINE で無料相談</div>
    <div class="btn-o">サービスを見る →</div>
  </div>
</div>
</body>
</html>

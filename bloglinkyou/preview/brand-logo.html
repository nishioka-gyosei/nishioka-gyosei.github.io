<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Brand — Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-sans); background: #fff; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; }
  .panel { padding: 20px 22px; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .panel.light { background: var(--cream); }
  .panel.dark { background: var(--navy); position: relative; overflow: hidden; }
  .panel.dark::before { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(201,168,76,0.06) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(201,168,76,0.06) 40px); pointer-events: none; }
  .panel.deep { background: var(--navy-deep); }
  .panel > * { position: relative; z-index: 1; }
  .mark { width: 96px; height: 96px; object-fit: contain; filter: drop-shadow(0 4px 14px rgba(0,0,0,0.25)); }
  .panel.dark .mark, .panel.deep .mark { filter: drop-shadow(0 4px 18px rgba(0,0,0,0.55)); }
  .label { font-family: var(--font-display); font-size: 10px; letter-spacing: 0.20em; text-transform: uppercase; color: var(--text-light); }
  .panel.dark .label, .panel.deep .label { color: rgba(255,255,255,0.55); }
</style>
</head>
<body>
<div class="grid">
  <div class="panel light">
    <img src="../assets/logo-transparent.png" class="mark" alt="">
    <div class="label">on cream</div>
  </div>
  <div class="panel dark">
    <img src="../assets/logo-transparent.png" class="mark" alt="">
    <div class="label">on navy</div>
  </div>
  <div class="panel deep">
    <img src="../assets/logo-transparent.png" class="mark" alt="">
    <div class="label">on deep</div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shadows & Borders</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 28px 36px; font-family: var(--font-sans); background: #f4f3ef; color: var(--text); }
  .row { display: flex; gap: 20px; align-items: flex-end; }
  .item { text-align: center; }
  .card { width: 170px; height: 90px; background: #fff; border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 11px; color: var(--navy); letter-spacing: 0.08em; }
  .card.shadow1 { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .card.shadow2 { box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
  .tok { font-family: var(--font-display); font-size: 10px; color: var(--navy); margin-top: 10px; letter-spacing: 0.10em; }
  .px { font-size: 11px; color: var(--text-light); margin-top: 2px; }
  .accent-card { width: 170px; height: 90px; background: #fff; border: 1px solid var(--border); border-radius: 8px; position: relative; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 11px; color: var(--navy); letter-spacing: 0.08em; }
  .accent-card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 50px; border-radius: 0 0 4px 0; background: var(--gold); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="card">FLAT</div><div class="tok">no shadow</div><div class="px">default</div></div>
    <div class="item"><div class="card shadow1">HOVER</div><div class="tok">--shadow-card</div><div class="px">0 2 8 / 6%</div></div>
    <div class="item"><div class="card shadow2">LIFTED</div><div class="tok">--shadow-lifted</div><div class="px">0 4 24 / 7%</div></div>
    <div class="item"><div class="accent-card">GOLD ACCENT</div><div class="tok">left-bar accent</div><div class="px">4×50 gold</div></div>
  </div>
</body>
</html>

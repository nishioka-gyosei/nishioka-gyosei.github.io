<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Color — Accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
  .swatch { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 90px; display: flex; align-items: flex-end; padding: 10px 12px; font-family: var(--font-display); letter-spacing: 0.06em; font-size: 11px; }
  .chip.on-navy { background: var(--navy); }
  .meta { padding: 10px 12px; background: #fff; }
  .meta .name { font-family: var(--font-serif); font-weight: 700; color: var(--navy); font-size: 13px; }
  .meta .hex { font-family: var(--font-display); font-size: 11px; color: var(--text-light); letter-spacing: 0.08em; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch">
      <div class="chip" style="background:#c9a84c;color:#0d1f3c">GOLD</div>
      <div class="meta"><div class="name">Gold</div><div class="hex">#C9A84C</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#e8c97a;color:#0d1f3c">GOLD LIGHT</div>
      <div class="meta"><div class="name">Gold Light</div><div class="hex">#E8C97A</div></div>
    </div>
    <div class="swatch">
      <div class="chip on-navy" style="color:#e8c97a"><span style="background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);padding:4px 10px;border-radius:20px">● GOLD TINT</span></div>
      <div class="meta"><div class="name">Gold Tint (on navy)</div><div class="hex">rgba(C9A84C / 12%)</div></div>
    </div>
    <div class="swatch">
      <div class="chip on-navy" style="border:1px solid rgba(201,168,76,0.4);color:rgba(255,255,255,0.5)">GOLD LINE 30%</div>
      <div class="meta"><div class="name">Gold Line</div><div class="hex">rgba(C9A84C / 30%)</div></div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Contact Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { border: 1px solid var(--border); border-radius: 8px; padding: 22px 20px; text-align: center; }
  .card.featured { background: var(--navy); border-color: var(--navy); }
  .ico { font-size: 26px; margin-bottom: 8px; }
  .title { font-family: var(--font-serif); font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .card.featured .title { color: var(--gold); }
  .desc { font-size: 12px; color: var(--text-light); line-height: 1.65; margin-bottom: 12px; }
  .card.featured .desc { color: rgba(255,255,255,0.55); }
  .action { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; font-weight: 700; padding: 10px 18px; border-radius: 5px; width: 100%; box-sizing: border-box; }
  .line-btn { background: #06C755; color: #fff; }
  .phone-btn { background: var(--cream); color: var(--navy); font-size: 17px; font-weight: 700; padding: 8px 18px; }
  .phone-btn small { font-size: 11px; font-weight: 400; color: var(--text-light); display: block; margin-top: 2px; }
</style>
</head>
<body>
<div class="grid">
  <div class="card featured">
    <div class="ico">💬</div>
    <div class="title">LINE で無料相談</div>
    <div class="desc">24時間受付・顔出し不要・相談だけでもOK。一番気軽なのはLINEです。</div>
    <div class="action line-btn">📱 LINE を開く</div>
  </div>
  <div class="card">
    <div class="ico">📞</div>
    <div class="title">電話でのお問い合わせ</div>
    <div class="desc">受付時間 9:00〜19:00（土日祝も対応可）</div>
    <div class="action phone-btn">090-8068-8527<small>タップで発信</small></div>
  </div>
</div>
</body>
</html>

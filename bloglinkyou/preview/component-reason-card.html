<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Reason Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); background: var(--cream); color: var(--text); }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 22px 20px; position: relative; }
  .num { font-family: var(--font-display); font-size: 42px; font-weight: 700; color: rgba(13,31,60,0.07); line-height: 1; margin-bottom: 8px; }
  .title { font-family: var(--font-serif); font-size: 14px; font-weight: 700; color: var(--navy); line-height: 1.45; margin-bottom: 8px; }
  .body { font-size: 12px; color: var(--text-mid); line-height: 1.75; }
  .accent { position: absolute; top: 0; left: 0; width: 4px; height: 50px; border-radius: 0 0 4px 0; background: var(--gold); }
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="accent"></div>
      <div class="num">01</div>
      <div class="title">警察への申請は、元警察官に任せるのが最速</div>
      <div class="body">風営法・深夜営業届など、警察が窓口の申請は審査基準が複雑です。内側を知っているから、最短で通します。</div>
    </div>
    <div class="card">
      <div class="accent"></div>
      <div class="num">02</div>
      <div class="title">土日祝・夜間も対応。昼間忙しい事業者のために。</div>
      <div class="body">受付時間9〜19時、土日祝も対応可。LINE相談は24時間受付。気軽に相談できます。</div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Iconography — Emoji System</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .item { text-align: center; padding: 10px 6px; border: 1px solid var(--border); border-radius: 8px; background: #fff; }
  .ico { font-size: 22px; line-height: 1; margin-bottom: 6px; }
  .lab { font-size: 10px; color: var(--text-mid); }
  .note { font-family: var(--font-display); font-size: 10px; letter-spacing: 0.16em; color: var(--text-light); text-transform: uppercase; margin-bottom: 12px; }
</style>
</head>
<body>
  <div class="note">Unicode emoji — the official icon set</div>
  <div class="grid">
    <div class="item"><div class="ico">🎤</div><div class="lab">風営法</div></div>
    <div class="item"><div class="ico">🚨</div><div class="lab">警察</div></div>
    <div class="item"><div class="ico">🌙</div><div class="lab">深夜営業</div></div>
    <div class="item"><div class="ico">🚗</div><div class="lab">道路使用</div></div>
    <div class="item"><div class="ico">♻️</div><div class="lab">古物商</div></div>
    <div class="item"><div class="ico">🛡️</div><div class="lab">警備業</div></div>
    <div class="item"><div class="ico">🏗️</div><div class="lab">建設業</div></div>
    <div class="item"><div class="ico">🏢</div><div class="lab">会社設立</div></div>
    <div class="item"><div class="ico">🍺</div><div class="lab">飲食店</div></div>
    <div class="item"><div class="ico">💰</div><div class="lab">創業融資</div></div>
    <div class="item"><div class="ico">📜</div><div class="lab">遺言</div></div>
    <div class="item"><div class="ico">🪦</div><div class="lab">墓じまい</div></div>
    <div class="item"><div class="ico">💴</div><div class="lab">料金</div></div>
    <div class="item"><div class="ico">💬</div><div class="lab">LINE</div></div>
    <div class="item"><div class="ico">📞</div><div class="lab">電話</div></div>
    <div class="item"><div class="ico">📚</div><div class="lab">コラム</div></div>
  </div>
</body>
</html>

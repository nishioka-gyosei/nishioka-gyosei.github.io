<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Color — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 90px; display: flex; align-items: flex-end; padding: 10px 12px; color: #fff; font-family: var(--font-display); letter-spacing: 0.06em; font-size: 11px; }
  .meta { padding: 10px 12px; background: #fff; }
  .meta .name { font-family: var(--font-serif); font-weight: 700; color: var(--navy); font-size: 13px; }
  .meta .hex { font-family: var(--font-display); font-size: 11px; color: var(--text-light); letter-spacing: 0.08em; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch">
      <div class="chip" style="background:#0d1f3c">NAVY</div>
      <div class="meta"><div class="name">Navy</div><div class="hex">#0D1F3C</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#1a3260">NAVY MID</div>
      <div class="meta"><div class="name">Navy Mid</div><div class="hex">#1A3260</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#243f7a">NAVY LIGHT</div>
      <div class="meta"><div class="name">Navy Light</div><div class="hex">#243F7A</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#081425">NAVY DEEP</div>
      <div class="meta"><div class="name">Navy Deep</div><div class="hex">#081425</div></div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Color — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 90px; display: flex; align-items: flex-end; padding: 10px 12px; font-family: var(--font-display); letter-spacing: 0.06em; font-size: 11px; color: #0d1f3c; }
  .meta { padding: 10px 12px; background: #fff; }
  .meta .name { font-family: var(--font-serif); font-weight: 700; color: var(--navy); font-size: 13px; }
  .meta .hex { font-family: var(--font-display); font-size: 11px; color: var(--text-light); letter-spacing: 0.08em; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch">
      <div class="chip" style="background:#ffffff;border-bottom:1px solid var(--border)">WHITE</div>
      <div class="meta"><div class="name">White</div><div class="hex">#FFFFFF</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#f8f5ef">CREAM</div>
      <div class="meta"><div class="name">Cream</div><div class="hex">#F8F5EF</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#efeae0">BORDER SOFT</div>
      <div class="meta"><div class="name">Border Soft</div><div class="hex">#EFEAE0</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#e0dbd0">BORDER</div>
      <div class="meta"><div class="name">Border</div><div class="hex">#E0DBD0</div></div>
    </div>
  </div>
</body>
</html>

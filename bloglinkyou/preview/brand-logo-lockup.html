<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Brand — Logo Lockup</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-sans); background: #fff; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; }
  .panel { padding: 28px 30px; min-height: 200px; display: flex; align-items: center; gap: 16px; }
  .panel.light { background: var(--cream); }
  .panel.dark { background: var(--navy); position: relative; overflow: hidden; }
  .panel.dark::before { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(201,168,76,0.06) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(201,168,76,0.06) 40px); pointer-events: none; }
  .panel > * { position: relative; z-index: 1; }
  .mark { width: 64px; height: 64px; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3)); }
  .panel.dark .mark { filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }
  .stack { line-height: 1.25; }
  .ja { font-family: var(--font-serif); font-weight: 700; font-size: 22px; letter-spacing: 0.04em; }
  .en { font-family: var(--font-display); font-weight: 500; font-size: 11px; letter-spacing: 0.18em; margin-top: 4px; }
  .light .ja { color: var(--navy); }
  .light .en { color: var(--gold); }
  .dark .ja { color: #fff; }
  .dark .en { color: var(--gold); }
  .meta { font-family: var(--font-display); font-size: 9px; letter-spacing: 0.16em; color: var(--text-light); text-transform: uppercase; margin-top: 10px; }
  .dark .meta { color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div class="grid">
  <div class="panel light">
    <img src="../assets/logo-transparent.png" class="mark" alt="">
    <div>
      <div class="stack">
        <div class="ja">西岡行政書士事務所</div>
        <div class="en">NISHIOKA GYOSEI SHOSHI OFFICE</div>
      </div>
      <div class="meta">Horizontal lockup · light</div>
    </div>
  </div>
  <div class="panel dark">
    <img src="../assets/logo-transparent.png" class="mark" alt="">
    <div>
      <div class="stack">
        <div class="ja">西岡行政書士事務所</div>
        <div class="en">NISHIOKA GYOSEI SHOSHI OFFICE</div>
      </div>
      <div class="meta">Horizontal lockup · dark</div>
    </div>
  </div>
</div>
</body>
</html>

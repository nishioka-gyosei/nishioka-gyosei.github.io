<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Brand — Founder</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); background: var(--navy); color: #fff; }
  .card { background: rgba(201,168,76,0.10); border: 1px solid rgba(201,168,76,0.30); border-radius: 8px; padding: 18px; display: grid; grid-template-columns: 110px 1fr; gap: 18px; align-items: center; }
  .photo { width: 110px; aspect-ratio: 1/1; border-radius: 6px; overflow: hidden; background: #fff; }
  .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .name-ja { font-family: var(--font-serif); font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 2px; }
  .name-en { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.14em; color: var(--gold); margin-bottom: 12px; }
  .career { padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
  .ci { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); margin-top: 7px; flex-shrink: 0; }
  .ct { font-size: 11px; color: rgba(255,255,255,0.72); line-height: 1.5; }
</style>
</head>
<body>
  <div class="card">
    <div class="photo"><img src="../assets/photo.jpg" alt="Yuya Nishioka"></div>
    <div>
      <div class="name-ja">西岡 祐也</div>
      <div class="name-en">YUYA NISHIOKA</div>
      <div class="career">
        <div class="ci"><div class="dot"></div><div class="ct">広島県警察 勤務 13年（交番・パトカー・鑑識等）</div></div>
        <div class="ci"><div class="dot"></div><div class="ct">行政書士試験 合格</div></div>
        <div class="ci"><div class="dot"></div><div class="ct">西岡行政書士事務所 開業 ／ 広島県行政書士会 所属</div></div>
      </div>
    </div>
  </div>
</body>
</html>

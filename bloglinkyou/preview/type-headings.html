<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Type — Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .eyebrow { font-family: var(--font-display); font-size: 11px; font-weight: 500; letter-spacing: 0.20em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .h1 { font-family: var(--font-serif); font-weight: 700; font-size: 32px; line-height: 1.4; color: var(--navy); margin-bottom: 6px; }
  .h2 { font-family: var(--font-serif); font-weight: 700; font-size: 24px; line-height: 1.5; color: var(--navy); margin-bottom: 6px; }
  .h3 { font-family: var(--font-serif); font-weight: 700; font-size: 16px; line-height: 1.4; color: var(--navy); }
  .tag { display:inline-block; font-family: var(--font-display); font-size: 9px; letter-spacing: 0.12em; color: var(--text-light); margin-left: 10px; vertical-align: middle; }
  .row { margin-bottom: 18px; }
</style>
</head>
<body>
  <div class="row">
    <div class="eyebrow">WHY EX-OFFICER <span class="tag" style="color:var(--text-light)">EYEBROW · Oswald 500 · 11px / 0.20em</span></div>
    <div class="h1">「元警察官の行政書士」が選ばれる、本当の理由。<span class="tag">H1 · Noto Serif JP 700 · 32px</span></div>
  </div>
  <div class="row">
    <div class="h2">取り扱い業務<span class="tag">H2 · Noto Serif JP 700 · 24px</span></div>
  </div>
  <div class="row">
    <div class="h3">風俗営業許可（風営法）<span class="tag">H3 · Noto Serif JP 700 · 16px</span></div>
  </div>
</body>
</html>

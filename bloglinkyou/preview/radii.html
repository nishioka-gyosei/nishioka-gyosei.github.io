<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .item { text-align: center; }
  .shape { width: 78px; height: 78px; background: var(--cream); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 11px; color: var(--navy); letter-spacing: 0.06em; }
  .tok { font-family: var(--font-display); font-size: 10px; color: var(--navy); margin-top: 8px; letter-spacing: 0.10em; }
  .px { font-size: 11px; color: var(--text-light); margin-top: 2px; }
  .pill { width: 110px; padding: 0 18px; border-radius: 999px; background: var(--navy); color: #c9a84c; height: 32px; display: inline-flex; align-items: center; gap: 6px; font-size: 11px; letter-spacing: 0.08em; border: 1px solid rgba(201,168,76,0.4); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="shape" style="border-radius:2px">2px</div><div class="tok">--radius-xs</div><div class="px">tabs / labels</div></div>
    <div class="item"><div class="shape" style="border-radius:4px">4px</div><div class="tok">--radius-sm</div><div class="px">small btn / tag</div></div>
    <div class="item"><div class="shape" style="border-radius:6px">6px</div><div class="tok">--radius-md</div><div class="px">primary button</div></div>
    <div class="item"><div class="shape" style="border-radius:8px">8px</div><div class="tok">--radius-lg</div><div class="px">card</div></div>
    <div class="item"><div class="shape" style="border-radius:12px">12px</div><div class="tok">--radius-xl</div><div class="px">large surface</div></div>
    <div class="item"><div class="shape" style="border-radius:14px">14px</div><div class="tok">--radius-2xl</div><div class="px">simulator card</div></div>
    <div class="item" style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:96px">
      <div class="pill">● HERO BADGE</div>
      <div class="tok">--radius-pill</div>
      <div class="px">badge / chip</div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Brand — Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-sans); background: #fff; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; }
  .panel { padding: 28px 32px; }
  .panel.light { background: var(--cream); }
  .panel.dark { background: var(--navy); }
  .logo-ja { font-family: var(--font-serif); font-size: 22px; font-weight: 700; letter-spacing: 0.04em; line-height: 1.2; margin-bottom: 4px; }
  .light .logo-ja { color: var(--navy); }
  .dark .logo-ja { color: #fff; }
  .logo-en { font-family: var(--font-display); font-size: 11px; font-weight: 500; letter-spacing: 0.18em; color: var(--gold); }
  .meta { font-family: var(--font-display); font-size: 9px; letter-spacing: 0.18em; color: var(--text-light); margin-top: 18px; text-transform: uppercase; }
  .dark .meta { color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div class="grid">
  <div class="panel light">
    <div class="logo-ja">西岡行政書士事務所</div>
    <div class="logo-en">NISHIOKA GYOSEI SHOSHI OFFICE</div>
    <div class="meta">On cream — primary wordmark</div>
  </div>
  <div class="panel dark">
    <div class="logo-ja">西岡行政書士事務所</div>
    <div class="logo-en">NISHIOKA GYOSEI SHOSHI OFFICE</div>
    <div class="meta">On navy — header & footer</div>
  </div>
</div>
</body>
</html>

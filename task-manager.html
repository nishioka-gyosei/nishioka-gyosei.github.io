<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="行政書士業務向けの案件・顧客・期限管理ダッシュボード。" />
  <title>ニシオカンリシステム | 行政書士案件管理</title>
  <style>
    :root {
      --bg: #eef3f8;
      --panel: #f8fafc;
      --card: #ffffff;
      --ink: #162033;
      --muted: #66758a;
      --line: #d9e2ee;
      --line-strong: #c3cedc;
      --navy: #111827;
      --blue: #2563eb;
      --blue-soft: #e8f0ff;
      --green: #059669;
      --green-soft: #dcfce7;
      --amber: #d97706;
      --amber-soft: #fef3c7;
      --red: #dc2626;
      --red-soft: #fee2e2;
      --purple: #7c3aed;
      --shadow: 0 18px 45px rgba(20, 33, 61, 0.08);
      --shadow-sm: 0 1px 3px rgba(20, 33, 61, 0.08);
      --radius: 10px;
      --radius-sm: 7px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1220;
        --panel: #111827;
        --card: #172033;
        --ink: #f8fafc;
        --muted: #9aa7b8;
        --line: #2d3a4f;
        --line-strong: #43536a;
        --navy: #f8fafc;
        --blue-soft: rgba(37, 99, 235, 0.18);
        --green-soft: rgba(5, 150, 105, 0.18);
        --amber-soft: rgba(217, 119, 6, 0.18);
        --red-soft: rgba(220, 38, 38, 0.18);
        --shadow: 0 18px 45px rgba(0, 0, 0, 0.32);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.08), transparent 32%),
        linear-gradient(315deg, rgba(5, 150, 105, 0.08), transparent 28%),
        var(--bg);
      color: var(--ink);
      line-height: 1.55;
      padding: 22px;
    }
    button, input, select, textarea { font: inherit; color: inherit; }
    button { cursor: pointer; }

    .app { max-width: 1440px; margin: 0 auto; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 20px;
      padding: 18px 20px;
      border: 1px solid rgba(217, 226, 238, 0.8);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    @media (prefers-color-scheme: dark) {
      .topbar { background: rgba(17, 24, 39, 0.82); border-color: var(--line); }
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 11px;
      background: var(--navy);
      color: var(--card);
      font-weight: 900;
      letter-spacing: 0;
      flex: 0 0 auto;
    }
    .brand h1 { font-size: 1.35rem; line-height: 1.2; letter-spacing: 0; }
    .brand p { color: var(--muted); font-size: 0.88rem; margin-top: 2px; }
    .today { color: var(--blue); font-weight: 800; white-space: nowrap; }

    .shell {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }
    .stack { display: flex; flex-direction: column; gap: 18px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .pad { padding: 18px; }
    .side-sticky { position: sticky; top: 18px; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .section-title { font-size: 1rem; font-weight: 900; }
    .hint { color: var(--muted); font-size: 0.78rem; font-weight: 700; }

    .tabs {
      display: flex;
      gap: 6px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
    }
    .tab-btn {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      background: transparent;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 800;
    }
    .tab-btn.active { background: var(--card); color: var(--ink); box-shadow: var(--shadow-sm); }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .metric {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--panel);
    }
    .metric-label { color: var(--muted); font-size: 0.75rem; font-weight: 800; }
    .metric-value { margin-top: 3px; font-size: 1.7rem; font-weight: 950; line-height: 1; }
    .metric.overdue .metric-value { color: var(--red); }
    .metric.today .metric-value { color: var(--amber); }
    .metric.client .metric-value { color: var(--blue); }

    .calendar-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .month-title { font-size: 1rem; font-weight: 900; }
    .icon-row { display: flex; gap: 6px; }
    .icon-btn {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--panel);
      font-weight: 900;
    }
    .icon-btn:hover, .btn-small:hover, .action-btn:hover { border-color: var(--line-strong); background: var(--blue-soft); }
    .calendar-tools { display: flex; gap: 8px; margin-bottom: 12px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .weekday { text-align: center; color: var(--muted); font-size: 0.72rem; font-weight: 850; padding-bottom: 6px; }
    .day {
      position: relative;
      aspect-ratio: 1;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: transparent;
      font-size: 0.84rem;
      font-weight: 800;
    }
    .day:hover { background: var(--panel); }
    .day.other { opacity: 0.34; }
    .day.today { color: var(--blue); background: var(--blue-soft); }
    .day.selected { color: #fff; background: var(--navy); }
    .dots { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); display: flex; gap: 2px; }
    .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--blue); }
    .dot.high { background: var(--red); }
    .dot.medium { background: var(--amber); }
    .dot.low { background: var(--green); }

    .btn-small, .action-btn {
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--panel);
      color: var(--muted);
      padding: 8px 11px;
      font-size: 0.8rem;
      font-weight: 850;
      transition: 0.16s;
      white-space: nowrap;
    }
    .btn-primary {
      border: none;
      border-radius: var(--radius-sm);
      background: var(--blue);
      color: #fff;
      padding: 11px 16px;
      font-weight: 900;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.18);
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-ghost { border: 1px solid transparent; background: transparent; color: var(--muted); padding: 10px 14px; font-weight: 850; }

    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .full { grid-column: 1 / -1; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    label { color: var(--muted); font-size: 0.8rem; font-weight: 850; }
    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--panel);
      padding: 10px 11px;
      outline: none;
      transition: 0.16s;
    }
    .textarea { min-height: 76px; resize: vertical; }
    .input:focus, .select:focus, .textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
      background: var(--card);
    }
    .inline-row { display: flex; gap: 8px; align-items: center; }
    .quick-dates { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .form-actions { display: flex; justify-content: flex-end; gap: 8px; padding-top: 12px; border-top: 1px solid var(--line); }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto auto auto;
      gap: 9px;
      margin-bottom: 14px;
      align-items: center;
    }
    .search { border-radius: 999px; }

    .list { display: grid; gap: 10px; }
    .case-card, .client-card, .dash-card {
      display: grid;
      gap: 8px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--line-strong);
      border-radius: var(--radius-sm);
      background: var(--card);
      padding: 13px;
      transition: 0.16s;
    }
    .case-card:hover, .client-card:hover, .dash-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
    .case-card.overdue, .dash-card.overdue { border-left-color: var(--red); }
    .case-card.today, .dash-card.today { border-left-color: var(--amber); }
    .case-card.future, .dash-card.future { border-left-color: var(--blue); }
    .case-card.completed { opacity: 0.68; background: var(--panel); }
    .case-card.archived, .client-card.archived { opacity: 0.58; background: var(--panel); }
    .case-top, .client-top, .dash-top { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
    .case-title, .client-name, .dash-title { font-weight: 950; line-height: 1.3; word-break: break-word; }
    .meta { color: var(--muted); font-size: 0.82rem; font-weight: 700; }
    .memo { color: var(--muted); font-size: 0.86rem; white-space: pre-wrap; }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      font-size: 0.73rem;
      font-weight: 850;
      white-space: nowrap;
    }
    .badge.overdue { color: var(--red); background: var(--red-soft); border-color: transparent; }
    .badge.today { color: var(--amber); background: var(--amber-soft); border-color: transparent; }
    .badge.future { color: var(--blue); background: var(--blue-soft); border-color: transparent; }
    .badge.done { color: var(--green); background: var(--green-soft); border-color: transparent; }
    .actions { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
    .empty {
      padding: 24px;
      text-align: center;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius-sm);
      background: var(--panel);
      color: var(--muted);
      font-weight: 850;
    }
    .dash-list { max-height: 420px; overflow: auto; padding-right: 4px; display: grid; gap: 8px; }
    .dash-card { width: 100%; text-align: left; }
    .hidden { display: none !important; }

    @media (max-width: 1180px) {
      .shell { grid-template-columns: 300px minmax(0, 1fr); }
      .right-col { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
      .right-col .card { margin: 0; }
    }
    @media (max-width: 860px) {
      body { padding: 14px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .shell { grid-template-columns: 1fr; }
      .side-sticky { position: static; }
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .toolbar .search { grid-column: 1 / -1; }
      .right-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .pad { padding: 14px; }
      .summary-grid, .form-grid, .toolbar { grid-template-columns: 1fr; }
      .form-actions, .inline-row { flex-direction: column; align-items: stretch; }
      .btn-primary, .btn-ghost { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">N</div>
        <div>
          <h1>ニシオカンリシステム</h1>
          <p>行政書士向け 案件・顧客・期限管理</p>
        </div>
      </div>
      <div class="today" id="todayLabel">----年--月--日</div>
    </header>

    <main class="shell">
      <aside class="stack side-sticky">
        <section class="card pad">
          <div class="calendar-head">
            <h2 class="month-title" id="calendarMonthLabel">----年 --月</h2>
            <div class="icon-row">
              <button class="icon-btn" id="prevMonthBtn" type="button" aria-label="前月へ">‹</button>
              <button class="icon-btn" id="nextMonthBtn" type="button" aria-label="翌月へ">›</button>
            </div>
          </div>
          <div class="calendar-tools">
            <button class="btn-small" id="todayBtn" type="button">今日</button>
            <button class="btn-small" id="clearDateFilterBtn" type="button">選択解除</button>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </section>

        <section class="card pad">
          <div class="section-head">
            <h2 class="section-title">データ管理</h2>
          </div>
          <div class="actions" style="justify-content:flex-start;">
            <button class="btn-small" id="exportJsonBtn" type="button">JSON保存</button>
            <button class="btn-small" id="importJsonBtn" type="button">JSON読込</button>
            <input class="hidden" id="importJsonInput" type="file" accept="application/json,.json" />
          </div>
        </section>
      </aside>

      <section class="stack">
        <section class="card pad">
          <div class="section-head">
            <h2 class="section-title">状況サマリー</h2>
            <div class="tabs">
              <button class="tab-btn active" type="button" data-view="cases">案件</button>
              <button class="tab-btn" type="button" data-view="clients">顧客</button>
            </div>
          </div>
          <div class="summary-grid" id="summaryGrid"></div>
        </section>

        <section class="card pad" id="caseFormCard">
          <div class="section-head">
            <h2 class="section-title" id="caseFormTitle">案件の登録</h2>
            <span class="hint">顧客リストと連動</span>
          </div>
          <form id="caseForm" class="form-grid">
            <div class="field full">
              <label for="caseTitleInput">タスク・案件名 *</label>
              <input id="caseTitleInput" class="input" type="text" placeholder="例：建設業許可 更新申請書の作成" required />
            </div>
            <div class="field">
              <label for="caseClientSelect">顧客</label>
              <div class="inline-row">
                <select id="caseClientSelect" class="select"></select>
                <button class="btn-small" id="newClientFromCaseBtn" type="button">新規</button>
              </div>
            </div>
            <div class="field">
              <label for="caseCategoryInput">業務カテゴリ</label>
              <select id="caseCategoryInput" class="select"></select>
            </div>
            <div class="field">
              <label for="caseStatusInput">案件ステータス</label>
              <select id="caseStatusInput" class="select"></select>
            </div>
            <div class="field">
              <label for="casePriorityInput">優先度</label>
              <select id="casePriorityInput" class="select">
                <option value="high">高 急ぎ</option>
                <option value="medium" selected>中 通常</option>
                <option value="low">低 後回し可</option>
              </select>
            </div>
            <div class="field">
              <label for="caseDateInput">提出・完了期限</label>
              <input id="caseDateInput" class="input" type="date" />
              <div class="quick-dates">
                <button type="button" class="btn-small qd-btn" data-days="0">今日</button>
                <button type="button" class="btn-small qd-btn" data-days="1">明日</button>
                <button type="button" class="btn-small qd-btn" data-days="7">1週間後</button>
                <button type="button" class="btn-small qd-btn" data-days="30">1ヶ月後</button>
              </div>
            </div>
            <div class="field full">
              <label for="caseMemoInput">メモ・備考</label>
              <textarea id="caseMemoInput" class="textarea" placeholder="必要書類、連絡履歴、補正内容など"></textarea>
            </div>
            <div class="form-actions full">
              <button id="cancelCaseEditBtn" class="btn-ghost" type="button" style="display:none;">キャンセル</button>
              <button id="submitCaseBtn" class="btn-primary" type="submit">保存する</button>
            </div>
          </form>
        </section>

        <section class="card pad hidden" id="clientFormCard">
          <div class="section-head">
            <h2 class="section-title" id="clientFormTitle">顧客の登録</h2>
            <span class="hint">案件作成時に選択可能</span>
          </div>
          <form id="clientForm" class="form-grid">
            <div class="field">
              <label for="clientNameInput">顧客名 *</label>
              <input id="clientNameInput" class="input" type="text" placeholder="株式会社〇〇 / 山田太郎" required />
            </div>
            <div class="field">
              <label for="clientTypeInput">区分</label>
              <select id="clientTypeInput" class="select">
                <option value="法人">法人</option>
                <option value="個人">個人</option>
                <option value="個人事業主">個人事業主</option>
              </select>
            </div>
            <div class="field">
              <label for="clientPersonInput">担当者</label>
              <input id="clientPersonInput" class="input" type="text" placeholder="担当者名" />
            </div>
            <div class="field">
              <label for="clientPhoneInput">電話</label>
              <input id="clientPhoneInput" class="input" type="tel" placeholder="090-0000-0000" />
            </div>
            <div class="field">
              <label for="clientEmailInput">メール</label>
              <input id="clientEmailInput" class="input" type="email" placeholder="mail@example.com" />
            </div>
            <div class="field">
              <label for="clientAddressInput">住所</label>
              <input id="clientAddressInput" class="input" type="text" placeholder="大阪府..." />
            </div>
            <div class="field full">
              <label for="clientMemoInput">顧客メモ</label>
              <textarea id="clientMemoInput" class="textarea" placeholder="紹介元、注意事項、請求条件など"></textarea>
            </div>
            <div class="form-actions full">
              <button id="cancelClientEditBtn" class="btn-ghost" type="button" style="display:none;">キャンセル</button>
              <button id="submitClientBtn" class="btn-primary" type="submit">保存する</button>
            </div>
          </form>
        </section>

        <section class="card pad" id="caseListCard">
          <div class="toolbar">
            <input id="caseSearchInput" class="input search" type="text" placeholder="案件・顧客・メモを検索..." />
            <select id="caseStatusFilter" class="select">
              <option value="active">未完了</option>
              <option value="all">すべて</option>
              <option value="completed">完了</option>
              <option value="archived">保管</option>
            </select>
            <select id="caseCategoryFilter" class="select"></select>
            <select id="caseUrgencyFilter" class="select">
              <option value="all">期限すべて</option>
              <option value="overdue">期限超過</option>
              <option value="today">本日締切</option>
              <option value="future">今後の期限</option>
              <option value="none">期限なし</option>
            </select>
          </div>
          <div class="list" id="caseList"></div>
        </section>

        <section class="card pad hidden" id="clientListCard">
          <div class="toolbar" style="grid-template-columns:minmax(180px,1fr) auto;">
            <input id="clientSearchInput" class="input search" type="text" placeholder="顧客名・担当者・連絡先を検索..." />
            <select id="clientFilterInput" class="select">
              <option value="active">利用中</option>
              <option value="all">すべて</option>
              <option value="archived">保管</option>
            </select>
          </div>
          <div class="list" id="clientList"></div>
        </section>
      </section>

      <aside class="stack right-col side-sticky">
        <section class="card pad">
          <div class="section-head">
            <h2 class="section-title">優先案件</h2>
            <span class="hint">クリックで編集</span>
          </div>
          <div class="dash-list" id="dashboardList"></div>
        </section>
        <section class="card pad">
          <div class="section-head">
            <h2 class="section-title">顧客クイックビュー</h2>
            <span class="hint">案件数順</span>
          </div>
          <div class="dash-list" id="clientQuickList"></div>
        </section>
      </aside>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "nishiokanri_system_v4";
    const legacyTaskKey = "admin_scrivener_task_app_v3";
    const categories = ["風営法許可", "建設業許可", "宅建業免許", "産廃収集運搬", "会社設立", "在留資格", "相続・遺言", "契約書作成", "その他"];
    const statuses = ["相談中", "書類待ち", "作成中", "申請済み", "補正対応中", "請求済み", "完了"];
    const priorityLabel = { high: "高", medium: "中", low: "低" };
    const statusDone = new Set(["完了"]);

    const state = {
      data: loadData(),
      view: "cases",
      currentMonth: startOfMonth(new Date()),
      selectedDate: "",
      editingCaseId: null,
      editingClientId: null,
      caseKeyword: "",
      clientKeyword: "",
      caseStatusFilter: "active",
      caseCategoryFilter: "all",
      caseUrgencyFilter: "all",
      clientFilter: "active"
    };

    const $ = id => document.getElementById(id);
    const el = {
      todayLabel: $("todayLabel"), calendarMonthLabel: $("calendarMonthLabel"), calendarGrid: $("calendarGrid"),
      summaryGrid: $("summaryGrid"), dashboardList: $("dashboardList"), clientQuickList: $("clientQuickList"),
      caseFormCard: $("caseFormCard"), clientFormCard: $("clientFormCard"), caseListCard: $("caseListCard"), clientListCard: $("clientListCard"),
      caseForm: $("caseForm"), clientForm: $("clientForm"), caseFormTitle: $("caseFormTitle"), clientFormTitle: $("clientFormTitle"),
      caseTitleInput: $("caseTitleInput"), caseClientSelect: $("caseClientSelect"), caseCategoryInput: $("caseCategoryInput"),
      caseStatusInput: $("caseStatusInput"), casePriorityInput: $("casePriorityInput"), caseDateInput: $("caseDateInput"), caseMemoInput: $("caseMemoInput"),
      clientNameInput: $("clientNameInput"), clientTypeInput: $("clientTypeInput"), clientPersonInput: $("clientPersonInput"),
      clientPhoneInput: $("clientPhoneInput"), clientEmailInput: $("clientEmailInput"), clientAddressInput: $("clientAddressInput"), clientMemoInput: $("clientMemoInput"),
      caseSearchInput: $("caseSearchInput"), clientSearchInput: $("clientSearchInput"), caseStatusFilter: $("caseStatusFilter"),
      caseCategoryFilter: $("caseCategoryFilter"), caseUrgencyFilter: $("caseUrgencyFilter"), clientFilterInput: $("clientFilterInput"),
      caseList: $("caseList"), clientList: $("clientList"), importJsonInput: $("importJsonInput"),
      cancelCaseEditBtn: $("cancelCaseEditBtn"), submitCaseBtn: $("submitCaseBtn"), cancelClientEditBtn: $("cancelClientEditBtn"), submitClientBtn: $("submitClientBtn")
    };

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          return {
            clients: (parsed.clients || []).map(normalizeClient),
            cases: (parsed.cases || parsed.tasks || []).map(normalizeCase)
          };
        }

        const legacy = localStorage.getItem(legacyTaskKey);
        if (legacy) {
          const tasks = JSON.parse(legacy).map(normalizeCase);
          const clients = [];
          tasks.forEach(item => {
            if (!item.clientName) return;
            let client = clients.find(c => c.name === item.clientName);
            if (!client) {
              client = normalizeClient({ name: item.clientName, type: "法人" });
              clients.push(client);
            }
            item.clientId = client.id;
          });
          return { clients, cases: tasks };
        }
      } catch {}
      return { clients: [], cases: [] };
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
    }

    function uid() { return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2); }
    function pad(n) { return String(n).padStart(2, "0"); }
    function toYMD(date) { return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`; }
    function parseYMD(ymd) { if (!ymd) return null; const [y, m, d] = ymd.split("-").map(Number); return new Date(y, m - 1, d); }
    function startOfMonth(date) { return new Date(date.getFullYear(), date.getMonth(), 1); }
    function escapeHtml(str) { return String(str || "").replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" })[m]); }
    function clientById(id) { return state.data.clients.find(c => c.id === id); }
    function clientName(id, fallback = "顧客未設定") { return clientById(id)?.name || fallback; }
    function formatDate(ymd) { const d = parseYMD(ymd); return d ? `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}` : "期限なし"; }
    function dateStatus(dueDate) {
      if (!dueDate) return "none";
      const today = toYMD(new Date());
      if (dueDate < today) return "overdue";
      if (dueDate === today) return "today";
      return "future";
    }
    function dateLabel(item) {
      const st = dateStatus(item.dueDate);
      if (st === "overdue") return "期限超過";
      if (st === "today") return "本日締切";
      if (st === "future") return `${formatDate(item.dueDate)}まで`;
      return "期限なし";
    }

    function normalizeClient(c) {
      return {
        id: c.id || uid(),
        name: c.name || c.client || "",
        type: c.type || "法人",
        person: c.person || "",
        phone: c.phone || "",
        email: c.email || "",
        address: c.address || "",
        memo: c.memo || "",
        archived: Boolean(c.archived),
        createdAt: c.createdAt || new Date().toISOString(),
        updatedAt: c.updatedAt || new Date().toISOString()
      };
    }

    function normalizeCase(item) {
      const status = item.status || (item.completed ? "完了" : "作成中");
      return {
        id: item.id || uid(),
        title: item.title || "",
        clientId: item.clientId || "",
        clientName: item.clientName || item.client || "",
        category: item.category || item.industry || "その他",
        status,
        priority: item.priority || "medium",
        dueDate: item.dueDate || "",
        memo: item.memo || "",
        completed: statusDone.has(status) || Boolean(item.completed),
        archived: Boolean(item.archived),
        createdAt: item.createdAt || new Date().toISOString(),
        updatedAt: item.updatedAt || new Date().toISOString()
      };
    }

    function sortCases(a, b) {
      if (a.archived !== b.archived) return a.archived ? 1 : -1;
      if (a.completed !== b.completed) return a.completed ? 1 : -1;
      if (!a.dueDate && b.dueDate) return 1;
      if (a.dueDate && !b.dueDate) return -1;
      if (a.dueDate !== b.dueDate) return a.dueDate > b.dueDate ? 1 : -1;
      const p = { high: 1, medium: 2, low: 3 };
      return (p[a.priority] || 2) - (p[b.priority] || 2);
    }

    function renderOptions() {
      el.caseCategoryInput.innerHTML = categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
      el.caseStatusInput.innerHTML = statuses.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("");
      el.caseCategoryFilter.innerHTML = `<option value="all">カテゴリすべて</option>` + categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
      el.caseClientSelect.innerHTML = `<option value="">顧客未設定</option>` + state.data.clients
        .filter(c => !c.archived)
        .sort((a, b) => a.name.localeCompare(b.name, "ja"))
        .map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join("");
    }

    function renderToday() {
      const now = new Date();
      const w = ["日", "月", "火", "水", "木", "金", "土"][now.getDay()];
      el.todayLabel.textContent = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日（${w}）`;
    }

    function renderSummary() {
      const cases = state.data.cases.filter(c => !c.archived);
      const active = cases.filter(c => !c.completed);
      const overdue = active.filter(c => dateStatus(c.dueDate) === "overdue");
      const today = active.filter(c => dateStatus(c.dueDate) === "today");
      const clients = state.data.clients.filter(c => !c.archived);
      const metrics = [
        ["進行中案件", active.length, ""],
        ["本日締切", today.length, "today"],
        ["期限超過", overdue.length, "overdue"],
        ["登録顧客", clients.length, "client"]
      ];
      el.summaryGrid.innerHTML = metrics.map(([label, value, cls]) => `
        <div class="metric ${cls}">
          <div class="metric-label">${label}</div>
          <div class="metric-value">${value}</div>
        </div>
      `).join("");
    }

    function renderCalendar() {
      const month = state.currentMonth;
      el.calendarMonthLabel.textContent = `${month.getFullYear()}年 ${month.getMonth() + 1}月`;
      const first = new Date(month.getFullYear(), month.getMonth(), 1);
      const start = new Date(first);
      start.setDate(1 - first.getDay());
      let html = ["日", "月", "火", "水", "木", "金", "土"].map(d => `<div class="weekday">${d}</div>`).join("");
      for (let i = 0; i < 42; i++) {
        const cell = new Date(start);
        cell.setDate(start.getDate() + i);
        const ymd = toYMD(cell);
        const cases = state.data.cases.filter(c => c.dueDate === ymd && !c.completed && !c.archived);
        const cls = ["day", cell.getMonth() !== month.getMonth() ? "other" : "", ymd === toYMD(new Date()) ? "today" : "", state.selectedDate === ymd ? "selected" : ""].filter(Boolean).join(" ");
        html += `<button class="${cls}" type="button" data-date="${ymd}" aria-label="${ymd}を選択">${cell.getDate()}<span class="dots">${cases.slice(0, 3).map(c => `<span class="dot ${c.priority}"></span>`).join("")}</span></button>`;
      }
      el.calendarGrid.innerHTML = html;
    }

    function filteredCases() {
      const kw = state.caseKeyword.trim().toLowerCase();
      return state.data.cases.filter(item => {
        const text = [item.title, item.memo, item.category, item.status, clientName(item.clientId, item.clientName)].join(" ").toLowerCase();
        let okStatus = true;
        if (state.caseStatusFilter === "active") okStatus = !item.completed && !item.archived;
        if (state.caseStatusFilter === "completed") okStatus = item.completed && !item.archived;
        if (state.caseStatusFilter === "archived") okStatus = item.archived;
        if (state.caseStatusFilter === "all") okStatus = !item.archived;
        return (!kw || text.includes(kw))
          && okStatus
          && (!state.selectedDate || item.dueDate === state.selectedDate)
          && (state.caseCategoryFilter === "all" || item.category === state.caseCategoryFilter)
          && (state.caseUrgencyFilter === "all" || dateStatus(item.dueDate) === state.caseUrgencyFilter);
      }).sort(sortCases);
    }

    function renderCases() {
      const items = filteredCases();
      if (!items.length) {
        el.caseList.innerHTML = `<div class="empty">該当する案件はありません。</div>`;
        return;
      }
      el.caseList.innerHTML = items.map(item => {
        const st = item.completed || item.archived ? "none" : dateStatus(item.dueDate);
        return `
          <article class="case-card ${st} ${item.completed ? "completed" : ""} ${item.archived ? "archived" : ""}" data-id="${item.id}">
            <div class="case-top">
              <div>
                <div class="case-title">${escapeHtml(item.title)}</div>
                <div class="meta">${escapeHtml(clientName(item.clientId, item.clientName || "顧客未設定"))}</div>
              </div>
              <div class="actions">
                ${item.archived ? `
                  <button class="action-btn" data-case-action="restore" data-id="${item.id}" type="button">復元</button>
                  <button class="action-btn" data-case-action="delete" data-id="${item.id}" type="button">削除</button>
                ` : `
                  <button class="action-btn" data-case-action="edit" data-id="${item.id}" type="button">編集</button>
                  <button class="action-btn" data-case-action="toggle" data-id="${item.id}" type="button">${item.completed ? "未完了" : "完了"}</button>
                  <button class="action-btn" data-case-action="archive" data-id="${item.id}" type="button">保管</button>
                `}
              </div>
            </div>
            ${item.memo ? `<div class="memo">${escapeHtml(item.memo)}</div>` : ""}
            <div class="badges">
              <span class="badge">${escapeHtml(item.status)}</span>
              <span class="badge">${escapeHtml(item.category)}</span>
              <span class="badge">優先度 ${priorityLabel[item.priority]}</span>
              <span class="badge ${st}">${dateLabel(item)}</span>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderDashboard() {
      const active = state.data.cases.filter(c => !c.completed && !c.archived).sort(sortCases).slice(0, 10);
      if (!active.length) {
        el.dashboardList.innerHTML = `<div class="empty">優先案件はありません。</div>`;
      } else {
        el.dashboardList.innerHTML = active.map(item => {
          const st = dateStatus(item.dueDate);
          return `
            <button class="dash-card ${st}" type="button" data-dashboard-id="${item.id}">
              <div class="dash-top">
                <div>
                  <div class="dash-title">${escapeHtml(item.title)}</div>
                  <div class="meta">${escapeHtml(clientName(item.clientId, item.clientName || "顧客未設定"))}</div>
                </div>
                <span class="badge ${st}">${dateLabel(item)}</span>
              </div>
            </button>
          `;
        }).join("");
      }

      const rows = state.data.clients.filter(c => !c.archived).map(c => {
        const count = state.data.cases.filter(item => item.clientId === c.id && !item.archived).length;
        const activeCount = state.data.cases.filter(item => item.clientId === c.id && !item.completed && !item.archived).length;
        return { ...c, count, activeCount };
      }).sort((a, b) => b.activeCount - a.activeCount || b.count - a.count).slice(0, 8);

      el.clientQuickList.innerHTML = rows.length ? rows.map(c => `
        <button class="dash-card" type="button" data-client-quick-id="${c.id}">
          <div class="dash-top">
            <div>
              <div class="dash-title">${escapeHtml(c.name)}</div>
              <div class="meta">${escapeHtml(c.person || c.type)} / 進行中 ${c.activeCount}件</div>
            </div>
            <span class="badge">${c.count}件</span>
          </div>
        </button>
      `).join("") : `<div class="empty">顧客が未登録です。</div>`;
    }

    function filteredClients() {
      const kw = state.clientKeyword.trim().toLowerCase();
      return state.data.clients.filter(c => {
        const text = [c.name, c.type, c.person, c.phone, c.email, c.address, c.memo].join(" ").toLowerCase();
        let ok = true;
        if (state.clientFilter === "active") ok = !c.archived;
        if (state.clientFilter === "archived") ok = c.archived;
        return ok && (!kw || text.includes(kw));
      }).sort((a, b) => a.name.localeCompare(b.name, "ja"));
    }

    function renderClients() {
      const clients = filteredClients();
      if (!clients.length) {
        el.clientList.innerHTML = `<div class="empty">該当する顧客はありません。</div>`;
        return;
      }
      el.clientList.innerHTML = clients.map(c => {
        const cases = state.data.cases.filter(item => item.clientId === c.id && !item.archived);
        const active = cases.filter(item => !item.completed);
        return `
          <article class="client-card ${c.archived ? "archived" : ""}" data-id="${c.id}">
            <div class="client-top">
              <div>
                <div class="client-name">${escapeHtml(c.name)}</div>
                <div class="meta">${escapeHtml(c.type)}${c.person ? " / " + escapeHtml(c.person) : ""}</div>
              </div>
              <div class="actions">
                ${c.archived ? `
                  <button class="action-btn" data-client-action="restore" data-id="${c.id}" type="button">復元</button>
                  <button class="action-btn" data-client-action="delete" data-id="${c.id}" type="button">削除</button>
                ` : `
                  <button class="action-btn" data-client-action="edit" data-id="${c.id}" type="button">編集</button>
                  <button class="action-btn" data-client-action="newCase" data-id="${c.id}" type="button">案件追加</button>
                  <button class="action-btn" data-client-action="archive" data-id="${c.id}" type="button">保管</button>
                `}
              </div>
            </div>
            <div class="meta">${escapeHtml([c.phone, c.email, c.address].filter(Boolean).join(" / ") || "連絡先未登録")}</div>
            ${c.memo ? `<div class="memo">${escapeHtml(c.memo)}</div>` : ""}
            <div class="badges">
              <span class="badge">案件 ${cases.length}件</span>
              <span class="badge ${active.length ? "future" : "done"}">進行中 ${active.length}件</span>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderAll() {
      renderOptions();
      renderToday();
      renderSummary();
      renderCalendar();
      renderCases();
      renderClients();
      renderDashboard();
      syncView();
    }

    function syncView() {
      const isCases = state.view === "cases";
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.view === state.view));
      el.caseFormCard.classList.toggle("hidden", !isCases);
      el.caseListCard.classList.toggle("hidden", !isCases);
      el.clientFormCard.classList.toggle("hidden", isCases);
      el.clientListCard.classList.toggle("hidden", isCases);
    }

    function resetCaseForm() {
      state.editingCaseId = null;
      el.caseForm.reset();
      el.caseFormTitle.textContent = "案件の登録";
      el.submitCaseBtn.textContent = "保存する";
      el.cancelCaseEditBtn.style.display = "none";
      el.caseStatusInput.value = "作成中";
      el.casePriorityInput.value = "medium";
      el.caseCategoryInput.value = categories[0];
      el.caseDateInput.value = state.selectedDate || "";
    }

    function resetClientForm() {
      state.editingClientId = null;
      el.clientForm.reset();
      el.clientFormTitle.textContent = "顧客の登録";
      el.submitClientBtn.textContent = "保存する";
      el.cancelClientEditBtn.style.display = "none";
      el.clientTypeInput.value = "法人";
    }

    function saveCase() {
      const title = el.caseTitleInput.value.trim();
      if (!title) return alert("案件名を入力してください。");
      const selectedClient = clientById(el.caseClientSelect.value);
      const status = el.caseStatusInput.value;
      const item = {
        title,
        clientId: selectedClient?.id || "",
        clientName: selectedClient?.name || "",
        category: el.caseCategoryInput.value,
        status,
        priority: el.casePriorityInput.value,
        dueDate: el.caseDateInput.value,
        memo: el.caseMemoInput.value.trim(),
        completed: statusDone.has(status),
        updatedAt: new Date().toISOString()
      };
      if (state.editingCaseId) {
        state.data.cases = state.data.cases.map(c => c.id === state.editingCaseId ? { ...c, ...item } : c);
      } else {
        state.data.cases.unshift({ id: uid(), archived: false, createdAt: new Date().toISOString(), ...item });
      }
      saveData();
      resetCaseForm();
      renderAll();
    }

    function saveClient() {
      const name = el.clientNameInput.value.trim();
      if (!name) return alert("顧客名を入力してください。");
      const item = {
        name,
        type: el.clientTypeInput.value,
        person: el.clientPersonInput.value.trim(),
        phone: el.clientPhoneInput.value.trim(),
        email: el.clientEmailInput.value.trim(),
        address: el.clientAddressInput.value.trim(),
        memo: el.clientMemoInput.value.trim(),
        updatedAt: new Date().toISOString()
      };
      if (state.editingClientId) {
        state.data.clients = state.data.clients.map(c => c.id === state.editingClientId ? { ...c, ...item } : c);
      } else {
        state.data.clients.unshift({ id: uid(), archived: false, createdAt: new Date().toISOString(), ...item });
      }
      saveData();
      resetClientForm();
      renderAll();
    }

    function editCase(id) {
      const item = state.data.cases.find(c => c.id === id);
      if (!item || item.archived) return;
      state.view = "cases";
      state.editingCaseId = id;
      el.caseFormTitle.textContent = "案件の編集";
      el.submitCaseBtn.textContent = "更新する";
      el.cancelCaseEditBtn.style.display = "inline-block";
      el.caseTitleInput.value = item.title;
      el.caseClientSelect.value = item.clientId || "";
      el.caseCategoryInput.value = item.category;
      el.caseStatusInput.value = item.status;
      el.casePriorityInput.value = item.priority;
      el.caseDateInput.value = item.dueDate;
      el.caseMemoInput.value = item.memo;
      renderAll();
      el.caseFormTitle.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function editClient(id) {
      const c = state.data.clients.find(item => item.id === id);
      if (!c || c.archived) return;
      state.view = "clients";
      state.editingClientId = id;
      el.clientFormTitle.textContent = "顧客の編集";
      el.submitClientBtn.textContent = "更新する";
      el.cancelClientEditBtn.style.display = "inline-block";
      el.clientNameInput.value = c.name;
      el.clientTypeInput.value = c.type;
      el.clientPersonInput.value = c.person;
      el.clientPhoneInput.value = c.phone;
      el.clientEmailInput.value = c.email;
      el.clientAddressInput.value = c.address;
      el.clientMemoInput.value = c.memo;
      renderAll();
      el.clientFormTitle.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function newCaseForClient(id) {
      state.view = "cases";
      resetCaseForm();
      el.caseClientSelect.value = id;
      renderAll();
      el.caseTitleInput.focus();
    }

    function toggleCase(id) {
      state.data.cases = state.data.cases.map(c => c.id === id ? { ...c, completed: !c.completed, status: !c.completed ? "完了" : "作成中", updatedAt: new Date().toISOString() } : c);
      saveData(); renderAll();
    }

    function archiveCase(id, archived = true) {
      state.data.cases = state.data.cases.map(c => c.id === id ? { ...c, archived, updatedAt: new Date().toISOString() } : c);
      saveData(); renderAll();
    }

    function archiveClient(id, archived = true) {
      state.data.clients = state.data.clients.map(c => c.id === id ? { ...c, archived, updatedAt: new Date().toISOString() } : c);
      saveData(); renderAll();
    }

    function deleteCase(id) {
      if (!confirm("保管済み案件を完全に削除しますか？")) return;
      state.data.cases = state.data.cases.filter(c => c.id !== id);
      saveData(); renderAll();
    }

    function deleteClient(id) {
      const linked = state.data.cases.some(c => c.clientId === id);
      if (linked) return alert("この顧客に紐づく案件があります。先に案件を別顧客へ変更するか保管してください。");
      if (!confirm("保管済み顧客を完全に削除しますか？")) return;
      state.data.clients = state.data.clients.filter(c => c.id !== id);
      saveData(); renderAll();
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify({ app: "ニシオカンリシステム", version: 4, exportedAt: new Date().toISOString(), ...state.data }, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `nishiokanri-backup-${toYMD(new Date())}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importJson(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          if (!confirm("現在のデータを読み込んだJSONで置き換えますか？")) return;
          state.data = {
            clients: (parsed.clients || []).map(normalizeClient),
            cases: (parsed.cases || parsed.tasks || []).map(normalizeCase)
          };
          saveData();
          resetCaseForm();
          resetClientForm();
          renderAll();
        } catch {
          alert("JSONの読み込みに失敗しました。");
        } finally {
          el.importJsonInput.value = "";
        }
      };
      reader.readAsText(file);
    }

    document.querySelectorAll(".tab-btn").forEach(btn => btn.addEventListener("click", () => { state.view = btn.dataset.view; syncView(); }));
    document.querySelectorAll(".qd-btn").forEach(btn => btn.addEventListener("click", () => {
      const d = new Date();
      d.setDate(d.getDate() + Number(btn.dataset.days));
      el.caseDateInput.value = toYMD(d);
    }));
    $("prevMonthBtn").addEventListener("click", () => { state.currentMonth.setMonth(state.currentMonth.getMonth() - 1); renderCalendar(); });
    $("nextMonthBtn").addEventListener("click", () => { state.currentMonth.setMonth(state.currentMonth.getMonth() + 1); renderCalendar(); });
    $("todayBtn").addEventListener("click", () => { state.currentMonth = startOfMonth(new Date()); state.selectedDate = toYMD(new Date()); el.caseDateInput.value = state.selectedDate; renderAll(); });
    $("clearDateFilterBtn").addEventListener("click", () => { state.selectedDate = ""; el.caseDateInput.value = ""; renderAll(); });
    el.calendarGrid.addEventListener("click", e => {
      const day = e.target.closest(".day");
      if (!day) return;
      state.selectedDate = state.selectedDate === day.dataset.date ? "" : day.dataset.date;
      el.caseDateInput.value = state.selectedDate;
      renderAll();
    });
    el.caseForm.addEventListener("submit", e => { e.preventDefault(); saveCase(); });
    el.clientForm.addEventListener("submit", e => { e.preventDefault(); saveClient(); });
    el.cancelCaseEditBtn.addEventListener("click", resetCaseForm);
    el.cancelClientEditBtn.addEventListener("click", resetClientForm);
    $("newClientFromCaseBtn").addEventListener("click", () => { state.view = "clients"; resetClientForm(); renderAll(); el.clientNameInput.focus(); });
    el.caseSearchInput.addEventListener("input", e => { state.caseKeyword = e.target.value; renderCases(); });
    el.clientSearchInput.addEventListener("input", e => { state.clientKeyword = e.target.value; renderClients(); });
    el.caseStatusFilter.addEventListener("change", e => { state.caseStatusFilter = e.target.value; renderCases(); });
    el.caseCategoryFilter.addEventListener("change", e => { state.caseCategoryFilter = e.target.value; renderCases(); });
    el.caseUrgencyFilter.addEventListener("change", e => { state.caseUrgencyFilter = e.target.value; renderCases(); });
    el.clientFilterInput.addEventListener("change", e => { state.clientFilter = e.target.value; renderClients(); });
    el.caseList.addEventListener("click", e => {
      const btn = e.target.closest("[data-case-action]");
      if (!btn) return;
      const id = btn.dataset.id;
      if (btn.dataset.caseAction === "edit") editCase(id);
      if (btn.dataset.caseAction === "toggle") toggleCase(id);
      if (btn.dataset.caseAction === "archive") archiveCase(id, true);
      if (btn.dataset.caseAction === "restore") archiveCase(id, false);
      if (btn.dataset.caseAction === "delete") deleteCase(id);
    });
    el.clientList.addEventListener("click", e => {
      const btn = e.target.closest("[data-client-action]");
      if (!btn) return;
      const id = btn.dataset.id;
      if (btn.dataset.clientAction === "edit") editClient(id);
      if (btn.dataset.clientAction === "newCase") newCaseForClient(id);
      if (btn.dataset.clientAction === "archive") archiveClient(id, true);
      if (btn.dataset.clientAction === "restore") archiveClient(id, false);
      if (btn.dataset.clientAction === "delete") deleteClient(id);
    });
    el.dashboardList.addEventListener("click", e => {
      const item = e.target.closest("[data-dashboard-id]");
      if (item) editCase(item.dataset.dashboardId);
    });
    el.clientQuickList.addEventListener("click", e => {
      const item = e.target.closest("[data-client-quick-id]");
      if (item) editClient(item.dataset.clientQuickId);
    });
    $("exportJsonBtn").addEventListener("click", exportJson);
    $("importJsonBtn").addEventListener("click", () => el.importJsonInput.click());
    el.importJsonInput.addEventListener("change", e => importJson(e.target.files[0]));

    resetCaseForm();
    resetClientForm();
    renderAll();
  </script>
</body>
</html>

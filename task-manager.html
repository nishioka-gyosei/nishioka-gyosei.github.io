<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="行政書士業務向けのタスク・顧客管理ダッシュボード。">
  <title>ニシオカンリシステム | 行政書士タスク管理</title>
  <style>
    :root {
      /* より洗練されたSaaS風のカラーパレット（ライトモード） */
      --bg: #f4f7fb;
      --bg2: #e9eef5;
      --card: #ffffff;
      --line: #e2e8f0;
      --text: #1e293b;
      --sub: #64748b;
      --primary: #0f172a;
      --accent: #3b82f6; 
      --accent-hover: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.025);
      --radius-xl: 16px;
      --radius-lg: 12px;
      --radius-md: 8px;
    }

    /* ダークモード */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --bg2: #1e293b;
        --card: #1e293b;
        --line: #334155;
        --text: #f8fafc;
        --sub: #94a3b8;
        --primary: #f8fafc;
        --accent: #3b82f6;
        --accent-hover: #60a5fa;
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
        --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.3);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background-color: var(--bg);
      min-height: 100vh;
      line-height: 1.5;
    }

    body { padding: 24px; }

    .app { max-width: 1280px; margin: 0 auto; }

    /* ヘッダー */
    .hero {
      margin-bottom: 24px;
      display: flex; justify-content: space-between; align-items: flex-end;
      flex-wrap: wrap; gap: 16px;
    }
    .hero-title { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em; color: var(--primary); }
    .hero-subtitle { color: var(--sub); font-size: 0.95rem; margin-top: 4px; }
    .today-badge {
      background: var(--card); color: var(--accent); padding: 8px 16px;
      border-radius: 999px; font-weight: 600; font-size: 0.9rem;
      box-shadow: var(--shadow-sm); border: 1px solid var(--line);
    }

    .layout { display: grid; grid-template-columns: 320px minmax(0, 1fr); gap: 24px; align-items: start; }

    .card {
      background: var(--card); border: 1px solid var(--line);
      box-shadow: var(--shadow-sm); border-radius: var(--radius-xl);
      margin-bottom: 24px; overflow: hidden;
    }

    .section-pad { padding: 20px 24px; }
    .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--primary); }

    /* カレンダー */
    .calendar-card { position: sticky; top: 24px; }
    .calendar-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .calendar-title { font-size: 1.1rem; font-weight: 700; }
    .icon-btn {
      width: 32px; height: 32px; border-radius: var(--radius-md); border: 1px solid var(--line);
      background: transparent; color: var(--text); cursor: pointer; display: grid; place-items: center;
      transition: 0.2s;
    }
    .icon-btn:hover { background: var(--bg2); }
    .calendar-tools { display: flex; gap: 8px; margin-bottom: 16px; }
    .btn-small { padding: 6px 12px; font-size: 0.8rem; border-radius: var(--radius-md); border: 1px solid var(--line); background: var(--bg); cursor: pointer; font-weight: 600; color: var(--sub); transition: 0.2s; }
    .btn-small:hover { background: var(--line); color: var(--text); }
    
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .weekday { text-align: center; color: var(--sub); font-size: 0.75rem; font-weight: 600; padding-bottom: 8px; }
    .day {
      aspect-ratio: 1; border-radius: var(--radius-md); display: flex; flex-direction: column;
      align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: 0.2s; border: 1px solid transparent; position: relative;
    }
    .day:hover { background: var(--bg2); }
    .day.other-month { opacity: 0.3; }
    .day.today { color: var(--accent); font-weight: 700; background: rgba(59, 130, 246, 0.1); }
    .day.selected { background: var(--primary); color: var(--bg); border-color: var(--primary); }
    .day-dots { position: absolute; bottom: 4px; display: flex; gap: 2px; }
    .dot { width: 4px; height: 4px; border-radius: 50%; }
    .dot.low { background: var(--success); } .dot.medium { background: var(--warning); } .dot.high { background: var(--danger); }

    /* ダッシュボード（進行中の全案件） */
    .dashboard-card { background: linear-gradient(to right bottom, var(--card), var(--bg2)); }
    
    .dash-list { display: grid; gap: 8px; max-height: 400px; overflow-y: auto; padding-right: 4px; }
    /* スクロールバーのスタイル */
    .dash-list::-webkit-scrollbar { width: 6px; }
    .dash-list::-webkit-scrollbar-thumb { background-color: var(--line); border-radius: 999px; }

    .dash-item {
      padding: 12px 16px; border-radius: var(--radius-lg); background: var(--card);
      border-left: 4px solid var(--line); display: flex; justify-content: space-between; align-items: center;
      box-shadow: var(--shadow-sm);
    }
    
    /* 期限ステータス別の左ボーダーカラー */
    .dash-item.overdue { border-left-color: var(--danger); }
    .dash-item.today { border-left-color: var(--warning); }
    .dash-item.future { border-left-color: var(--accent); }
    .dash-item.none { border-left-color: var(--sub); }

    .dash-item-main { min-width: 0; }
    .dash-item-title { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dash-item-client { font-size: 0.8rem; color: var(--sub); margin-top: 2px; }
    
    .dash-item-badge { font-size: 0.75rem; font-weight: 700; padding: 4px 8px; border-radius: 6px; white-space: nowrap; margin-left: 12px; }
    /* バッジのカラースタイル */
    .dash-item-badge.overdue { background: rgba(239,68,68,0.1); color: var(--danger); }
    .dash-item-badge.today { background: rgba(245,158,11,0.1); color: var(--warning); }
    .dash-item-badge.future { background: rgba(59,130,246,0.1); color: var(--accent); }
    .dash-item-badge.none { background: var(--bg2); color: var(--sub); }
    
    .dash-empty { padding: 16px; text-align: center; color: var(--success); font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(16, 185, 129, 0.05); border-radius: var(--radius-lg); border: 1px dashed rgba(16, 185, 129, 0.3); }

    /* フォーム */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .full-width { grid-column: 1 / -1; }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-label { font-size: 0.85rem; font-weight: 600; color: var(--sub); }
    
    .input, .select, .textarea {
      width: 100%; border: 1px solid var(--line); border-radius: var(--radius-md);
      background: var(--bg); padding: 12px; font-size: 0.95rem; color: var(--text);
      transition: all 0.2s; font-family: inherit;
    }
    .textarea { resize: vertical; min-height: 80px; }
    .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); background: var(--card); }
    
    /* 日付ワンタップボタン */
    .quick-dates { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .qd-btn { 
      padding: 4px 10px; font-size: 0.75rem; border-radius: 999px; border: 1px solid var(--line); 
      background: var(--card); color: var(--sub); cursor: pointer; transition: 0.2s; font-weight: 600; 
    }
    .qd-btn:hover { border-color: var(--accent); color: var(--accent); }

    .btn {
      border: none; cursor: pointer; padding: 12px 24px; border-radius: var(--radius-md);
      font-weight: 600; font-size: 0.95rem; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: var(--shadow-sm); }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-ghost { background: transparent; color: var(--sub); border: 1px solid transparent; }
    .btn-ghost:hover { background: var(--bg2); color: var(--text); }
    .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px; border-top: 1px solid var(--line); padding-top: 16px; }

    /* ツールバーとタスクリスト */
    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 20px; justify-content: space-between; }
    .search-input { flex: 1; min-width: 200px; padding: 10px 16px; border-radius: 999px; border: 1px solid var(--line); background: var(--bg); color: var(--text); font-size: 0.9rem; }
    .search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    .filter-group { display: flex; background: var(--bg); border-radius: 999px; padding: 4px; border: 1px solid var(--line); }
    .filter-btn { padding: 6px 16px; border-radius: 999px; border: none; background: transparent; color: var(--sub); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .filter-btn.active { background: var(--card); color: var(--text); box-shadow: var(--shadow-sm); }

    .task-list { display: grid; gap: 12px; }
    .task-item {
      display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: start;
      padding: 16px; border-radius: var(--radius-lg); background: var(--card); 
      border: 1px solid var(--line); transition: all 0.2s; box-shadow: var(--shadow-sm);
    }
    .task-item:hover { border-color: var(--sub); box-shadow: var(--shadow-md); }
    .task-item.overdue { border-left: 4px solid var(--danger); }
    .task-item.today { border-left: 4px solid var(--warning); }
    .task-item.completed { opacity: 0.5; background: var(--bg); box-shadow: none; }
    .task-item.completed .task-title { text-decoration: line-through; }

    .task-check { width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; margin-top: 2px; }
    .task-main { min-width: 0; }
    .task-client { font-size: 0.75rem; color: var(--accent); font-weight: 700; margin-bottom: 4px; display: inline-block; }
    .task-title { margin: 0 0 6px; font-size: 1.05rem; font-weight: 600; word-break: break-word; line-height: 1.3; }
    .task-memo { font-size: 0.85rem; color: var(--sub); margin-bottom: 12px; white-space: pre-wrap; display: none; }
    .task-memo.has-content { display: block; }
    
    .task-meta { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600;
      background: var(--bg2); color: var(--sub); border: 1px solid var(--line);
    }
    .badge.alert-overdue { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: transparent; }
    .badge.alert-today { background: rgba(245, 158, 11, 0.1); color: var(--warning); border-color: transparent; }

    .task-actions { display: flex; gap: 4px; flex-direction: column; }
    .act-btn { border: none; background: transparent; cursor: pointer; padding: 6px; border-radius: var(--radius-md); color: var(--sub); transition: 0.2s; display: grid; place-items: center; }
    .act-btn:hover { background: var(--bg2); color: var(--text); }
    .act-btn.delete:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

    .empty-state { padding: 40px 20px; text-align: center; color: var(--sub); font-size: 0.95rem; }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .calendar-card { position: static; }
      .form-grid { grid-template-columns: 1fr; }
      .task-actions { flex-direction: row; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <div>
        <!-- アプリ名を変更 -->
        <h1 class="hero-title">ニシオカンリシステム</h1>
        <p class="hero-subtitle">行政書士 業務・期限管理ダッシュボード</p>
      </div>
      <div class="today-badge" id="todayLabel">--/--/--</div>
    </header>

    <main class="layout">
      <!-- 左サイド：カレンダー -->
      <aside class="calendar-card">
        <div class="card section-pad">
          <div class="calendar-head">
            <h2 class="calendar-title" id="calendarMonthLabel">----年 --月</h2>
            <div style="display: flex; gap: 4px;">
              <button class="icon-btn" id="prevMonthBtn">‹</button>
              <button class="icon-btn" id="nextMonthBtn">›</button>
            </div>
          </div>
          <div class="calendar-tools">
            <button class="btn-small" id="todayBtn">今日</button>
            <button class="btn-small" id="clearDateFilterBtn">選択解除</button>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>
      </aside>

      <!-- 右サイド：メインコンテンツ -->
      <section style="display: flex; flex-direction: column; gap: 24px;">
        
        <!-- 全タスクを表示するダッシュボードに変更 -->
        <div class="card dashboard-card">
          <div class="section-pad">
            <h2 class="section-title">📋 進行中の全案件</h2>
            <div class="dash-list" id="dashboardList">
              <!-- JSで生成 -->
            </div>
          </div>
        </div>

        <!-- フォーム -->
        <div class="card">
          <div class="section-pad">
            <h2 class="section-title" id="formTitle">✏️ 案件の登録</h2>
            <div class="form-grid">
              
              <div class="input-group full-width">
                <label class="input-label">タスク・案件名 <span style="color:var(--danger)">*</span></label>
                <input id="taskTitleInput" class="input" type="text" placeholder="例：〇〇許可申請書の作成" />
              </div>
              
              <div class="input-group">
                <label class="input-label">顧客名</label>
                <input id="taskClientInput" class="input" type="text" placeholder="株式会社〇〇" />
              </div>
              
              <div class="input-group">
                <label class="input-label">業務カテゴリ</label>
                <select id="taskIndustryInput" class="select">
                  <option value="風営法許可">🍷 風営法許可</option>
                  <option value="建設業許可">🏗 建設業許可</option>
                  <option value="宅建業免許">🏠 宅建業免許</option>
                  <option value="産廃収集運搬">♻️ 産廃収集運搬</option>
                  <option value="会社設立">🏢 会社設立</option>
                  <option value="その他">📌 その他</option>
                </select>
              </div>

              <!-- ワンタップ日付入力を実装 -->
              <div class="input-group">
                <label class="input-label">提出・完了期限</label>
                <input id="taskDateInput" class="input" type="date" />
                <div class="quick-dates">
                  <button type="button" class="qd-btn" data-days="0">今日</button>
                  <button type="button" class="qd-btn" data-days="1">明日</button>
                  <button type="button" class="qd-btn" data-days="7">1週間後</button>
                  <button type="button" class="qd-btn" data-days="30">1ヶ月後</button>
                </div>
              </div>

              <div class="input-group">
                <label class="input-label">優先度</label>
                <select id="taskPriorityInput" class="select">
                  <option value="high">高 (急ぎ)</option>
                  <option value="medium" selected>中 (通常)</option>
                  <option value="low">低 (後回し可)</option>
                </select>
              </div>

              <div class="input-group full-width">
                <label class="input-label">メモ・備考</label>
                <textarea id="taskMemoInput" class="textarea" placeholder="連絡先や必要書類のメモ"></textarea>
              </div>
              
              <div class="form-actions full-width">
                <button id="cancelEditBtn" class="btn btn-ghost" type="button" style="display:none;">キャンセル</button>
                <button id="submitTaskBtn" class="btn btn-primary">保存する</button>
              </div>
            </div>
          </div>
        </div>

        <!-- タスク詳細一覧 -->
        <div class="card">
          <div class="section-pad">
            <div class="toolbar">
              <input id="searchInput" class="search-input" type="text" placeholder="🔍 案件・顧客を検索..." />
              <div class="filter-group">
                <button class="filter-btn active" data-filter="all">すべて</button>
                <button class="filter-btn" data-filter="active">未完了</button>
                <button class="filter-btn" data-filter="completed">完了</button>
              </div>
              <button class="btn-small" id="clearCompletedBtn">完了済みを削除</button>
            </div>
            <div class="task-list" id="taskList"></div>
          </div>
        </div>

      </section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "admin_scrivener_task_app_v2";

    const state = {
      tasks: loadTasks(),
      currentMonth: startOfMonth(new Date()),
      selectedDate: "",
      statusFilter: "all",
      keyword: "",
      editingId: null
    };

    const el = {
      todayLabel: document.getElementById("todayLabel"),
      calendarMonthLabel: document.getElementById("calendarMonthLabel"),
      calendarGrid: document.getElementById("calendarGrid"),
      dashboardList: document.getElementById("dashboardList"),
      formTitle: document.getElementById("formTitle"),
      taskTitleInput: document.getElementById("taskTitleInput"),
      taskClientInput: document.getElementById("taskClientInput"),
      taskDateInput: document.getElementById("taskDateInput"),
      taskIndustryInput: document.getElementById("taskIndustryInput"),
      taskPriorityInput: document.getElementById("taskPriorityInput"),
      taskMemoInput: document.getElementById("taskMemoInput"),
      submitTaskBtn: document.getElementById("submitTaskBtn"),
      cancelEditBtn: document.getElementById("cancelEditBtn"),
      searchInput: document.getElementById("searchInput"),
      taskList: document.getElementById("taskList"),
      filterButtons: Array.from(document.querySelectorAll(".filter-btn"))
    };

    function loadTasks() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
    function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks)); }
    function uid() { return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2); }
    function pad(n) { return String(n).padStart(2, "0"); }
    function toYMD(date) { return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`; }
    function parseYMD(ymd) { if (!ymd) return null; const [y, m, d] = ymd.split("-").map(Number); return new Date(y, m - 1, d); }
    function formatDateJP(ymd) { const dt = parseYMD(ymd); return dt ? `${dt.getMonth() + 1}月${dt.getDate()}日` : "期限なし"; }
    function startOfMonth(date) { return new Date(date.getFullYear(), date.getMonth(), 1); }
    function escapeHtml(str) { return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]); }

    function getDateStatus(dueDate) {
      if (!dueDate) return 'none';
      const todayYMD = toYMD(new Date());
      if (dueDate < todayYMD) return 'overdue';
      if (dueDate === todayYMD) return 'today';
      return 'future';
    }

    // クイック日付入力のイベント
    document.querySelectorAll('.qd-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const days = parseInt(e.target.dataset.days);
        const d = new Date();
        d.setDate(d.getDate() + days);
        el.taskDateInput.value = toYMD(d);
      });
    });

    function getFilteredTasks() {
      const keyword = state.keyword.trim().toLowerCase();
      return state.tasks.filter(task => {
        const matchKeyword = !keyword || 
          task.title.toLowerCase().includes(keyword) || 
          (task.memo && task.memo.toLowerCase().includes(keyword)) ||
          (task.client && task.client.toLowerCase().includes(keyword));
        const matchStatus = state.statusFilter === "all" || (state.statusFilter === "active" && !task.completed) || (state.statusFilter === "completed" && task.completed);
        const matchDate = !state.selectedDate || task.dueDate === state.selectedDate;
        return matchKeyword && matchStatus && matchDate;
      });
    }

    function renderTodayLabel() {
      const now = new Date();
      el.todayLabel.textContent = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日`;
    }

    function renderCalendar() {
      const monthDate = state.currentMonth;
      el.calendarMonthLabel.textContent = `${monthDate.getFullYear()}年 ${monthDate.getMonth() + 1}月`;
      const firstDay = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
      const startDate = new Date(firstDay); startDate.setDate(1 - firstDay.getDay());

      let html = ["日", "月", "火", "水", "木", "金", "土"].map(l => `<div class="weekday">${l}</div>`).join("");

      for (let i = 0; i < 42; i++) {
        const cellDate = new Date(startDate); cellDate.setDate(startDate.getDate() + i);
        const ymd = toYMD(cellDate); const tasks = state.tasks.filter(t => t.dueDate === ymd && !t.completed);
        const classes = ["day", cellDate.getMonth() !== monthDate.getMonth() ? "other-month" : "", ymd === toYMD(new Date()) ? "today" : "", state.selectedDate === ymd ? "selected" : ""].filter(Boolean).join(" ");
        const dots = tasks.slice(0, 3).map(t => `<span class="dot ${t.priority}"></span>`).join("");
        html += `<div class="${classes}" data-date="${ymd}">${cellDate.getDate()}<div class="day-dots">${dots}</div></div>`;
      }
      el.calendarGrid.innerHTML = html;
      el.calendarGrid.querySelectorAll(".day").forEach(dayEl => {
        dayEl.addEventListener("click", () => {
          state.selectedDate = state.selectedDate === dayEl.dataset.date ? "" : dayEl.dataset.date;
          el.taskDateInput.value = state.selectedDate;
          renderCalendar(); renderTasks();
        });
      });
    }

    // 進行中のすべての案件をダッシュボードに表示する
    function renderDashboard() {
      const activeTasks = state.tasks.filter(t => !t.completed);
      
      // 期限が近い順に並び替え（期限切れ → 今日 → 未来 → 期限なし）
      activeTasks.sort((a, b) => {
        if (!a.dueDate) return 1; // 期限なしは最後へ
        if (!b.dueDate) return -1;
        return a.dueDate > b.dueDate ? 1 : -1;
      });

      if (activeTasks.length > 0) {
        el.dashboardList.innerHTML = activeTasks.map(task => {
          const status = getDateStatus(task.dueDate);
          let badgeText = '期限なし';
          
          if (status === 'overdue') badgeText = '期限超過';
          else if (status === 'today') badgeText = '本日締切';
          else if (status === 'future') badgeText = formatDateJP(task.dueDate) + 'まで';

          return `
            <div class="dash-item ${status}">
              <div class="dash-item-main">
                <div class="dash-item-title">${escapeHtml(task.title)}</div>
                ${task.client ? `<div class="dash-item-client">${escapeHtml(task.client)}</div>` : ''}
              </div>
              <div class="dash-item-badge ${status}">${badgeText}</div>
            </div>
          `;
        }).join("");
      } else {
        el.dashboardList.innerHTML = `<div class="dash-empty">✨ 現在、進行中の案件はありません。</div>`;
      }
    }

    function renderTasks() {
      const filtered = getFilteredTasks();
      if (!filtered.length) {
        el.taskList.innerHTML = `<div class="empty-state">該当するタスクがありません。</div>`;
        return;
      }

      el.taskList.innerHTML = filtered.map(task => {
        const dateStatus = task.completed ? 'none' : getDateStatus(task.dueDate);
        return `
        <article class="task-item ${task.completed ? "completed" : ""} ${dateStatus}" data-id="${task.id}">
          <input class="task-check" type="checkbox" ${task.completed ? "checked" : ""} data-action="toggle" data-id="${task.id}" />
          <div class="task-main">
            ${task.client ? `<div class="task-client">${escapeHtml(task.client)}</div>` : ''}
            <h3 class="task-title">${escapeHtml(task.title)}</h3>
            <div class="task-memo ${task.memo ? 'has-content' : ''}">${task.memo ? escapeHtml(task.memo) : ''}</div>
            <div class="task-meta">
              <span class="badge">${escapeHtml(task.industry || 'その他')}</span>
              ${task.dueDate ? `<span class="badge alert-${dateStatus}">${parseYMD(task.dueDate).getFullYear()}/${parseYMD(task.dueDate).getMonth() + 1}/${parseYMD(task.dueDate).getDate()}</span>` : ''}
            </div>
          </div>
          <div class="task-actions">
            <button class="act-btn" data-action="edit" data-id="${task.id}" title="編集">✏️</button>
            <button class="act-btn delete" data-action="delete" data-id="${task.id}" title="削除">🗑</button>
          </div>
        </article>
      `}).join("");
      bindTaskEvents();
    }

    function bindTaskEvents() {
      el.taskList.querySelectorAll('[data-action="toggle"]').forEach(n => n.addEventListener("change", () => toggleTask(n.dataset.id)));
      el.taskList.querySelectorAll('[data-action="edit"]').forEach(n => n.addEventListener("click", () => startEdit(n.dataset.id)));
      el.taskList.querySelectorAll('[data-action="delete"]').forEach(n => n.addEventListener("click", () => deleteTask(n.dataset.id)));
    }

    function addOrUpdateTask() {
      const title = el.taskTitleInput.value.trim();
      if (!title) { alert("タスク名を入力してください"); return el.taskTitleInput.focus(); }
      
      const taskData = { 
        title, 
        client: el.taskClientInput.value.trim(),
        dueDate: el.taskDateInput.value, 
        priority: el.taskPriorityInput.value,
        industry: el.taskIndustryInput.value,
        memo: el.taskMemoInput.value.trim()
      };

      if (state.editingId) {
        state.tasks = state.tasks.map(t => t.id === state.editingId ? { ...t, ...taskData } : t);
      } else {
        state.tasks.unshift({ id: uid(), completed: false, createdAt: new Date().toISOString(), ...taskData });
      }
      saveTasks(); resetForm(); renderCalendar(); renderTasks(); renderDashboard();
    }

    function resetForm() {
      state.editingId = null; el.formTitle.innerHTML = "✏️ 案件の登録"; el.submitTaskBtn.innerHTML = "保存する";
      el.cancelEditBtn.style.display = "none"; 
      el.taskTitleInput.value = ""; el.taskClientInput.value = "";
      el.taskPriorityInput.value = "medium"; el.taskIndustryInput.value = "風営法許可"; 
      el.taskMemoInput.value = ""; el.taskDateInput.value = state.selectedDate || ""; 
    }

    function startEdit(id) {
      const task = state.tasks.find(t => t.id === id); if (!task) return;
      state.editingId = id; el.formTitle.innerHTML = "🔄 案件の編集"; el.submitTaskBtn.innerHTML = "更新する";
      el.cancelEditBtn.style.display = "inline-flex"; 
      el.taskTitleInput.value = task.title; el.taskClientInput.value = task.client || "";
      el.taskDateInput.value = task.dueDate || ""; el.taskPriorityInput.value = task.priority || "medium";
      el.taskIndustryInput.value = task.industry || "風営法許可"; el.taskMemoInput.value = task.memo || "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function toggleTask(id) {
      state.tasks = state.tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
      saveTasks(); renderTasks(); renderDashboard(); renderCalendar();
    }

    function deleteTask(id) {
      if (!confirm("本当に削除しますか？")) return;
      state.tasks = state.tasks.filter(t => t.id !== id);
      if (state.editingId === id) resetForm();
      saveTasks(); renderCalendar(); renderTasks(); renderDashboard();
    }

    // イベントリスナー
    document.getElementById("prevMonthBtn").addEventListener("click", () => { state.currentMonth.setMonth(state.currentMonth.getMonth() - 1); renderCalendar(); });
    document.getElementById("nextMonthBtn").addEventListener("click", () => { state.currentMonth.setMonth(state.currentMonth.getMonth() + 1); renderCalendar(); });
    document.getElementById("todayBtn").addEventListener("click", () => { state.currentMonth = startOfMonth(new Date()); state.selectedDate = toYMD(new Date()); el.taskDateInput.value = state.selectedDate; renderCalendar(); renderTasks(); });
    document.getElementById("clearDateFilterBtn").addEventListener("click", () => { state.selectedDate = ""; el.taskDateInput.value = ""; renderCalendar(); renderTasks(); });
    el.submitTaskBtn.addEventListener("click", addOrUpdateTask);
    el.cancelEditBtn.addEventListener("click", resetForm);
    el.searchInput.addEventListener("input", (e) => { state.keyword = e.target.value; renderTasks(); });
    document.getElementById("clearCompletedBtn").addEventListener("click", () => {
      if(confirm("完了済みを削除しますか？")) { state.tasks = state.tasks.filter(t => !t.completed); saveTasks(); renderCalendar(); renderTasks(); renderDashboard(); }
    });
    el.filterButtons.forEach(btn => btn.addEventListener("click", () => {
      state.statusFilter = btn.dataset.filter;
      el.filterButtons.forEach(b => b.classList.toggle("active", b === btn)); renderTasks();
    }));

    // 初期化
    renderTodayLabel(); renderCalendar(); renderTasks(); renderDashboard();
  </script>
</body>
</html>

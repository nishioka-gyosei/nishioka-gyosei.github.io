<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="行政書士業務向けのタスク・期限管理アプリ。カレンダー連動、顧客管理、業種分類に対応。">
  <title>行政書士向けタスク・顧客管理ダッシュボード</title>
  <style>
    :root {
      /* ライトモードのカラー */
      --bg: #f8fafc;
      --bg2: #f1f5f9;
      --card: rgba(255, 255, 255, 0.95);
      --line: #e2e8f0;
      --text: #0f172a;
      --sub: #64748b;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.05);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    /* ダークモードの自動切り替え */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --bg2: #1e293b;
        --card: rgba(30, 41, 59, 0.9);
        --line: #334155;
        --text: #f8fafc;
        --sub: #94a3b8;
        --primary: #3b82f6;
        --primary-dark: #60a5fa;
        --shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, var(--bg) 0%, var(--bg2) 100%);
      min-height: 100vh;
      transition: background 0.3s ease;
    }

    body { padding: 20px; }

    .app { max-width: 1240px; margin: 0 auto; }

    .hero {
      margin-bottom: 20px; padding: 24px 30px;
      border-radius: var(--radius-xl);
      background: var(--card);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
    }

    .hero-top { display: flex; gap: 18px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .hero h1 { margin: 0; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.05em; }
    .hero p { margin: 8px 0 0; color: var(--sub); font-size: 0.95rem; }

    .today-chip {
      background: var(--bg2); color: var(--primary);
      padding: 10px 18px; border-radius: 999px; font-weight: 700;
      border: 1px solid var(--line);
    }

    .layout {
      display: grid; grid-template-columns: 360px minmax(0, 1fr); gap: 20px; align-items: start;
    }

    .card {
      background: var(--card); border: 1px solid var(--line);
      box-shadow: var(--shadow); border-radius: var(--radius-xl);
      margin-bottom: 20px;
    }

    .section-pad { padding: 24px; }
    .section-title { margin: 0 0 16px; font-size: 1.15rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }

    /* ダッシュボード（リマインダー） */
    .dashboard {
      background: linear-gradient(135deg, rgba(239,68,68,0.1), rgba(245,158,11,0.05));
      border: 1px solid rgba(239,68,68,0.2);
    }
    .dash-list { display: flex; flex-direction: column; gap: 10px; }
    .dash-item {
      padding: 12px; border-radius: 12px; background: var(--card); border-left: 4px solid var(--danger);
      display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .dash-item.today { border-left-color: var(--warning); }
    .dash-item-title { font-weight: 700; font-size: 0.95rem; }
    .dash-item-client { font-size: 0.8rem; color: var(--sub); }
    .dash-item-date { font-size: 0.8rem; font-weight: 700; padding: 4px 8px; border-radius: 6px; }
    .dash-item-date.overdue { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .dash-item-date.today { background: rgba(245, 158, 11, 0.1); color: var(--warning); }

    /* カレンダー部分 */
    .calendar-card { position: sticky; top: 20px; }
    .calendar-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .calendar-title { margin: 0; font-size: 1.25rem; font-weight: 800; }
    
    .nav-row { display: flex; gap: 8px; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 12px; border: none; cursor: pointer;
      background: var(--bg2); color: var(--primary); font-weight: 800; font-size: 1.1rem;
      display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .icon-btn:hover { transform: translateY(-2px); filter: brightness(0.95); }

    .calendar-tools { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .btn {
      border: none; cursor: pointer; padding: 12px 20px; border-radius: 12px;
      font-weight: 700; font-size: 0.95rem; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 8px 15px rgba(37, 99, 235, 0.2); }
    .btn-soft { background: var(--bg2); color: var(--primary); }
    .btn-soft:hover { filter: brightness(0.95); }
    .btn-ghost { background: transparent; color: var(--sub); border: 1px solid var(--line); }
    .btn-ghost:hover { background: var(--bg2); }

    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .weekday { text-align: center; color: var(--sub); font-size: 0.8rem; font-weight: 700; padding-bottom: 8px; }
    .day {
      min-height: 70px; padding: 6px; border-radius: 12px; border: 1px solid var(--line);
      background: transparent; display: flex; flex-direction: column; gap: 4px; cursor: pointer; transition: all 0.2s;
    }
    .day:hover { background: var(--bg2); transform: scale(1.05); }
    .day.other-month { opacity: 0.3; }
    .day.today { outline: 2px solid var(--primary); outline-offset: -2px; }
    .day.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
    .day.selected .day-count { background: rgba(255,255,255,0.2); color: #fff; }

    .day-top { display: flex; justify-content: space-between; align-items: center; }
    .day-num { font-size: 0.9rem; font-weight: 800; }
    .day-count {
      min-width: 20px; height: 20px; border-radius: 50%; background: var(--bg2); color: var(--primary);
      font-size: 0.7rem; font-weight: 800; display: inline-flex; align-items: center; justify-content: center;
    }
    .day-dots { display: flex; flex-wrap: wrap; gap: 3px; margin-top: auto; }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot.low { background: var(--success); }
    .dot.medium { background: var(--warning); }
    .dot.high { background: var(--danger); }

    .selected-info { margin-top: 16px; padding: 14px; border-radius: 12px; background: var(--bg2); color: var(--sub); font-size: 0.9rem; line-height: 1.5; }

    /* フォーム部分 */
    .content-stack { display: flex; flex-direction: column; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .full-width { grid-column: 1 / -1; }
    
    .input, .select, .textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 12px;
      background: transparent; padding: 14px; font-size: 1rem; color: var(--text); font-family: inherit;
      transition: all 0.2s;
    }
    .textarea { resize: vertical; min-height: 80px; }
    .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
    .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }

    /* ツールバー＆統計 */
    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 20px; justify-content: space-between; }
    .search-wrap { flex: 1; min-width: 200px; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip-btn {
      padding: 8px 14px; border-radius: 999px; background: transparent; border: 1px solid var(--line);
      color: var(--sub); font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .chip-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* タスクリストとアニメーション */
    @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    
    .task-list { display: grid; gap: 14px; }
    .task-item {
      display: grid; grid-template-columns: auto auto 1fr auto; gap: 16px; align-items: start;
      padding: 18px; border-radius: 16px; background: var(--bg); border: 1px solid var(--line);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); animation: slideIn 0.4s ease forwards;
    }
    .task-item.overdue { border-left: 4px solid var(--danger); }
    .task-item.today { border-left: 4px solid var(--warning); }
    .task-item:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--primary); }
    .task-item.completed { opacity: 0.6; background: transparent; border-left: 1px solid var(--line); }
    .task-item.completed .task-title { text-decoration: line-through; color: var(--sub); }

    .task-check { width: 22px; height: 22px; accent-color: var(--success); cursor: pointer; margin-top: 2px; }
    .task-main { min-width: 0; }
    .task-title { margin: 0 0 6px; font-size: 1.1rem; font-weight: 700; word-break: break-word; }
    .task-client { font-size: 0.85rem; color: var(--primary-dark); font-weight: 700; margin-bottom: 6px; display: inline-flex; align-items: center; gap: 4px; background: rgba(37,99,235,0.1); padding: 2px 8px; border-radius: 6px; }
    .task-memo { font-size: 0.9rem; color: var(--sub); margin-bottom: 10px; white-space: pre-wrap; word-break: break-word; background: var(--bg2); padding: 10px; border-radius: 8px; display: none; }
    .task-memo.has-content { display: block; }
    
    .task-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .badge {
      display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 8px;
      font-size: 0.8rem; font-weight: 700; border: 1px solid var(--line); background: var(--bg2); color: var(--text);
    }
    .badge-industry { background: #e0e7ff; color: #3730a3; border-color: transparent; }
    .badge-date.overdue { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: transparent; }
    .badge-date.today { background: rgba(245, 158, 11, 0.1); color: var(--warning); border-color: transparent; }
    
    @media (prefers-color-scheme: dark) { .badge-industry { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; } }

    .task-actions { display: flex; gap: 8px; }
    .small-btn { border: none; cursor: pointer; padding: 8px 12px; border-radius: 10px; font-weight: 700; font-size: 0.85rem; transition: 0.2s; }
    .small-btn.edit { background: var(--bg2); color: var(--primary); }
    .small-btn.edit:hover { filter: brightness(0.9); }
    .small-btn.delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .small-btn.delete:hover { background: rgba(239, 68, 68, 0.2); }

    .empty { padding: 40px 20px; text-align: center; border: 2px dashed var(--line); border-radius: 16px; color: var(--sub); }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .calendar-card { position: static; }
      .task-item { grid-template-columns: auto 1fr; }
      .task-actions { grid-column: 1 / -1; justify-content: flex-end; margin-top: 8px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="hero-top">
        <div>
          <h1>💼 行政書士向け業務・タスク管理</h1>
          <p>顧客管理 / 業種別タグ / 期限・リマインダー / カレンダー連動</p>
        </div>
        <div class="today-chip" id="todayLabel">今日: --</div>
      </div>
    </header>

    <main class="layout">
      <!-- 左サイド：カレンダー -->
      <aside class="calendar-card">
        <div class="card section-pad">
          <div class="calendar-head">
            <h2 class="calendar-title" id="calendarMonthLabel">📅 ----</h2>
            <div class="nav-row">
              <button class="icon-btn" id="prevMonthBtn">‹</button>
              <button class="icon-btn" id="nextMonthBtn">›</button>
            </div>
          </div>
          <div class="calendar-tools">
            <button class="btn btn-soft" id="todayBtn">🎯 今日へ</button>
            <button class="btn btn-ghost" id="clearDateFilterBtn">🔄 選択解除</button>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
          <div class="selected-info" id="selectedInfo">日付を選択してタスクを絞り込みます。</div>
        </div>
      </aside>

      <!-- 右サイド：コンテンツ -->
      <section class="content-stack">
        
        <!-- 現在タスク一覧（ダッシュボード・リマインダー機能） -->
        <section class="card dashboard" id="dashboardArea" style="display:none;">
          <div class="section-pad">
            <h2 class="section-title">🚨 アラート：確認が必要なタスク</h2>
            <div class="dash-list" id="dashboardList"></div>
          </div>
        </section>

        <!-- 入力フォーム -->
        <section class="card">
          <div class="section-pad">
            <h2 class="section-title" id="formTitle">✨ 新しい案件・タスクを追加</h2>
            <div class="form-grid">
              <input id="taskTitleInput" class="input full-width" type="text" placeholder="📝 やること（例：申請書の作成）" />
              
              <!-- 顧客データ入力欄 -->
              <input id="taskClientInput" class="input" type="text" placeholder="👤 顧客名・会社名" />
              
              <input id="taskDateInput" class="input" type="date" title="提出・完了期限" />
              
              <!-- 行政書士向けの業種タグ -->
              <select id="taskIndustryInput" class="select">
                <option value="風営法許可">🍷 風営法許可</option>
                <option value="建設業許可">🏗 建設業許可</option>
                <option value="宅建業免許">🏠 宅建業免許</option>
                <option value="産廃収集運搬">♻️ 産廃収集運搬</option>
                <option value="会社設立">🏢 会社設立・法人化</option>
                <option value="ビザ・在留資格">🛂 ビザ・在留資格</option>
                <option value="補助金申請">💰 補助金・助成金申請</option>
                <option value="その他">📌 その他・一般業務</option>
              </select>

              <select id="taskPriorityInput" class="select">
                <option value="high">⏫ 優先度: 高 (急ぎ)</option>
                <option value="medium" selected>⏸ 優先度: 中 (通常)</option>
                <option value="low">⏬ 優先度: 低 (後回し可)</option>
              </select>

              <textarea id="taskMemoInput" class="textarea full-width" placeholder="🗒 顧客の連絡先、役所の担当窓口、必要な書類メモなどを記入（任意）"></textarea>
              
              <div class="form-actions full-width">
                <button id="cancelEditBtn" class="btn btn-ghost" type="button" style="display:none;">❌ キャンセル</button>
                <button id="submitTaskBtn" class="btn btn-primary">➕ タスクを追加</button>
              </div>
            </div>
          </div>
        </section>

        <!-- タスク一覧 -->
        <section class="card">
          <div class="section-pad">
            <div class="toolbar">
              <div class="search-wrap">
                <input id="searchInput" class="input" type="text" placeholder="🔍 タスク・顧客名・メモを検索..." style="padding: 10px 14px;" />
              </div>
              <div class="filter-row">
                <button class="chip-btn active" data-filter="all">すべて</button>
                <button class="chip-btn" data-filter="active">未完了</button>
                <button class="chip-btn" data-filter="completed">完了</button>
              </div>
              <button class="btn btn-ghost" id="clearCompletedBtn" style="padding: 8px 12px; font-size:0.85rem;">🗑 完了済み削除</button>
            </div>

            <h2 class="section-title" style="margin-bottom: 12px;">📋 タスク一覧 <span id="listCount" style="font-size:0.9rem; color:var(--sub); font-weight:normal;"></span></h2>
            <div class="task-list" id="taskList"></div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script>
    // データ衝突を防ぐための新しいキー
    const STORAGE_KEY = "admin_scrivener_task_app_v1";

    const state = {
      tasks: loadTasks(),
      currentMonth: startOfMonth(new Date()),
      selectedDate: "",
      statusFilter: "all",
      keyword: "",
      editingId: null
    };

    const el = {
      todayLabel: document.getElementById("todayLabel"),
      calendarMonthLabel: document.getElementById("calendarMonthLabel"),
      calendarGrid: document.getElementById("calendarGrid"),
      selectedInfo: document.getElementById("selectedInfo"),
      prevMonthBtn: document.getElementById("prevMonthBtn"),
      nextMonthBtn: document.getElementById("nextMonthBtn"),
      todayBtn: document.getElementById("todayBtn"),
      clearDateFilterBtn: document.getElementById("clearDateFilterBtn"),
      
      dashboardArea: document.getElementById("dashboardArea"),
      dashboardList: document.getElementById("dashboardList"),

      formTitle: document.getElementById("formTitle"),
      taskTitleInput: document.getElementById("taskTitleInput"),
      taskClientInput: document.getElementById("taskClientInput"), // 顧客追加
      taskDateInput: document.getElementById("taskDateInput"),
      taskIndustryInput: document.getElementById("taskIndustryInput"), // 業種追加
      taskPriorityInput: document.getElementById("taskPriorityInput"),
      taskMemoInput: document.getElementById("taskMemoInput"),
      submitTaskBtn: document.getElementById("submitTaskBtn"),
      cancelEditBtn: document.getElementById("cancelEditBtn"),
      
      searchInput: document.getElementById("searchInput"),
      clearCompletedBtn: document.getElementById("clearCompletedBtn"),
      taskList: document.getElementById("taskList"),
      listCount: document.getElementById("listCount"),
      filterButtons: Array.from(document.querySelectorAll(".chip-btn[data-filter]"))
    };

    function loadTasks() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
    function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks)); }
    function uid() { return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2); }
    function pad(n) { return String(n).padStart(2, "0"); }
    function toYMD(date) { return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`; }
    function parseYMD(ymd) { if (!ymd) return null; const [y, m, d] = ymd.split("-").map(Number); return new Date(y, m - 1, d); }
    function formatDateJP(ymd) { const dt = parseYMD(ymd); return dt ? `${dt.getFullYear()}/${dt.getMonth() + 1}/${dt.getDate()}` : "期限なし"; }
    function startOfMonth(date) { return new Date(date.getFullYear(), date.getMonth(), 1); }
    function escapeHtml(str) { return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]); }
    function priorityLabel(p) { return { high: "高", low: "低" }[p] || "中"; }

    // 日付の判定（期限管理・リマインダー用）
    function getDateStatus(dueDate) {
      if (!dueDate) return 'none';
      const todayYMD = toYMD(new Date());
      if (dueDate < todayYMD) return 'overdue';
      if (dueDate === todayYMD) return 'today';
      return 'future';
    }

    function getFilteredTasks() {
      const keyword = state.keyword.trim().toLowerCase();
      return state.tasks.filter(task => {
        // 検索対象に顧客名を含める
        const matchKeyword = !keyword || 
          task.title.toLowerCase().includes(keyword) || 
          (task.memo && task.memo.toLowerCase().includes(keyword)) ||
          (task.client && task.client.toLowerCase().includes(keyword));
        const matchStatus = state.statusFilter === "all" || (state.statusFilter === "active" && !task.completed) || (state.statusFilter === "completed" && task.completed);
        const matchDate = !state.selectedDate || task.dueDate === state.selectedDate;
        return matchKeyword && matchStatus && matchDate;
      });
    }

    function renderTodayLabel() {
      const now = new Date();
      el.todayLabel.textContent = `今日: ${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}（${["日", "月", "火", "水", "木", "金", "土"][now.getDay()]}）`;
    }

    function renderCalendar() {
      const monthDate = state.currentMonth;
      el.calendarMonthLabel.textContent = `📅 ${monthDate.getFullYear()}年 ${monthDate.getMonth() + 1}月`;
      const firstDay = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
      const startDate = new Date(firstDay); startDate.setDate(1 - firstDay.getDay());

      let html = ["日", "月", "火", "水", "木", "金", "土"].map(l => `<div class="weekday">${l}</div>`).join("");

      for (let i = 0; i < 42; i++) {
        const cellDate = new Date(startDate); cellDate.setDate(startDate.getDate() + i);
        const ymd = toYMD(cellDate); const tasks = state.tasks.filter(t => t.dueDate === ymd);
        const classes = ["day", cellDate.getMonth() !== monthDate.getMonth() ? "other-month" : "", ymd === toYMD(new Date()) ? "today" : "", state.selectedDate === ymd ? "selected" : ""].filter(Boolean).join(" ");
        const dots = tasks.slice(0, 4).map(t => `<span class="dot ${t.priority}"></span>`).join("");
        html += `<div class="${classes}" data-date="${ymd}"><div class="day-top"><span class="day-num">${cellDate.getDate()}</span>${tasks.length ? `<span class="day-count">${tasks.length}</span>` : ""}</div><div class="day-dots">${dots}</div></div>`;
      }
      el.calendarGrid.innerHTML = html;
      el.calendarGrid.querySelectorAll(".day").forEach(dayEl => {
        dayEl.addEventListener("click", () => {
          state.selectedDate = dayEl.dataset.date; el.taskDateInput.value = state.selectedDate;
          state.currentMonth = startOfMonth(parseYMD(state.selectedDate));
          renderCalendar(); renderTasks(); updateSelectedInfo();
        });
      });
      updateSelectedInfo();
    }

    function updateSelectedInfo() {
      if (!state.selectedDate) return el.selectedInfo.textContent = "👆 カレンダーの日付を選ぶと、その日のタスクだけ表示できます。";
      el.selectedInfo.innerHTML = `📅 <strong>${formatDateJP(state.selectedDate)}</strong> のタスクは <strong>${state.tasks.filter(t => t.dueDate === state.selectedDate).length}件</strong> です。`;
    }

    // 現在タスク一覧（リマインダー）の描画
    function renderDashboard() {
      // 未完了で、今日または期限切れのタスクを抽出
      const urgentTasks = state.tasks.filter(t => !t.completed && (getDateStatus(t.dueDate) === 'overdue' || getDateStatus(t.dueDate) === 'today'));
      
      // 日付順に並び替え
      urgentTasks.sort((a, b) => (a.dueDate || "") > (b.dueDate || "") ? 1 : -1);

      if (urgentTasks.length > 0) {
        el.dashboardArea.style.display = "block";
        el.dashboardList.innerHTML = urgentTasks.map(task => {
          const status = getDateStatus(task.dueDate);
          const statusText = status === 'overdue' ? '⚠️ 期限切れ' : '🎯 今日が期限';
          return `
            <div class="dash-item ${status}">
              <div>
                <div class="dash-item-title">${escapeHtml(task.title)}</div>
                ${task.client ? `<div class="dash-item-client">👤 ${escapeHtml(task.client)}</div>` : ''}
              </div>
              <div class="dash-item-date ${status}">${statusText}</div>
            </div>
          `;
        }).join("");
      } else {
        el.dashboardArea.style.display = "none";
      }
    }

    function renderTasks() {
      const filtered = getFilteredTasks();
      el.listCount.textContent = `(${filtered.length}件)`;
      
      if (!filtered.length) {
        el.taskList.innerHTML = `<div class="empty">📭 タスクが見つかりません。新しいタスクを追加しましょう！</div>`;
        return;
      }

      el.taskList.innerHTML = filtered.map(task => {
        const dateStatus = task.completed ? 'none' : getDateStatus(task.dueDate);
        return `
        <article class="task-item ${task.completed ? "completed" : ""} ${dateStatus}" data-id="${task.id}">
          <div class="drag-handle" style="visibility:hidden;"></div> <!-- CSS調整用ダミー -->
          <input class="task-check" type="checkbox" ${task.completed ? "checked" : ""} data-action="toggle" data-id="${task.id}" />
          <div class="task-main">
            ${task.client ? `<div class="task-client">👤 ${escapeHtml(task.client)}</div>` : ''}
            <h3 class="task-title">${escapeHtml(task.title)}</h3>
            <div class="task-memo ${task.memo ? 'has-content' : ''}">${task.memo ? escapeHtml(task.memo) : ''}</div>
            <div class="task-meta">
              <span class="badge badge-industry">${escapeHtml(task.industry || '📌 その他')}</span>
              <span class="badge badge-date ${dateStatus}">📅 ${task.dueDate ? formatDateJP(task.dueDate) : "未設定"}</span>
              <span class="badge badge-${task.priority}">${priorityLabel(task.priority)}</span>
            </div>
          </div>
          <div class="task-actions">
            <button class="small-btn edit" data-action="edit" data-id="${task.id}">✏️</button>
            <button class="small-btn delete" data-action="delete" data-id="${task.id}">🗑</button>
          </div>
        </article>
      `}).join("");
      bindTaskEvents();
    }

    function bindTaskEvents() {
      el.taskList.querySelectorAll('[data-action="toggle"]').forEach(n => n.addEventListener("change", () => toggleTask(n.dataset.id)));
      el.taskList.querySelectorAll('[data-action="edit"]').forEach(n => n.addEventListener("click", () => startEdit(n.dataset.id)));
      el.taskList.querySelectorAll('[data-action="delete"]').forEach(n => n.addEventListener("click", () => deleteTask(n.dataset.id)));
    }

    function addOrUpdateTask() {
      const title = el.taskTitleInput.value.trim();
      if (!title) return el.taskTitleInput.focus();
      
      const taskData = { 
        title, 
        client: el.taskClientInput.value.trim(),
        dueDate: el.taskDateInput.value, 
        priority: el.taskPriorityInput.value,
        industry: el.taskIndustryInput.value,
        memo: el.taskMemoInput.value.trim()
      };

      if (state.editingId) {
        state.tasks = state.tasks.map(t => t.id === state.editingId ? { ...t, ...taskData } : t);
      } else {
        state.tasks.unshift({ id: uid(), completed: false, createdAt: new Date().toISOString(), ...taskData });
      }
      saveTasks(); resetForm(); renderCalendar(); renderTasks(); renderDashboard();
    }

    function resetForm() {
      state.editingId = null; el.formTitle.innerHTML = "✨ 新しい案件・タスクを追加"; el.submitTaskBtn.innerHTML = "➕ タスクを追加";
      el.cancelEditBtn.style.display = "none"; 
      el.taskTitleInput.value = ""; 
      el.taskClientInput.value = "";
      el.taskPriorityInput.value = "medium";
      el.taskIndustryInput.value = "風営法許可"; 
      el.taskMemoInput.value = ""; 
      el.taskDateInput.value = state.selectedDate || ""; 
      el.taskTitleInput.focus();
    }

    function startEdit(id) {
      const task = state.tasks.find(t => t.id === id); if (!task) return;
      state.editingId = id; el.formTitle.innerHTML = "✏️ タスクを編集"; el.submitTaskBtn.innerHTML = "💾 更新";
      el.cancelEditBtn.style.display = "inline-flex"; 
      el.taskTitleInput.value = task.title;
      el.taskClientInput.value = task.client || "";
      el.taskDateInput.value = task.dueDate || ""; 
      el.taskPriorityInput.value = task.priority || "medium";
      el.taskIndustryInput.value = task.industry || "風営法許可";
      el.taskMemoInput.value = task.memo || "";
      window.scrollTo({ top: 0, behavior: "smooth" }); el.taskTitleInput.focus();
    }

    function toggleTask(id) {
      state.tasks = state.tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
      saveTasks(); renderTasks(); renderDashboard();
    }

    function deleteTask(id) {
      if (!confirm("本当に削除しますか？")) return;
      state.tasks = state.tasks.filter(t => t.id !== id);
      if (state.editingId === id) resetForm();
      saveTasks(); renderCalendar(); renderTasks(); renderDashboard();
    }

    function clearCompleted() {
      if (!confirm("完了済みのタスクをすべて削除しますか？")) return;
      state.tasks = state.tasks.filter(t => !t.completed);
      saveTasks(); renderCalendar(); renderTasks(); renderDashboard();
    }

    // イベントリスナー
    el.prevMonthBtn.addEventListener("click", () => { state.currentMonth.setMonth(state.currentMonth.getMonth() - 1); renderCalendar(); });
    el.nextMonthBtn.addEventListener("click", () => { state.currentMonth.setMonth(state.currentMonth.getMonth() + 1); renderCalendar(); });
    el.todayBtn.addEventListener("click", () => { state.currentMonth = startOfMonth(new Date()); state.selectedDate = toYMD(new Date()); el.taskDateInput.value = state.selectedDate; renderCalendar(); renderTasks(); });
    el.clearDateFilterBtn.addEventListener("click", () => { state.selectedDate = ""; el.taskDateInput.value = ""; renderCalendar(); renderTasks(); });
    el.submitTaskBtn.addEventListener("click", addOrUpdateTask);
    el.cancelEditBtn.addEventListener("click", resetForm);
    el.taskTitleInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addOrUpdateTask(); });
    el.searchInput.addEventListener("input", (e) => { state.keyword = e.target.value; renderTasks(); });
    el.clearCompletedBtn.addEventListener("click", clearCompleted);
    el.filterButtons.forEach(btn => btn.addEventListener("click", () => {
      state.statusFilter = btn.dataset.filter;
      el.filterButtons.forEach(b => b.classList.toggle("active", b === btn)); renderTasks();
    }));

    // 初期化
    renderTodayLabel(); resetForm(); renderCalendar(); renderTasks(); renderDashboard();
  </script>
</body>
</html>

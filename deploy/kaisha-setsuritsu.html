<body>

  <script type="text/babel" src="atoms.jsx"></script>

  <script type="text/babel" src="lp-sections.jsx"></script>
  <script type="text/babel">
    const App = () => (
      <React.Fragment>
        <Header />
        <LPHero
          category="BUSINESS · 会社設立"
          breadcrumb="会社設立"
          icon="🏢"
          title={<>株式会社・合同会社の設立、<br/>定款から登記までワンストップで。</>}
          lead={<>会社設立は、<strong>定款の作成</strong>・公証人による認証・資本金の払込・<strong>法務局への登記申請</strong>と、複数のステップを正しい順序で進める必要があります。行政書士＋司法書士の連携で、すべて一括対応します。</>}
          meta={[
            { label: '料金', value: '150,000', unit: '円〜' },
            { label: '対応エリア', value: '広島県全域' },
            { label: '所要', value: '2〜3', unit: '週間' },
            { label: '初回相談', value: '0', unit: '円' },
          ]}
        />

        <LPSection num="01" tone="cream" screenLabel="02 What">
          <Eyebrow>WHAT IS</Eyebrow>
          <SectionTitle>株式会社 vs 合同会社、<br/>どちらを選ぶ？</SectionTitle>
          <Lead>新しく会社を作るときは、まず<strong>会社形態</strong>を選びます。日本で選べる会社形態は4つ（株式会社・合同会社・合名会社・合資会社）ですが、現代の起業では<strong>株式会社</strong>か<strong>合同会社</strong>のいずれかがほぼ全てです。</Lead>
          <InfoCardGrid items={[
            { icon: '🏛️', title: '株式会社（KK）',     body: <>もっとも一般的。社会的信用が高く、上場・大型融資・資金調達に有利。設立費用は<strong>約25万円</strong>（実費・登録免許税15万円含む）。</> },
            { icon: '🤝', title: '合同会社（LLC）',     body: <>小規模・個人事業の法人化向け。定款認証不要で設立費用が安い<strong>約11万円</strong>（実費・登録免許税6万円）。意思決定が柔軟。</> },
            { icon: '💼', title: 'どっちが自分に合う？', body: '「将来上場 or 大型融資」「対外的信用が必要」なら株式会社。「身内・少人数で始める」「コストを抑えたい」なら合同会社。' },
            { icon: '🔁', title: '後から変更も可能',     body: '合同会社で始めて、軌道に乗ってから株式会社に組織変更することもできます（追加費用は必要）。' },
          ]} />
        </LPSection>

        <LPSection num="02" tone="white" screenLabel="03 Why">
          <Eyebrow>WHY EX-OFFICER</Eyebrow>
          <SectionTitle>「許認可と設立」を同時に進められます。</SectionTitle>
          <Lead>新しい事業を始める際、会社設立と<strong>許認可</strong>（風営法・建設業・古物商 等）を並行して進めると、開業日を最短化できます。元警察官行政書士の私だからこそ、両方をスムーズに連動させられます。</Lead>
          <QuoteBlock author="代表行政書士 西岡祐也（元広島県警察官）">
            会社設立は司法書士の業務、許認可は行政書士の業務——本来は別々の専門家を立てる必要があります。当事務所では司法書士と連携し、設立と許認可を並行して進められる体制を整えているので、開業のタイミングを逃しません。
          </QuoteBlock>
        </LPSection>

        <LPSection num="03" tone="cream" screenLabel="04 Process">
          <Eyebrow>PROCESS</Eyebrow>
          <SectionTitle>ご依頼から登記完了まで、<br/>約2〜3週間。</SectionTitle>
          <ProcessSteps steps={[
            { title: 'LINE / 電話でご相談', desc: <>会社形態・事業内容・出資者構成をお伺いします。<strong>初回相談は無料</strong>。</>, duration: '当日〜翌営業日' },
            { title: '基本事項の決定', desc: '商号（社名）・本店所在地・事業目的・資本金・役員・決算月 等の基本事項を決定。商号の類似調査も実施します。', duration: '2〜3日' },
            { title: '定款の作成', desc: '会社の憲法ともいえる「定款」を作成。事業目的の書き方は将来の許認可に影響するので、慎重に組み立てます。', duration: '3〜5日' },
            { title: '公証人の認証（株式会社のみ）', desc: '株式会社は公証人による定款認証が必要（手数料約5万円）。合同会社は不要。電子定款で印紙代4万円を節約。', duration: '1〜2日' },
            { title: '資本金の払込', desc: '発起人の個人口座に資本金を払い込み、払込証明書を作成します。', duration: '1日' },
            { title: '法務局への登記申請（司法書士）', desc: <>登記申請は連携先の<strong>司法書士</strong>が担当します。登録免許税15万円（株式会社）または6万円（合同会社）が必要。</>, duration: '1〜2日' },
            { title: '登記完了・各種開業届', desc: <>登記完了から<strong>約1週間</strong>で謄本が取得可能。税務署・年金事務所・労基への各種届出もサポートします。</>, duration: '申請から約7日' },
          ]} />
          <CTABand
            title="開業日を決めている方は早めにご相談を。"
            sub="会社設立と並行して、許認可（風営法・建設業・古物商等）も同時進行できます。「開業日に許可も間に合わせたい」場合は1ヶ月以上前のご相談を推奨します。"
          />
        </LPSection>

        <LPSection num="04" tone="white" id="pricing" screenLabel="05 Pricing">
          <Eyebrow>PRICING</Eyebrow>
          <SectionTitle>料金プラン</SectionTitle>
          <Lead>会社形態・事業内容の複雑さによって料金が変動します。実費（公証人手数料・登録免許税 等）は別途必要です。</Lead>
          <PricingTable
            heading="会社設立サポート（株式会社）"
            price="¥150,000"
            priceNote="〜（税込・実費別）"
            rows={[
              { label: '基本事項の決定サポート（商号調査・目的の組立 等）', val: '含む' },
              { label: '定款作成（電子定款・印紙代4万円不要）', val: '含む' },
              { label: '公証人認証の代理手続き', val: '含む' },
              { label: '司法書士との連携・登記申請', val: '含む（紹介料なし）' },
              { label: '公証人認証手数料（実費）', val: '約50,000円' },
              { label: '登録免許税（実費）', val: '150,000円（株式）／60,000円（合同）' },
              { label: '開業届・青色申告承認申請等（税務署）', val: 'サポート可' },
            ]}
            note="※ 合同会社は ¥120,000〜（税込）。実費合計の目安：株式会社 約25万円／合同会社 約11万円。許認可とのセット依頼で割引あり。"
          />
        </LPSection>

        <LPSection num="05" tone="cream" screenLabel="06 FAQ">
          <Eyebrow>FAQ</Eyebrow>
          <SectionTitle>よくあるご質問</SectionTitle>
          <FAQ items={[
            {
              q: '自分で会社設立はできますか？',
              a: 'ご自身でも可能です。ただし定款の作成・電子定款の作成・登記申請書の作成等、それぞれに専門知識が必要で、不備があると差し戻しになります。「印紙代4万円」を電子定款で節約することも自力では難しいため、結果的に行政書士に依頼する方が安く・早く済むことが多いです。',
            },
            {
              q: '事業目的に何を書けばいいか分かりません。',
              a: '事業目的は将来の許認可・銀行融資・取引先からの信用に直結します。例えば建設業許可を取りたいなら、定款の事業目的に建設業の業種を明記しておく必要があります。「先を見越した」目的設定をサポートします。',
            },
            {
              q: '資本金はいくらにすればいいですか？',
              a: '法律上は1円でも設立可能ですが、許認可（建設業は500万円必要）や銀行融資、対外的信用を考えると、最低でも100万円〜300万円を推奨します。建設業を取得予定なら500万円以上が必須です。',
            },
            {
              q: '自宅を本店所在地にできますか？',
              a: '可能です。ただし、賃貸の場合は大家さんの承諾、マンションの場合は規約での事業利用可否を事前に確認してください。法人住民税の均等割（年間7万円〜）も忘れずに。',
            },
            {
              q: '登記申請は司法書士の業務ですよね？',
              a: '正確には、法務局への登記申請は司法書士の独占業務です。当事務所では信頼できる広島の司法書士と連携しているため、定款作成・公証人手続き・登記申請までを一気通貫でサポートできます。お客様の窓口は当事務所が担当し、紹介料はいただきません。',
            },
            {
              q: '広島市外でも対応してもらえますか？',
              a: '広島県全域に対応します（呉市・東広島市・福山市・尾道市・三原市・廿日市市・安芸郡（海田町・熊野町）等）。県外の場合はご相談ください。',
            },
          ]} />
        </LPSection>

        <LPSection num="06" tone="white" screenLabel="07 Related">
          <Eyebrow>RELATED</Eyebrow>
          <SectionTitle>関連サービス</SectionTitle>
          <Lead>会社設立とあわせてご依頼いただくケースが多いサービスです。</Lead>
          <RelatedLPs items={[
            { icon: '💰', title: '創業融資サポート',   price: '55,000円〜+成功報酬', href: 'sogyo-yushi.html' },
            { icon: '🏗️', title: '建設業許可',         price: '要見積もり', href: 'kensetsu.html' },
            { icon: '🎤', title: '風営法許可',         price: '要見積もり', href: 'fueihou.html' },
            { icon: '♻️', title: '古物商許可',         price: '60,000円〜', href: 'kobutu.html' },
          ]} />
        </LPSection>

        <Contact />
        <InfoStrip />
        <Footer />
        <FloatingLineCTA />
      </React.Fragment>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

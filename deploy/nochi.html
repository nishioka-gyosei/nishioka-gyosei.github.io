  <script type="text/babel" src="lp-sections.jsx"></script>
  <script type="text/babel">
    const App = () => (
      <React.Fragment>
        <Header />
        <LPHero
          category="LIFE PERMIT · 農地転用"
          breadcrumb="農地転用"
          icon="🌾"
          title={<>農地を宅地・駐車場・店舗に変えるなら、<br/>3条・4条・5条の申請から。</>}
          lead={<>農地は<strong>農地法</strong>で厳しく保護されています。所有者が変わる（3条）・自分の農地を別用途に変える（4条）・売買や賃貸で他人に転用させる（5条）——いずれも農業委員会または県知事の許可が必要です。事前調査から申請まで一括サポート。</>}
          meta={[
            { label: '料金', value: '要見積もり' },
            { label: '対応エリア', value: '広島県全域' },
            { label: '所要', value: '1.5〜3', unit: 'ヶ月' },
            { label: '初回相談', value: '0', unit: '円' },
          ]}
        />

        <LPSection num="01" tone="cream" screenLabel="02 What">
          <Eyebrow>WHAT IS</Eyebrow>
          <SectionTitle>農地法 3条・4条・5条の違い</SectionTitle>
          <Lead>農地法は、農地を守るために<strong>所有権の移転</strong>と<strong>転用</strong>の両方を規制しています。ご相談内容によってどの条文を適用するかが変わります。</Lead>
          <InfoCardGrid items={[
            { icon: '🤝', title: '3条 — 所有権移転（農地のまま）', body: '農家から農家へ農地を売買・贈与する場合。農業委員会の許可が必要。' },
            { icon: '🏠', title: '4条 — 自己転用（所有者そのまま）', body: '自分の農地を自分で宅地・駐車場・店舗・太陽光発電所に変える場合。' },
            { icon: '💰', title: '5条 — 売買+転用（所有権移転+用途変更）', body: '農地を他人に売って、その人が宅地等に転用する場合。最も多いケース。' },
            { icon: '🗾', title: '区域による許可者の違い', body: '市街化区域は届出のみ（簡易）。市街化調整区域・農業振興地域は県知事の許可が必要で要件が厳しい。' },
          ]} />
        </LPSection>

        <LPSection num="02" tone="white" screenLabel="03 Who">
          <Eyebrow>WHO NEEDS IT</Eyebrow>
          <SectionTitle>こんな方に必要です</SectionTitle>
          <InfoCardGrid items={[
            { icon: '🏠', title: '農地に家を建てたい',   body: '相続した農地・実家の田畑に新築したい場合（4条）。' },
            { icon: '🅿️', title: '農地を駐車場にしたい', body: '使っていない農地をコインパーキング・月極駐車場にする場合（4条/5条）。' },
            { icon: '🏗️', title: '農地を売って宅地化',    body: '不動産業者・買主が宅地・店舗用地として購入する場合（5条）。' },
            { icon: '☀️', title: '太陽光発電所を作りたい', body: '農地に太陽光パネルを設置する場合（4条/5条）。営農型ソーラーは別途要件あり。' },
          ]} />
          <CTABand
            title="まずは「自分の農地が転用できるかどうか」が大事。"
            sub="農業振興地域・甲種農地・第1種農地は転用が原則不可。LINE で物件の地番を送ってもらえれば、その場で見通しをお伝えします。"
          />
        </LPSection>

        <LPSection num="03" tone="navy" screenLabel="04 Why">
          <Eyebrow>WHY EX-OFFICER</Eyebrow>
          <SectionTitle tone="white">役所との調整が要の業務。</SectionTitle>
          <Lead tone="on-navy">農地転用は<strong>農業委員会・県農林事務所・市町村建築指導課</strong>と、複数の窓口を渡り歩く業務。公務員側の動き方を13年間内側から見てきた経験が、円滑な調整に活きます。</Lead>
          <QuoteBlock author="代表行政書士 西岡祐也（元広島県警察官）">
            農地転用で多い失敗は、農業振興地域に指定されていることに気づかず売買契約してしまうケースです。先に農業委員会で土地の区分を確認するだけで、何百万円もの損失を防げます。物件をすぐ送ってください。即日でチェックします。
          </QuoteBlock>
        </LPSection>

        <LPSection num="04" tone="cream" screenLabel="05 Process">
          <Eyebrow>PROCESS</Eyebrow>
          <SectionTitle>申請の流れ</SectionTitle>
          <ProcessSteps steps={[
            { title: 'LINE / 電話でご相談', desc: '物件の所在地・現状・目的をお伺いします。地番が分かれば即日で区分判定が可能。', duration: '当日〜翌営業日' },
            { title: '農地区分の調査', desc: <>農業委員会で<strong>農地の区分</strong>（甲種・1〜3種・市街化区域 等）を確認。許可の難易度がここで決まります。</>, duration: '3〜5日' },
            { title: '関係機関との事前協議', desc: '農業委員会・農林事務所・建築指導課・水利組合 等と事前協議。許可の見通しを立てます。', duration: '14〜21日' },
            { title: '申請書類の作成', desc: '転用計画書・位置図・公図・登記事項証明書・資金計画書 等、案件に応じた書類を作成します。', duration: '7〜10日' },
            { title: '農業委員会への申請', desc: '毎月の<strong>農業委員会総会</strong>で審議されます（締切日に注意）。県知事許可案件は、その後県への進達。', duration: '即日' },
            { title: '審議・許可', desc: <>市街化区域内は通常<strong>2週間程度</strong>、市街化調整区域・農業振興地域は<strong>1.5〜3ヶ月</strong>。許可指令書の交付で転用可能になります。</>, duration: '案件により1〜3ヶ月' },
          ]} />
        </LPSection>

        <LPSection num="05" tone="white" id="pricing" screenLabel="06 Pricing">
          <Eyebrow>PRICING</Eyebrow>
          <SectionTitle>料金プラン</SectionTitle>
          <Lead>農地の区分・面積・申請条文（3/4/5条）によって料金が大きく変動するため、<strong>お見積もり制</strong>です。</Lead>
          <PricingTable
            heading="農地転用許可 一括代行プラン"
            price="要見積もり"
            priceNote=""
            rows={[
              { label: '農地区分の調査', val: '含む' },
              { label: '関係機関との事前協議', val: '含む' },
              { label: '申請書類の作成', val: '含む' },
              { label: '添付書類（公図・登記証明 等）の取得', val: '実費別' },
              { label: '農業委員会・県への申請代行', val: '含む' },
              { label: '太陽光発電所案件・複数筆案件', val: '別途お見積もり' },
            ]}
            note="※ 太陽光発電所への転用、複数筆をまとめての申請、調整区域案件は事前調査が重要です。物件情報をご提示いただければ、調査込みのお見積もりを提示します。"
          />
        </LPSection>

        <LPSection num="06" tone="cream" screenLabel="07 FAQ">
          <Eyebrow>FAQ</Eyebrow>
          <SectionTitle>よくあるご質問</SectionTitle>
          <FAQ items={[
            { q: '農業振興地域内の農地は転用できますか？', a: '原則できません。ただし、農業振興地域整備計画から除外（農振除外）してもらえる場合があります。手続きには時間がかかり（半年〜1年）、許可されるかどうかも案件次第。可能性の見極めから一緒に検討します。' },
            { q: '相続した農地を売りたいです。', a: '相続による所有権移転は3条許可不要（届出のみ）。売却時は5条の許可（または届出）が必要です。買主が決まっている場合は5条、決まっていない場合は3条で先に農業者へ売却するパターンもあります。' },
            { q: '自分の畑に家を建てるのは簡単ですか？', a: '農地の区分次第です。市街化区域なら届出のみで簡単ですが、市街化調整区域は許可制で要件が厳しくなります（住宅政策上の必要性が問われます）。物件地番を送ってください。' },
            { q: '太陽光発電所を作りたいです。', a: '農地転用5条許可が必要です。最近は審査が厳しくなっており、優良農地（甲種・1種）は不可、農地以外で代替可能なら不可、と判断されるケースが増えています。事前の見極めが極めて重要です。' },
            { q: '農業委員会の総会はいつですか？', a: '広島市の農業委員会は毎月開催されています。書類の締切日は通常、総会の2〜3週間前。締切を逃すと翌月送りなので、スケジュールに余裕をもってご依頼ください。' },
            { q: '広島市外でも対応してもらえますか？', a: '広島県全域に対応します（呉市・東広島市・福山市・尾道市・三原市・廿日市市・安芸郡（海田町・熊野町）等）。県外の場合はご相談ください。' },
          ]} />
        </LPSection>

        <LPSection num="07" tone="white" screenLabel="08 Related">
          <Eyebrow>RELATED</Eyebrow>
          <SectionTitle>関連サービス</SectionTitle>
          <RelatedLPs items={[
            { icon: '🏘️', title: '民泊許可',           price: '要見積もり', href: 'minpaku.html' },
            { icon: '🏗️', title: '建設業許可',         price: '要見積もり', href: 'kensetsu.html' },
            { icon: '🏢', title: '会社設立',           price: '150,000円〜', href: 'kaisha-setsuritsu.html' },
            { icon: '📜', title: '遺言書作成',         price: '66,000円〜', href: 'igon.html' },
          ]} />
        </LPSection>

        <Contact />
        <InfoStrip />
        <Footer />
        <FloatingLineCTA />
      </React.Fragment>
    );

  </script>

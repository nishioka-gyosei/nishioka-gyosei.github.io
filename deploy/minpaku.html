  <script type="text/babel">
    const App = () => (
      <React.Fragment>
        <Header />
        <LPHero
          category="LIFE PERMIT · 民泊許可"
          breadcrumb="民泊許可"
          icon="🏘️"
          title={<>広島で民泊を始めるなら、<br/>届出・消防・近隣まで一括で。</>}
          lead={<>広島の宮島・尾道・福山等は、インバウンド需要が伸び続けるエリア。<strong>住宅宿泊事業法（民泊新法）</strong>または<strong>旅館業法（簡易宿所）</strong>のいずれかで届出/許可を取得します。消防法令適合通知書・近隣同意・建築確認まで、開業に必要な手続きをすべて一括代行します。</>}
          meta={[
            { label: '料金', value: '要見積もり' },
            { label: '対応エリア', value: '広島県全域' },
            { label: '所要', value: '1〜2', unit: 'ヶ月' },
            { label: '初回相談', value: '0', unit: '円' },
          ]}
        />

        <LPSection num="01" tone="cream" screenLabel="02 What">
          <Eyebrow>WHAT IS</Eyebrow>
          <SectionTitle>民泊新法 vs 旅館業（簡易宿所）、<br/>どちらを選ぶ？</SectionTitle>
          <Lead>広島で合法的に民泊を運営する方法は<strong>2つ</strong>。それぞれメリット・デメリットがあり、物件の状況や運営方針で選び分けます。</Lead>
          <InfoCardGrid items={[
            { icon: '🏘️', title: '住宅宿泊事業（民泊新法）', body: <>「届出」のみで開業可能。<strong>年間180日まで</strong>の営業制限あり。住宅地でも可。家主居住型 / 不在型を選択。</> },
            { icon: '🏨', title: '旅館業（簡易宿所）',       body: <>年間営業日数の制限なし。フル稼働可能だが、<strong>用途地域・消防・建築の要件が厳しい</strong>。事業として本格的に取り組むならこちら。</> },
            { icon: '🚫', title: '無許可営業は罰則',         body: '6ヶ月以下の懲役または100万円以下の罰金。Airbnb等のプラットフォームでも届出/許可番号の掲載が必須です。' },
            { icon: '🏛️', title: '広島市の独自条例も確認',   body: '広島市では区域・時間の上乗せ規制あり。観光地（宮島・尾道）はさらに地域独自のルールがあるため事前確認が必要。' },
          ]} />
        </LPSection>

        <LPSection num="02" tone="white" screenLabel="03 Why">
          <Eyebrow>WHY EX-OFFICER</Eyebrow>
          <SectionTitle>民泊は「複数役所との調整力」が要。</SectionTitle>
          <Lead>民泊は<strong>保健所・消防署・建築指導課・警察</strong>と、複数の役所との調整が必要な、行政書士業務の中でも難易度の高い分野です。公務員側の感覚を13年間内側から見てきた私だからこそ、各役所の要求を予測して動けます。</Lead>
          <QuoteBlock author="代表行政書士 西岡祐也（元広島県警察官）">
            民泊で多いトラブルは「届出は出したが消防法令適合通知が下りない」「近隣から反対意見が出た」というケース。役所同士は連携しないので、施主側で順序を間違えると詰みます。私は警察官時代、複数部署と連携する仕事ばかりやってきたので、その調整力が活きます。
          </QuoteBlock>
        </LPSection>

        <LPSection num="03" tone="cream" screenLabel="04 Process">
          <Eyebrow>PROCESS</Eyebrow>
          <SectionTitle>ご依頼から開業まで、<br/>約1〜2ヶ月。</SectionTitle>
          <ProcessSteps steps={[
            { title: 'LINE / 電話でご相談', desc: <>物件の場所・規模・運営イメージをお伺いし、<strong>民泊新法 / 簡易宿所のどちらが適しているか</strong>判定します。</>, duration: '当日〜翌営業日' },
            { title: '物件・用途地域・規制チェック', desc: '用途地域・広島市/各市町村の上乗せ規制・マンション規約・賃貸契約上の事業利用可否を全方位で確認。', duration: '3〜7日' },
            { title: '建築・消防の事前協議', desc: <>建築指導課で<strong>建築基準法</strong>の確認、消防署で<strong>消防法令適合通知書</strong>の取得準備。非常用照明・自動火災報知設備の有無もここでチェック。</>, duration: '7〜14日' },
            { title: '近隣同意・周知', desc: '住宅宿泊事業の場合、近隣住民への事前周知が義務。範囲・方法を整理してサポートします。', duration: '7日' },
            { title: '届出書類の作成・提出', desc: '届出書・添付書類（消防法令適合通知書・登記事項証明書・賃貸借契約書 等）を作成し、保健所へ提出。', duration: '7〜14日' },
            { title: '届出受理・営業開始', desc: <>受理されると<strong>届出番号</strong>が発行されます。Airbnb等の掲載時に番号の表示が必要です。</>, duration: '提出後即日' },
          ]} />
        </LPSection>

        <LPSection num="04" tone="white" id="pricing" screenLabel="05 Pricing">
          <Eyebrow>PRICING</Eyebrow>
          <SectionTitle>料金プラン</SectionTitle>
          <Lead>物件の規模・必要な行政手続きの種類によって料金が変動するため、<strong>お見積もり制</strong>です。</Lead>
          <PricingTable
            heading="民泊（住宅宿泊事業）届出 一括代行プラン"
            price="要見積もり"
            priceNote=""
            rows={[
              { label: '物件チェック・用途地域確認', val: '含む' },
              { label: '消防署・建築指導課との事前協議', val: '含む' },
              { label: '近隣周知のサポート', val: '含む' },
              { label: '届出書・添付書類の作成', val: '含む' },
              { label: '保健所への届出代行', val: '含む' },
              { label: '消防法令適合通知書 / 用途変更等の各種実費', val: '実費別' },
              { label: '旅館業（簡易宿所）許可', val: '別途お見積もり' },
            ]}
            note="※ 簡易宿所は届出ではなく許可制で、要件が大幅に厳しくなります（用途変更が必要なケースも）。物件状況に応じて最適なプランをご提案します。"
          />
        </LPSection>

        <LPSection num="05" tone="cream" screenLabel="06 FAQ">
          <Eyebrow>FAQ</Eyebrow>
          <SectionTitle>よくあるご質問</SectionTitle>
          <FAQ items={[
            { q: '賃貸マンションでも民泊できますか？', a: '理論上は可能ですが、賃貸借契約とマンション管理規約の両方で「事業利用可」「転貸借可」となっている必要があります。実際には不可のケースが多いので、契約書とマンション規約を契約前に確認してください。' },
            { q: '宮島・尾道で民泊を始めたいです。', a: '観光地は需要が高い反面、地域独自の上乗せ規制があるケースが多いです。物件住所をお伝えいただければ、その地域固有の規制を含めて事前調査します。' },
            { q: '年間180日制限が辛いです。', a: '通年営業したい場合は「旅館業（簡易宿所）」許可を取得する必要があります。要件は厳しくなりますが、収益性は大幅に上がります。物件の状況次第ですが、可能性をお伝えします。' },
            { q: '消防法令適合通知書が下りないと言われました。', a: '非常用照明・自動火災報知設備・カーテン等の防炎仕様 等、消防の要件は意外と細かいです。物件の現状を確認した上で、適合のために必要な工事や設備をご提案できます。' },
            { q: '近隣住民から反対の声があります。', a: '近隣周知は届出の前提条件で、反対があっても直ちに不許可になるわけではありません。ただし、その後のトラブルを避けるためにも、丁寧な説明と運営ルール（チェックイン時間・騒音対策 等）の提示が重要です。一緒に対応策を考えます。' },
            { q: '広島市外でも対応してもらえますか？', a: '広島県全域に対応します（呉市・東広島市・福山市・尾道市・三原市・廿日市市・安芸郡（海田町・熊野町）等）。県外の場合はご相談ください。' },
          ]} />
        </LPSection>

        <LPSection num="06" tone="white" screenLabel="07 Related">
          <Eyebrow>RELATED</Eyebrow>
          <SectionTitle>関連サービス</SectionTitle>
          <RelatedLPs items={[
            { icon: '🏢', title: '会社設立',           price: '150,000円〜', href: 'kaisha-setsuritsu.html' },
            { icon: '💰', title: '創業融資サポート',   price: '55,000円〜+成功報酬', href: 'sogyo-yushi.html' },
            { icon: '🍺', title: '飲食店営業許可',     price: '55,000円〜', href: 'inshokuten.html' },
            { icon: '🌾', title: '農地転用',           price: '要見積もり', href: 'nochi.html' },
          ]} />
        </LPSection>

        <Contact />
        <InfoStrip />
        <Footer />
        <FloatingLineCTA />
      </React.Fragment>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

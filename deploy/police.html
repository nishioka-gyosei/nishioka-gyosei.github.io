  <script type="text/babel">
    const App = () => (
      <React.Fragment>
        <Header />
        <LPHero
          category="POLICE PERMIT · HUB"
          breadcrumb="警察申請まとめ"
          icon="🚨"
          title={<>警察への許可申請、<br/>すべて元警察官に任せる。</>}
          lead={<>風営法・深夜営業届・古物商・道路使用許可・警備業認定——<strong>窓口がすべて警察</strong>の申請。広島県警察 13年の元警察官だからこそ、内側から知っている目線で最短ルートを取れます。複数の許可を同時に取りたい場合のセット相談も歓迎です。</>}
          meta={[
            { label: '専門分野', value: '5+' },
            { label: '対応エリア', value: '広島県全域' },
            { label: '警察勤務', value: '13', unit: '年' },
            { label: '初回相談', value: '0', unit: '円' },
          ]}
        />

        <LPSection num="01" tone="cream" screenLabel="02 Catalog">
          <Eyebrow>CATALOG</Eyebrow>
          <SectionTitle>警察への申請カタログ</SectionTitle>
          <Lead>当事務所が対応する「警察窓口の申請」は以下の5分野です。それぞれのLPで詳細を確認できます。</Lead>
          <div className="nx-related-grid" style={{marginTop:28}}>
            <a className="nx-related-card" href="fueihou.html">
              <div className="nx-related-card__icon">🎤</div>
              <div className="nx-related-card__title">風俗営業許可（風営法1号）</div>
              <div className="nx-related-card__price">要見積もり</div>
            </a>
            <a className="nx-related-card" href="shinya-eigyou.html">
              <div className="nx-related-card__icon">🌙</div>
              <div className="nx-related-card__title">深夜営業届出</div>
              <div className="nx-related-card__price">77,000円〜</div>
            </a>
            <a className="nx-related-card" href="kobutu.html">
              <div className="nx-related-card__icon">♻️</div>
              <div className="nx-related-card__title">古物商許可</div>
              <div className="nx-related-card__price">60,000円〜</div>
            </a>
            <a className="nx-related-card" href="douroshiyou.html">
              <div className="nx-related-card__icon">🚗</div>
              <div className="nx-related-card__title">道路使用・占用許可</div>
              <div className="nx-related-card__price">要見積もり</div>
            </a>
            <a className="nx-related-card" href="#warning-keibi">
              <div className="nx-related-card__icon">🛡️</div>
              <div className="nx-related-card__title">警備業認定</div>
              <div className="nx-related-card__price">要見積もり</div>
            </a>
          </div>
        </LPSection>

        <LPSection num="02" tone="navy" screenLabel="03 Why">
          <Eyebrow>WHY EX-OFFICER</Eyebrow>
          <SectionTitle tone="white">なぜ警察申請は「元警察官」がいいのか。</SectionTitle>
          <Lead tone="on-navy">
            警察への申請は、書類の体裁さえ整えれば通るものではありません。窓口担当者が「どこを見て、何で却下するか」は<strong>一定の基準</strong>に基づいて行われています。13年その内側にいた私だからこそ、その基準を最初から押さえた書類を作れます。
          </Lead>
          <QuoteBlock author="代表行政書士 西岡祐也（元広島県警察官）">
            警察の窓口担当者は、申請書の「どこを見て」「何で却下するか」を、一定の基準で評価しています。私は13年間その内側にいたので、相手が何を求めているかが手に取るようにわかります。だから「書類の不備で差し戻し」をほぼゼロにできます。
          </QuoteBlock>
        </LPSection>

        <LPSection num="03" tone="cream" screenLabel="04 Bundle">
          <Eyebrow>BUNDLE</Eyebrow>
          <SectionTitle>複数許可のセット依頼</SectionTitle>
          <Lead>警察関連の許可は、業態によって<strong>複数の許可を同時に取得</strong>するケースが多くあります。並行進行することで、開業スケジュールを最短化できます。</Lead>
          <InfoCardGrid items={[
            { icon: '🍷', title: 'バー・スナックを開業',     body: '飲食店営業許可（保健所）+ 深夜営業届出（警察）+ 必要に応じて風営法1号（警察）' },
            { icon: '🚗', title: '中古車販売店を開業',       body: '古物商許可（警察）+ 自動車保管場所証明（警察）+ 会社設立' },
            { icon: '🏗️', title: '建設業者として独立',       body: '建設業許可（県）+ 道路使用許可（警察）+ 会社設立' },
            { icon: '🛡️', title: '警備会社を立ち上げ',       body: '警備業認定（警察）+ 会社設立 + 創業融資サポート' },
          ]} />
          <CTABand
            title="複数許可をまとめてご依頼の場合は割引もあります。"
            sub="同時並行で進めるとスケジュール短縮 + コスト圧縮の両方が実現できます。LINE でご相談ください。"
          />
        </LPSection>

        <LPSection num="04" tone="white" id="warning-keibi" screenLabel="05 Keibi">
          <Eyebrow>OPTIONAL · 警備業</Eyebrow>
          <SectionTitle>警備業認定について</SectionTitle>
          <Lead>警備業（1〜4号）を始めるには、<strong>警備業法</strong>にもとづく公安委員会の認定が必要です。元警察官だからこそ、警備業界の制度設計を深く理解しています。お見積もり制でご相談を承ります。</Lead>
          <InfoCardGrid items={[
            { icon: '🛡️', title: '1号 — 施設警備',          body: 'ビル・店舗・工場・空港等の常駐警備。最も件数が多い類型。' },
            { icon: '🚛', title: '2号 — 雑踏・交通誘導',    body: 'イベント警備、工事現場の交通誘導員等。建設業者の依頼が多い。' },
            { icon: '💰', title: '3号 — 運搬警備',          body: '現金・貴金属・美術品等の運送・搬送警備。' },
            { icon: '👤', title: '4号 — 身辺警備',          body: 'いわゆるボディーガード業務。要件が最も厳しい類型。' },
          ]} />
        </LPSection>

        <Contact />
        <InfoStrip />
        <Footer />
        <FloatingLineCTA />
      </React.Fragment>
    );

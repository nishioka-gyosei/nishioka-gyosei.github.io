/* ============================================================
   西岡行政書士事務所 — Design Tokens
   Nishioka Gyosei Shoshi Office
   ============================================================
   Brand position: Ex-police officer (13 yrs) turned administrative
   scrivener (gyosei-shoshi). Trust + authority + Japanese formality.
   Visual DNA: deep navy + warm gold (medal / police-badge feel),
   cream paper, mixed JP/EN typography (Noto Serif JP + Oswald).
   ============================================================ */

/* --- Fonts (Google Fonts — same as production site) --- */
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Oswald:wght@500;700&display=swap');

:root {
  /* ===========================================================
     COLOR — Primary
     Navy is the brand. Used for headers, dark sections, body
     text on light bg, buttons, badges. Read as authority +
     formality (uniformed, official, government-adjacent).
     =========================================================== */
  --navy:       #0d1f3c;   /* primary brand — header, dark sections, headings on light */
  --navy-mid:   #1a3260;   /* hover / secondary surfaces */
  --navy-light: #243f7a;   /* tertiary surfaces, subtle accents */
  --navy-deep:  #081425;   /* footer / deepest depth */

  /* ===========================================================
     COLOR — Accent (Gold)
     Police-badge gold. ALWAYS pair with navy. Used for CTAs,
     eyebrow labels, prices, statistic numbers, decorative
     quote-marks, left-border accents. Never use on white as
     a flat fill — gold reads weakly without dark surrounding.
     =========================================================== */
  --gold:       #c9a84c;   /* primary accent — CTA buttons, eyebrow text on navy */
  --gold-light: #e8c97a;   /* hover for gold buttons; highlights on navy */
  --gold-tint:  rgba(201, 168, 76, 0.12);  /* gold wash for badge backgrounds on navy */
  --gold-line:  rgba(201, 168, 76, 0.30);  /* gold borders on navy */

  /* ===========================================================
     COLOR — Neutrals (Light)
     Cream is the "off-white paper" surface — used between
     navy sections for contrast and to evoke official documents.
     =========================================================== */
  --cream:      #f8f5ef;   /* paper / subtle section background */
  --white:      #ffffff;   /* base background */
  --border:     #e0dbd0;   /* card borders, dividers (warm beige) */
  --border-soft:#efeae0;   /* lightest dividers */

  /* ===========================================================
     COLOR — Text
     =========================================================== */
  --text:       #1a1a1a;   /* primary text on light backgrounds */
  --text-mid:   #4a4a4a;   /* body copy, secondary */
  --text-light: #888888;   /* tertiary, captions, helper text */

  /* On-navy text (used in dark sections, hero, footer) */
  --on-navy:           #ffffff;
  --on-navy-secondary: rgba(255, 255, 255, 0.72);
  --on-navy-tertiary:  rgba(255, 255, 255, 0.45);
  --on-navy-faint:     rgba(255, 255, 255, 0.08);

  /* ===========================================================
     COLOR — Semantic
     =========================================================== */
  --line-green: #06C755;   /* LINE brand — used for LINE CTA only */
  --success:    #2f7d4f;
  --warning:    #c9a84c;   /* re-use gold */
  --danger:     #b23a3a;

  /* ===========================================================
     TYPOGRAPHY — Families
     =========================================================== */
  --font-serif:   'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif;
  --font-sans:    'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
  --font-display: 'Oswald', 'Noto Sans JP', sans-serif;   /* English/numerals */

  /* ===========================================================
     TYPOGRAPHY — Roles
     -----------------------------------------------------------
     Three roles structure every page:
       1. EYEBROW   — Oswald, uppercase, gold, tight tracking
       2. HEADING   — Noto Serif JP, navy or white, bold
       3. BODY      — Noto Sans JP, 14-15px, generous line-height
     -----------------------------------------------------------
     =========================================================== */

  /* Display / Hero English (e.g. "EX-POLICE OFFICER.") */
  --type-display-size:    clamp(42px, 8vw, 80px);
  --type-display-weight:  700;
  --type-display-line:    1;
  --type-display-track:   -0.01em;

  /* H1 — Section title in Japanese serif */
  --type-h1-size:    clamp(22px, 4vw, 32px);
  --type-h1-weight:  700;
  --type-h1-line:    1.4;

  /* H2 — Sub-section / card cluster heading */
  --type-h2-size:    clamp(20px, 3.5vw, 28px);
  --type-h2-weight:  700;
  --type-h2-line:    1.5;

  /* H3 — Card title */
  --type-h3-size:    16px;
  --type-h3-weight:  700;
  --type-h3-line:    1.4;

  /* Eyebrow label — Oswald uppercase */
  --type-eyebrow-size:    11px;
  --type-eyebrow-weight:  500;
  --type-eyebrow-track:   0.20em;
  --type-eyebrow-case:    uppercase;

  /* Lead paragraph (intro under H1) */
  --type-lead-size:  15px;
  --type-lead-line:  1.85;

  /* Body paragraph */
  --type-body-size:  14px;
  --type-body-line:  1.85;

  /* Small / caption */
  --type-small-size: 12px;
  --type-small-line: 1.7;

  /* Big stat (Oswald, ex: "13年") */
  --type-stat-size:    36px;
  --type-stat-weight:  700;

  /* ===========================================================
     SPACING — 4px base, soft scale
     =========================================================== */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;     /* default section vertical padding */
  --space-24: 96px;

  --section-y: 80px;
  --container-max: 840px;        /* tight reading width — site default */
  --container-pad: 24px;

  /* ===========================================================
     RADII
     =========================================================== */
  --radius-xs: 2px;     /* group label tabs */
  --radius-sm: 4px;     /* small buttons, tags */
  --radius-md: 6px;     /* primary buttons */
  --radius-lg: 8px;     /* cards, quote blocks */
  --radius-xl: 12px;    /* large containers */
  --radius-2xl: 14px;   /* simulator card */
  --radius-pill: 999px;

  /* ===========================================================
     SHADOWS
     -----------------------------------------------------------
     Used very sparingly — most depth comes from color contrast,
     not blur. Only two elevations on the live site.
     =========================================================== */
  --shadow-card:   0 2px 8px rgba(0, 0, 0, 0.06);
  --shadow-lifted: 0 4px 24px rgba(0, 0, 0, 0.07);

  /* ===========================================================
     BORDERS
     =========================================================== */
  --border-w: 1px;
  --border-accent-w: 3px;   /* gold left-accent on tags */

  /* ===========================================================
     TIMING
     =========================================================== */
  --ease: cubic-bezier(.2, .7, .3, 1);
  --t-quick: 0.15s;
  --t-base:  0.20s;
  --t-slow:  0.60s;
}

/* ============================================================
   SEMANTIC ELEMENT DEFAULTS
   Use these directly when authoring new pages — they wire up
   the tokens above. Override locally as needed.
   ============================================================ */

.eyebrow {
  font-family: var(--font-display);
  font-size: var(--type-eyebrow-size);
  font-weight: var(--type-eyebrow-weight);
  letter-spacing: var(--type-eyebrow-track);
  text-transform: var(--type-eyebrow-case);
  color: var(--gold);
  display: block;
  margin-bottom: 12px;
}

.h1, h1.section-title {
  font-family: var(--font-serif);
  font-size: var(--type-h1-size);
  font-weight: var(--type-h1-weight);
  line-height: var(--type-h1-line);
  color: var(--navy);
}

.h2, h2.section-title {
  font-family: var(--font-serif);
  font-size: var(--type-h2-size);
  font-weight: var(--type-h2-weight);
  line-height: var(--type-h2-line);
  color: var(--navy);
}

.h3 {
  font-family: var(--font-serif);
  font-size: var(--type-h3-size);
  font-weight: var(--type-h3-weight);
  line-height: var(--type-h3-line);
  color: var(--navy);
}

.lead {
  font-family: var(--font-sans);
  font-size: var(--type-lead-size);
  line-height: var(--type-lead-line);
  color: var(--text-mid);
}

.body {
  font-family: var(--font-sans);
  font-size: var(--type-body-size);
  line-height: var(--type-body-line);
  color: var(--text-mid);
}

.small {
  font-family: var(--font-sans);
  font-size: var(--type-small-size);
  line-height: var(--type-small-line);
  color: var(--text-light);
}

.stat {
  font-family: var(--font-display);
  font-size: var(--type-stat-size);
  font-weight: var(--type-stat-weight);
  color: var(--gold);
  line-height: 1;
}

/* On dark backgrounds */
.on-navy .h1, .on-navy h1,
.on-navy .h2, .on-navy h2,
.on-navy .h3, .on-navy h3 { color: var(--on-navy); }
.on-navy .body, .on-navy p { color: var(--on-navy-secondary); }
.on-navy .small { color: var(--on-navy-tertiary); }

/* ============================================================
   FADE-UP — site's only entry animation
   ============================================================ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp var(--t-slow) var(--ease) both; }


/* ============================================================
   Website UI Kit — Nishioka Gyosei Shoshi Office
   All component styles. Loaded by index.html.
   Token source: ../../colors_and_type.css
   ============================================================ */

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  color: var(--text);
  background: var(--white);
  line-height: 1.7;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }

/* ===== ATOMS ===== */
.nx-eyebrow {
  font-family: var(--font-display);
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.20em; text-transform: uppercase;
  margin-bottom: 12px;
}
.nx-eyebrow--gold { color: var(--gold); }
.nx-eyebrow--white { color: rgba(255,255,255,0.5); }

.nx-section-title {
  font-family: var(--font-serif);
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 20px;
}
.nx-section-title--navy { color: var(--navy); }
.nx-section-title--white { color: #fff; }

.nx-lead {
  font-size: 15px; line-height: 1.85;
  max-width: 600px; margin-bottom: 48px;
}
.nx-lead--mid { color: var(--text-mid); }
.nx-lead--on-navy { color: rgba(255,255,255,0.65); }

/* Buttons */
.nx-btn {
  display: inline-flex; align-items: center; gap: 8px;
  font-weight: 700; font-size: 14px;
  padding: 14px 28px; border-radius: 6px;
  letter-spacing: 0.04em;
  transition: background var(--t-base) var(--ease), border-color var(--t-base) var(--ease), transform var(--t-quick) var(--ease), color var(--t-base) var(--ease);
  cursor: pointer; user-select: none;
  white-space: nowrap;
}
.nx-btn--primary { background: var(--gold); color: var(--navy); border: 1px solid var(--gold); }
.nx-btn--primary:hover { background: var(--gold-light); transform: translateY(-1px); }

.nx-btn--outline { border: 1px solid rgba(255,255,255,0.4); color: #fff; background: transparent; font-weight: 500; }
.nx-btn--outline:hover { border-color: var(--gold); color: var(--gold); }

.nx-btn--header { background: var(--gold); color: var(--navy); font-size: 12px; padding: 8px 16px; border-radius: 4px; letter-spacing: 0.05em; border: 1px solid var(--gold); }
.nx-btn--header:hover { background: var(--gold-light); }

.nx-btn--line { background: var(--line-green); color: #fff; font-weight: 700; font-size: 13px; padding: 10px 20px; border-radius: 5px; border: 1px solid var(--line-green); width: 100%; justify-content: center; }
.nx-btn--phone { background: var(--cream); color: var(--navy); font-size: 18px; font-weight: 700; padding: 10px 20px; border-radius: 5px; border: 1px solid var(--cream); width: 100%; justify-content: center; display: block; text-align: center; }
.nx-btn--phone small { display: block; font-size: 11px; font-weight: 400; color: var(--text-light); margin-top: 2px; letter-spacing: 0; }

.nx-btn--sim { background: var(--gold); color: var(--navy); border: 1px solid var(--gold); padding: 14px 20px; border-radius: 8px; justify-content: center; width: 100%; }
.nx-btn--sim:hover { background: var(--gold-light); transform: translateY(-1px); }

.nx-btn__icon { line-height: 1; }

/* Hero badge */
.nx-hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold-light);
  font-size: 12px; font-weight: 500;
  padding: 6px 14px; border-radius: 20px;
  letter-spacing: 0.08em;
  width: fit-content;
}
.nx-hero-badge::before { content: "●"; font-size: 8px; color: var(--gold); }

/* Police tag */
.nx-police-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--navy);
  color: #fff;
  font-size: 13px; font-weight: 500;
  padding: 8px 14px 8px 12px;
  border-radius: 4px;
  border-left: 3px solid var(--gold);
}
.nx-police-tag__icon { line-height: 1; }

/* Group label */
.nx-group-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.18em;
  display: inline-block;
  padding: 4px 14px; margin-bottom: 20px;
  border-radius: 2px;
}
.nx-group-label--navy { background: var(--navy); color: #fff; }
.nx-group-label--gold { background: var(--gold); color: var(--navy); }

/* Sim chip */
.nx-sim-chip {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.7);
  white-space: nowrap;
}

/* Stat */
.nx-stat__val {
  font-family: var(--font-display);
  font-size: 36px; font-weight: 700;
  color: var(--gold); line-height: 1;
}
.nx-stat__val span { font-size: 16px; }
.nx-stat__label { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }

/* Career item */
.nx-career-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px; }
.nx-career-item__dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); margin-top: 7px; flex-shrink: 0; }
.nx-career-item__text { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.5; }

/* Arrow link */
.nx-arrow-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; transition: color var(--t-base) var(--ease); }
.nx-arrow-link--navy { color: var(--navy); }
.nx-arrow-link--navy:hover { color: var(--gold); }
.nx-arrow-link--gold { color: var(--gold); }

/* ===== HEADER ===== */
.nx-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(13,31,60,0.97);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 64px;
  border-bottom: 1px solid rgba(201,168,76,0.3);
}
.nx-header__brand {
  display: flex; align-items: center; gap: 12px;
  text-decoration: none;
}
.nx-header__mark {
  width: 44px; height: 44px;
  object-fit: contain;
  display: block;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.35));
  flex-shrink: 0;
}
.nx-header__logo {
  font-family: var(--font-serif);
  font-size: 14px; font-weight: 700;
  color: #fff; line-height: 1.3;
  letter-spacing: 0.02em;
}
.nx-header__logo small {
  color: var(--gold); display: block;
  font-size: 10px; font-weight: 400;
  letter-spacing: 0.1em;
  font-family: var(--font-display);
}
.nx-header__nav { display: flex; align-items: center; gap: 18px; }
.nx-header__link { color: rgba(255,255,255,0.7); font-size: 12px; transition: color var(--t-base) var(--ease); }
.nx-header__link:hover { color: var(--gold); }

/* ===== HERO ===== */
.nx-hero {
  min-height: 100vh;
  background: var(--navy);
  position: relative;
  display: flex; flex-direction: column;
  justify-content: center;
  padding: 120px 24px 80px;
  overflow: hidden;
}
.nx-hero__pattern {
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(201,168,76,0.06) 80px),
    repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(201,168,76,0.06) 80px);
  pointer-events: none;
}
.nx-hero__seal {
  position: absolute;
  right: -80px;
  top: 50%;
  transform: translateY(-50%);
  width: clamp(380px, 48vw, 620px);
  height: auto;
  opacity: 0.20;
  pointer-events: none;
  filter: drop-shadow(0 8px 40px rgba(0,0,0,0.4));
  z-index: 0;
}
@media (max-width: 920px) {
  .nx-hero__seal {
    right: -40%;
    width: 600px;
    opacity: 0.14;
  }
}
.nx-hero__inner { position: relative; max-width: 840px; margin: 0 auto; width: 100%; }
.nx-hero__badge { margin-bottom: 28px; }
.nx-hero__display {
  font-family: var(--font-display);
  font-size: clamp(42px, 8vw, 80px);
  font-weight: 700; color: #fff;
  letter-spacing: -0.01em;
  line-height: 1; margin-bottom: 8px;
}
.nx-hero__display span { color: var(--gold); }
.nx-hero__jp {
  font-family: var(--font-serif);
  font-size: clamp(18px, 4vw, 28px);

  color: rgba(255,255,255,0.92);
  margin-bottom: 28px;
  letter-spacing: 0.04em;
}
.nx-hero__copy {
  font-size: clamp(14px, 2.5vw, 17px);

  margin-bottom: 40px;
}
.nx-hero__copy strong { color: var(--gold-light); font-weight: 500; }
.nx-hero__buttons {
  display: flex; flex-wrap: wrap; gap: 12px;
}
.nx-hero__scroll {
  position: absolute; bottom: 32px; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.35);
  font-family: var(--font-display);
  font-size: 11px; letter-spacing: 0.18em;

@keyframes scrollLine { 0%,100% { opacity:1; transform: scaleY(1);} 50% { opacity: 0.4; transform: scaleY(0.6);} }

/* ===== POLICE STRENGTH ===== */
.nx-police {
  background: var(--cream);
  padding: 80px 24px;
}
.nx-police__inner { max-width: 840px; margin: 0 auto; }
.nx-police__tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 48px; }

  background: var(--navy);
  border-radius: 8px;
  padding: 36px 40px;
  position: relative;
  overflow: hidden;
}
.nx-quote::before {
  content: "「";
  position: absolute; top: -10px; left: 20px;
  font-family: var(--font-serif);
  font-size: 100px; color: rgba(201,168,76,0.12);
  line-height: 1;
}
.nx-quote p {
  font-family: var(--font-serif);
  font-size: clamp(15px, 2.5vw, 18px);
  color: #fff; line-height: 1.85;
  position: relative; z-index: 1;
}
.nx-quote__author {
  font-size: 12px; color: var(--gold);
  margin-top: 16px; position: relative; z-index: 1;
  letter-spacing: 0.06em;
}

/* ===== SERVICES ===== */
.nx-services {
  padding: 80px 24px;
  background: var(--white);
}
.nx-services__inner { max-width: 840px; margin: 0 auto; }
.nx-service-group { margin-bottom: 56px; }
.nx-service-group:last-child { margin-bottom: 0; }
.nx-service-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.nx-service-card {
  background: #fff;
  padding: 24px;
  transition: background var(--t-base) var(--ease);
  display: flex; flex-direction: column;
}
.nx-service-card:hover { background: #fafaf8; }
.nx-service-card__icon { font-size: 22px; margin-bottom: 10px; }
.nx-service-card__title {
  font-family: var(--font-serif);
  font-size: 15px; font-weight: 700;
  color: var(--navy); margin-bottom: 6px;
}
.nx-service-card__desc { font-size: 12px; color: var(--text-light); line-height: 1.7; flex: 1; }
.nx-service-card__price { margin-top: 12px; font-size: 13px; font-weight: 700; color: var(--gold); font-family: var(--font-display); letter-spacing: 0.04em; }
.nx-service-card__link {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 10px;
  font-size: 12px; font-weight: 500;
  color: var(--navy-mid);
  border: 1px solid var(--border);
  padding: 5px 12px; border-radius: 4px;
  align-self: flex-start;
  transition: background var(--t-quick) var(--ease), color var(--t-quick) var(--ease), border-color var(--t-quick) var(--ease);
}
.nx-service-card__link:hover { background: var(--navy); color: #fff; border-color: var(--navy); }

/* ===== ABOUT ===== */
.nx-about {
  background: var(--navy);
  padding: 80px 24px;
}
.nx-about__inner {
  max-width: 840px; margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 48px; align-items: start;
}
.nx-about__name-block {
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 8px;
  padding: 20px;
  text-align: center;
}
.nx-about__photo {
  width: 100%; aspect-ratio: 3/4;
  background: rgba(255,255,255,0.06);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 14px;
}
.nx-about__photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.nx-about__name { font-family: var(--font-serif); font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.nx-about__name-en { font-family: var(--font-display); font-size: 11px; color: var(--gold); letter-spacing: 0.14em; }
.nx-about__career { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1); text-align: left; }
.nx-about__heading { font-family: var(--font-serif); font-size: clamp(20px, 3.5vw, 28px); font-weight: 700; color: #fff; line-height: 1.5; margin-bottom: 24px; }
.nx-about__body { font-size: 14px; color: rgba(255,255,255,0.72); line-height: 1.9; margin-bottom: 16px; }
.nx-about__body strong { color: var(--gold-light); font-weight: 500; }
.nx-about__stats { display: flex; gap: 36px; flex-wrap: wrap; margin-top: 32px; padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.1); }

/* ===== REASONS ===== */
.nx-reasons { padding: 80px 24px; background: var(--cream); }
.nx-reasons__inner { max-width: 840px; margin: 0 auto; }
.nx-reasons__grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px; margin-top: 40px;
}
.nx-reason-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 28px 24px;
  position: relative;
}
.nx-reason-card__num {
  font-family: var(--font-display);
  font-size: 48px; font-weight: 700;
  color: rgba(13,31,60,0.07);
  line-height: 1; margin-bottom: 12px;
}
.nx-reason-card__title {
  font-family: var(--font-serif);
  font-size: 16px; font-weight: 700;
  color: var(--navy); margin-bottom: 10px;
  line-height: 1.4;
}
.nx-reason-card__body { font-size: 13px; color: var(--text-mid); line-height: 1.8; }
.nx-reason-card__accent {
  position: absolute; top: 0; left: 0;
  width: 4px; height: 60px; border-radius: 0 0 4px 0;
  background: var(--gold);
}

/* ===== SIMULATOR CTA ===== */
.nx-sim-section { padding: 0 24px 72px; background: var(--cream); }
.nx-sim-card {
  max-width: 840px; margin: 0 auto;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  display: grid; grid-template-columns: 1fr 1fr;
}
.nx-sim__left { background: var(--navy); padding: 36px 32px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
.nx-sim__left::after { content: "¥"; position: absolute; right: -10px; bottom: -28px; font-family: var(--font-display); font-size: 150px; font-weight: 700; color: rgba(201,168,76,0.06); line-height: 1; pointer-events: none; }
.nx-sim__eyebrow { font-family: var(--font-display); font-size: 10px; font-weight: 500; letter-spacing: 0.22em; color: var(--gold); text-transform: uppercase; margin-bottom: 12px; position: relative; z-index: 1; }
.nx-sim__heading { font-family: var(--font-serif); font-size: clamp(18px, 3vw, 24px); font-weight: 700; color: #fff; line-height: 1.45; margin-bottom: 12px; position: relative; z-index: 1; }
.nx-sim__heading em { font-style: normal; color: var(--gold-light); }
.nx-sim__lead { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.75; margin-bottom: 20px; position: relative; z-index: 1; }
.nx-sim__chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; position: relative; z-index: 1; }
.nx-sim__btn-note { font-size: 11px; color: rgba(255,255,255,0.38); text-align: center; margin-top: 10px; position: relative; z-index: 1; }
.nx-sim__right { padding: 28px 24px; background: #f8f9fc; display: flex; flex-direction: column; justify-content: center; }
.nx-sim__right-label { font-family: var(--font-display); font-size: 10px; font-weight: 500; letter-spacing: 0.14em; color: var(--text-light); text-transform: uppercase; margin-bottom: 12px; }
.nx-sim__row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-radius: 7px; background: #fff; border: 1px solid var(--border); margin-bottom: 7px; transition: border-color var(--t-quick) var(--ease), box-shadow var(--t-quick) var(--ease); }
.nx-sim__row:hover { border-color: var(--navy-mid); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.nx-sim__row-left { display: flex; align-items: center; gap: 9px; }
.nx-sim__row-icon { font-size: 15px; flex-shrink: 0; }
.nx-sim__row-name { font-size: 13px; font-weight: 500; color: var(--text); }
.nx-sim__row-price { font-family: var(--font-display); font-size: 13px; color: var(--gold); font-weight: 500; white-space: nowrap; }
.nx-sim__all-link { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 12px; font-size: 12px; font-weight: 500; color: var(--navy); padding: 9px; border-radius: 6px; border: 1px solid var(--border); background: #fff; transition: background var(--t-quick) var(--ease), color var(--t-quick) var(--ease); }
.nx-sim__all-link:hover { background: var(--navy); color: #fff; border-color: var(--navy); }

/* ===== BOOKING (calendar placeholder) ===== */
.nx-calendar-section { padding: 80px 24px; background: var(--navy); }
.nx-calendar__inner { max-width: 840px; margin: 0 auto; }
.nx-calendar__wrap { margin-top: 40px; background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.25); border-radius: 12px; overflow: hidden; padding: 80px 40px; text-align: center; color: rgba(255,255,255,0.5); font-size: 13px; }
.nx-calendar__note { background: rgba(201,168,76,0.08); border-top: 1px solid rgba(201,168,76,0.2); padding: 16px 24px; font-size: 13px; color: rgba(255,255,255,0.6); display: flex; align-items: center; gap: 8px; }

/* ===== CONTACT ===== */
.nx-contact { padding: 80px 24px; background: #fff; }
.nx-contact__inner { max-width: 840px; margin: 0 auto; }
.nx-contact__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
.nx-contact-card { border: 1px solid var(--border); border-radius: 8px; padding: 32px 28px; text-align: center; }
.nx-contact-card--featured { background: var(--navy); border-color: var(--navy); }
.nx-contact-card__icon { font-size: 30px; margin-bottom: 14px; }
.nx-contact-card__title { font-family: var(--font-serif); font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
.nx-contact-card--featured .nx-contact-card__title { color: var(--gold); }
.nx-contact-card__desc { font-size: 13px; color: var(--text-light); line-height: 1.7; margin-bottom: 18px; }
.nx-contact-card--featured .nx-contact-card__desc { color: rgba(255,255,255,0.6); }

/* ===== INFO STRIP ===== */
.nx-info-strip { background: var(--navy); padding: 40px 24px; display: flex; flex-wrap: wrap; gap: 36px; justify-content: center; border-top: 1px solid rgba(255,255,255,0.06); }
.nx-info-item { text-align: center; min-width: 120px; }
.nx-info-item__label { font-family: var(--font-display); font-size: 10px; letter-spacing: 0.14em; color: rgba(255,255,255,0.4); margin-bottom: 4px; text-transform: uppercase; }
.nx-info-item__val { font-size: 14px; color: #fff; font-weight: 500; }

/* ===== FOOTER ===== */
.nx-footer { background: var(--navy-deep); padding: 48px 24px 36px; text-align: center; border-top: 1px solid rgba(201,168,76,0.2); }
.nx-footer__mark { width: 56px; height: 56px; object-fit: contain; margin: 0 auto 14px; display: block; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }
.nx-footer__wordmark { font-family: var(--font-serif); font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.92); line-height: 1.3; letter-spacing: 0.04em; margin-bottom: 18px; }
.nx-footer__wordmark small { display: block; font-family: var(--font-display); font-size: 10px; font-weight: 400; color: var(--gold); letter-spacing: 0.14em; margin-top: 3px; }
.nx-footer p { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.8; }
.nx-footer strong { color: rgba(255,255,255,0.7); }
.nx-footer__links { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin-top: 18px; max-width: 760px; margin-left: auto; margin-right: auto; }
.nx-footer__link { font-size: 11px; color: rgba(255,255,255,0.4); transition: color var(--t-base) var(--ease); }
.nx-footer__link:hover { color: var(--gold); }

/* ===== ANIMATIONS ===== */
@keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

/* ===== RESPONSIVE ===== */
@media (max-width: 720px) {
  .nx-about__inner { grid-template-columns: 1fr; }
  .nx-contact__grid { grid-template-columns: 1fr; }
  .nx-sim-card { grid-template-columns: 1fr; }
  .nx-service-grid { grid-template-columns: 1fr; }
  .nx-hero__scroll { display: none; }
}


/* ============================================================
   POLISH LAYER — visual upgrades on top of the base kit.
   Loaded AFTER kit.css so rules cascade correctly.
   ============================================================ */

/* ===== GLOBAL ===== */
html { scroll-behavior: smooth; }
body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
::selection { background: var(--gold); color: var(--navy); }

/* Section watermark needs the section to be relative; inner content must sit above */
.nx-section { position: relative; overflow: hidden; }
.nx-police__inner, .nx-services__inner, .nx-about__inner,
.nx-reasons__inner, .nx-calendar__inner, .nx-contact__inner,
.nx-sim-section, .nx-sim-card {
  position: relative; z-index: 1;
}

/* Scroll reveal — opt-in via .reveal */
.reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.9s cubic-bezier(.16,.84,.32,1), transform 0.9s cubic-bezier(.16,.84,.32,1); will-change: opacity, transform; }
.reveal.is-visible { opacity: 1; transform: translateY(0); }
.reveal--delay-1 { transition-delay: 0.10s; }
.reveal--delay-2 { transition-delay: 0.20s; }
.reveal--delay-3 { transition-delay: 0.30s; }
.reveal--scale { transform: translateY(28px) scale(0.96); }
.reveal--scale.is-visible { transform: translateY(0) scale(1); }

@media (prefers-reduced-motion: reduce) {
  .reveal, .reveal--scale { opacity: 1; transform: none; transition: none; }
  .nx-hero__seal { animation: none !important; }
}

/* ===== HEADER — slightly more premium ===== */
.nx-header { transition: background var(--t-base) var(--ease), backdrop-filter var(--t-base) var(--ease); }
.nx-header__brand:hover .nx-header__mark { transform: rotate(-6deg) scale(1.08); }
.nx-header__mark { transition: transform 0.4s cubic-bezier(.34,1.56,.64,1); }
.nx-header__logo small { transition: color var(--t-base) var(--ease); }

/* ===== HERO — cinematic ===== */
.nx-hero {
  background: radial-gradient(ellipse at 30% 40%, #1a3260 0%, #0d1f3c 55%, #081425 100%);
}
.nx-hero__seal {
  animation: sealFloat 9s ease-in-out infinite;
  transform-origin: center;
}
@keyframes sealFloat {
  0%, 100% { transform: translateY(-50%) rotate(0deg); }
  50%      { transform: translateY(calc(-50% - 14px)) rotate(2deg); }
}

/* Hero display — add a subtle gold underline */
.nx-hero__display { position: relative; }
.nx-hero__display::after {
  content: "";
  position: absolute; left: 0; bottom: -14px;
  width: 92px; height: 3px;
  background: linear-gradient(90deg, var(--gold), transparent);
  border-radius: 2px;
}

/* Hero meta chip strip */
.nx-hero__meta {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-top: 20px; margin-bottom: 28px;
  position: relative;
}
.nx-hero-chip {
  display: inline-flex; align-items: baseline; gap: 8px;
  font-family: var(--font-display);
  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  padding: 5px 0;
  white-space: nowrap;
}
.nx-hero-chip strong { color: var(--gold); font-weight: 500; font-size: 16px; letter-spacing: 0; }
.nx-hero-chip + .nx-hero-chip { padding-left: 14px; border-left: 1px solid rgba(255,255,255,0.14); }

/* Hero scroll cue — bigger */
.nx-hero__scroll { font-weight: 500; }

/* ===== SECTION OUTERS — corner brackets + number watermark ===== */
.nx-section {
  position: relative;
}
.nx-section__num {
  position: absolute;
  top: 28px; right: 28px;
  font-family: var(--font-display);
  font-size: clamp(80px, 12vw, 180px);
  font-weight: 700;
  line-height: 1;
  color: rgba(13, 31, 60, 0.04);
  letter-spacing: -0.04em;
  pointer-events: none;
  user-select: none;
  z-index: 0;
}
.nx-section--dark .nx-section__num { color: rgba(201, 168, 76, 0.08); }
.nx-section__inner { position: relative; z-index: 1; }

/* Corner brackets — small gold L shapes top-left & bottom-right */
.nx-bracket {
  position: absolute;
  width: 22px; height: 22px;
  pointer-events: none;
  z-index: 1;
}
.nx-bracket--tl { top: 28px; left: 28px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
.nx-bracket--br { bottom: 28px; right: 28px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }
.nx-section--dark .nx-bracket { opacity: 0.6; }

/* ===== POLICE STRENGTH — quote upgrade ===== */
.nx-quote {
  background: linear-gradient(135deg, #0d1f3c 0%, #15294e 50%, #0d1f3c 100%);
  border: 1px solid rgba(201,168,76,0.18);
  padding: 44px 48px 40px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.18), inset 0 0 0 1px rgba(255,255,255,0.02);
}
.nx-quote::before {
  font-size: 200px;
  top: -38px;
  left: 14px;
  color: rgba(201,168,76,0.20);
  transition: transform 1.2s cubic-bezier(.16,.84,.32,1), opacity 1s ease;
  transform-origin: top left;
}
.nx-quote.reveal::before { transform: scale(0.7); opacity: 0; }
.nx-quote.reveal.is-visible::before { transform: scale(1); opacity: 1; }
.nx-quote p { font-size: clamp(16px, 2.5vw, 19px); line-height: 1.9; }
.nx-quote__author {
  display: inline-flex; align-items: center; gap: 10px;
  margin-top: 22px;
  font-family: var(--font-display); font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.nx-quote__author::before {
  content: ""; display: inline-block;
  width: 28px; height: 1px; background: var(--gold);
}

.nx-police-tag {
  padding: 9px 16px 9px 14px;
  font-size: 13px;
  transition: transform var(--t-base) var(--ease), background var(--t-base) var(--ease);
  cursor: default;
}
.nx-police-tag:hover { transform: translateY(-2px); background: var(--navy-mid); }

/* ===== SERVICE CARDS — lift + corner accent ===== */
.nx-service-card {
  position: relative;
  transition: background var(--t-base) var(--ease), transform var(--t-base) var(--ease);
}
.nx-service-card::before {
  content: "";
  position: absolute; top: 0; right: 0;
  width: 0; height: 0;
  border-style: solid;
  border-width: 0 14px 14px 0;
  border-color: transparent var(--gold) transparent transparent;
  opacity: 0;
  transition: opacity 0.25s ease;
}
.nx-service-card:hover::before { opacity: 1; }
.nx-service-card__icon {
  transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
  transform-origin: bottom left;
}
.nx-service-card:hover .nx-service-card__icon { transform: scale(1.18) rotate(-4deg); }
.nx-service-card__price { font-size: 14px; }
.nx-service-card__link { transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, gap 0.18s ease; white-space: nowrap; }
.nx-service-card__link:hover { gap: 9px; }

.nx-service-grid { box-shadow: 0 4px 20px rgba(13,31,60,0.06); }

.nx-group-label {
  position: relative;
  padding: 5px 16px;
}
.nx-group-label::after {
  content: "";
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--gold);
  margin-left: 12px;
  vertical-align: middle;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.3s ease 0.2s;
}
.nx-service-group.is-visible .nx-group-label::after { opacity: 1; }
.nx-group-label--gold::after { background: var(--navy); }

/* ===== ABOUT — circular portrait with gold ring ===== */
.nx-about__name-block {
  background: linear-gradient(180deg, rgba(201,168,76,0.14), rgba(201,168,76,0.05));
  border: 1px solid rgba(201,168,76,0.32);
  padding: 28px 22px 22px;
  position: relative;
}
.nx-about__name-block::before {
  content: "";
  position: absolute;
  top: 14px; left: 14px;
  width: 18px; height: 18px;
  border-top: 1px solid var(--gold);
  border-left: 1px solid var(--gold);
  opacity: 0.7;
}
.nx-about__name-block::after {
  content: "";
  position: absolute;
  bottom: 14px; right: 14px;
  width: 18px; height: 18px;
  border-bottom: 1px solid var(--gold);
  border-right: 1px solid var(--gold);
  opacity: 0.7;
}
.nx-about__photo {
  width: 160px; height: 160px; aspect-ratio: unset;
  border-radius: 50%;
  margin: 0 auto 18px;
  position: relative;
  border: 3px solid var(--gold);
  box-shadow: 0 0 0 6px rgba(201,168,76,0.12), 0 10px 30px rgba(0,0,0,0.35);
  background: var(--cream);
  overflow: visible;
}
.nx-about__photo img {
  border-radius: 50%;
  object-position: center 18%;
}
.nx-about__photo::after { display: none; }
.nx-about__photo img.nx-about__photo-badge {
  position: absolute;
  bottom: -8px; right: -10px;
  width: 56px; height: 56px;
  padding: 8px;
  background: var(--navy);
  border-radius: 50%;
  border: 2px solid var(--gold);
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.5));
  object-fit: contain;
  object-position: center;
  display: block;
  box-sizing: border-box;
}
.nx-about__name { font-size: 19px; margin-top: 4px; }
.nx-about__name-en { letter-spacing: 0.18em; }

/* Stats — bigger, dramatic, animated */
.nx-stat__val { font-size: 48px; }
.nx-stat__val span { font-size: 20px; margin-left: 2px; color: rgba(201,168,76,0.7); }
.nx-stat__label { font-family: var(--font-display); letter-spacing: 0.12em; text-transform: uppercase; font-size: 10px; color: rgba(255,255,255,0.55); margin-top: 6px; white-space: nowrap; }
.nx-stat {
  position: relative;
  padding-left: 18px;
}
.nx-stat::before {
  content: "";
  position: absolute;
  left: 0; top: 4px; bottom: 12px;
  width: 2px;
  background: linear-gradient(180deg, var(--gold), rgba(201,168,76,0.1));
}

/* ===== REASONS — connecting gold line + bigger ghost numbers ===== */
.nx-reasons__grid { position: relative; }
.nx-reason-card {

.nx-footer { padding-top: 56px; padding-bottom: 40px; position: relative; overflow: hidden; }
.nx-footer::before {

.nx-fab {

.nx-fab.is-visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

  <script>
/* enhance.js — vanilla JS run after React mounts.
   Handles: scroll-reveal observer, stat counter animation, sticky FAB.
*/
(function () {
  // Defer until DOM has the rendered components
  const start = () => {
    /* ---------- Scroll reveal ---------- */
    const revealEls = document.querySelectorAll('.reveal');
    if ('IntersectionObserver' in window && revealEls.length) {
      const io = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            e.target.classList.add('is-visible');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
      revealEls.forEach((el) => io.observe(el));

      // Fallback: any reveal still hidden after 1.5s gets force-shown.
      // Catches edge cases where the observer doesn't fire (iframe contexts, etc).
      setTimeout(() => {
        document.querySelectorAll('.reveal:not(.is-visible)').forEach((el) => {
          const r = el.getBoundingClientRect();
          if (r.top < window.innerHeight && r.bottom > 0) {
            el.classList.add('is-visible');
          }
        });
      }, 1500);
    } else {
      revealEls.forEach((el) => el.classList.add('is-visible'));
    }

    /* ---------- Service-group "is-visible" hook (for group label dot) ---------- */
    document.querySelectorAll('.nx-service-group').forEach((g) => {
      if ('IntersectionObserver' in window) {
        const io = new IntersectionObserver((entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) { e.target.classList.add('is-visible'); io.unobserve(e.target); }
          });
        }, { threshold: 0.25 });
        io.observe(g);
      } else { g.classList.add('is-visible'); }
    });

    /* ---------- Counter animation ---------- */
    const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
    document.querySelectorAll('[data-count]').forEach((el) => {
      const target = parseInt(el.dataset.count, 10);
      if (Number.isNaN(target)) return;
      el.textContent = '0';
      const run = () => {
        const dur = 1200;
        const t0 = performance.now();
        const tick = (now) => {
          const t = Math.min(1, (now - t0) / dur);
          const v = Math.round(target * easeOutCubic(t));
          el.textContent = v.toLocaleString();
          if (t < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      };
      if ('IntersectionObserver' in window) {
        const io = new IntersectionObserver((entries) => {
          entries.forEach((e) => { if (e.isIntersecting) { run(); io.unobserve(e.target); } });
        }, { threshold: 0.5 });
        io.observe(el);
      } else { run(); }
    });

    /* ---------- Sticky LINE FAB after hero ---------- */
    const fab = document.querySelector('.nx-fab');
    const hero = document.querySelector('.nx-hero');
    if (fab && hero) {
      const onScroll = () => {
        const passed = hero.getBoundingClientRect().bottom < 80;
        fab.classList.toggle('is-visible', passed);
      };
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    }

    /* ---------- Parallax-ish seal drift on scroll ---------- */
    const seal = document.querySelector('.nx-hero__seal');
    if (seal && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      let raf = null;
      const onScroll = () => {
        if (raf) return;
        raf = requestAnimationFrame(() => {
          const y = window.scrollY;
          const max = window.innerHeight;
          const t = Math.min(1, y / max);
          seal.style.setProperty('--scroll-shift', `${t * 80}px`);
          // Drift via translateY + the keyframe still runs on top
          seal.style.transformOrigin = 'center';
          raf = null;
        });
      };
      window.addEventListener('scroll', onScroll, { passive: true });
    }

    /* ---------- GA4: custom event tracking ----------
       Sends events to gtag if available. Safe no-op if GA isn't loaded.
    */
    const track = (name, params = {}) => {
      if (typeof window.gtag === 'function') {
        window.gtag('event', name, params);
      }
    };

    // LINE buttons (anywhere on page — header CTA, hero, contact card, FAB)
    document.querySelectorAll('a[href*="lin.ee"], .nx-btn--line, .nx-fab').forEach((el) => {
      el.addEventListener('click', () => {
        track('cta_click', {
          cta_type: 'line',
          cta_location: el.closest('.nx-hero') ? 'hero'
            : el.closest('.nx-header') ? 'header'
            : el.closest('.nx-contact') ? 'contact'
            : el.classList.contains('nx-fab') ? 'fab'
            : 'other',
        });
      });
    });

    // Phone tap
    document.querySelectorAll('a[href^="tel:"]').forEach((el) => {
      el.addEventListener('click', () => {
        track('cta_click', { cta_type: 'phone', cta_location: 'contact' });
      });
    });

    // Service card "詳しく見る" link
    document.querySelectorAll('.nx-service-card__link').forEach((el) => {
      el.addEventListener('click', () => {
        const title = el.closest('.nx-service-card')?.querySelector('.nx-service-card__title')?.textContent?.trim() || 'unknown';
        track('service_click', { service_name: title });
      });
    });

    // Simulator CTA
    document.querySelectorAll('.nx-btn--sim, .nx-sim__all-link').forEach((el) => {
      el.addEventListener('click', () => {
        track('cta_click', { cta_type: 'simulator', cta_location: 'sim_card' });
      });
    });

    // Simulator row (a specific service price clicked)
    document.querySelectorAll('.nx-sim__row').forEach((el) => {
      el.addEventListener('click', () => {
        const name = el.querySelector('.nx-sim__row-name')?.textContent?.trim() || 'unknown';
        track('simulator_row_click', { service_name: name });
      });
    });

    // Hero "サービスを見る →"
    document.querySelectorAll('.nx-hero__buttons a').forEach((el) => {
      el.addEventListener('click', () => {
        track('hero_cta_click', { label: el.textContent.trim().slice(0, 40) });
      });
    });

    /* ---------- Scroll depth milestones ---------- */
    const milestones = [25, 50, 75, 100];
    const seen = new Set();
    const onDepth = () => {
      const doc = document.documentElement;
      const scrolled = window.scrollY + window.innerHeight;
      const total = doc.scrollHeight;
      const pct = Math.round((scrolled / total) * 100);
      milestones.forEach((m) => {
        if (pct >= m && !seen.has(m)) {
          seen.add(m);
          track('scroll_depth', { percent: m });
        }
      });
    };
    window.addEventListener('scroll', onDepth, { passive: true });

    /* ---------- Section view tracking ---------- */
    if ('IntersectionObserver' in window) {
      const sectionIO = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            const label = e.target.getAttribute('data-screen-label') || e.target.className;
            track('section_view', { section: label });
            sectionIO.unobserve(e.target);
          }
        });
      }, { threshold: 0.4 });
      document.querySelectorAll('[data-screen-label]').forEach((s) => sectionIO.observe(s));
    }
  };

  // Wait for React (Babel-standalone) to finish mounting — poll until reveals exist.
  const tryStart = (attempts = 0) => {
    const has = document.querySelectorAll('.reveal').length > 0;
    if (has) { start(); return; }
    if (attempts > 50) { start(); return; }   // give up after ~5s
    setTimeout(() => tryStart(attempts + 1), 100);
  };
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => tryStart());
  } else {
    tryStart();
  }
})();

</script>

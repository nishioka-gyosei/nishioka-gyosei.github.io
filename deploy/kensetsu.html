<body>

  <script type="text/babel" src="atoms.jsx"></script>

  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="lp-sections.jsx"></script>
  <script type="text/babel">
    const App = () => (
      <React.Fragment>
        <Header />
        <LPHero
          category="BUSINESS PERMIT · 建設業許可"
          breadcrumb="建設業許可"
          icon="🏗️"
          title={<>広島の建設業許可、<br/>5要件チェックから申請まで一括で。</>}
          lead={<>建設業の許可は、<strong>29業種</strong>から該当する業種を選び、<strong>5つの要件</strong>（経管・専技・誠実性・財産的基礎・欠格事由）すべてを満たす必要があります。新規取得・更新・業種追加・決算変更届まで、すべて代行します。</>}
          meta={[
            { label: '料金', value: '要見積もり' },
            { label: '対応エリア', value: '広島県全域' },
            { label: '標準処理（知事）', value: '約30', unit: '日' },
            { label: '初回相談', value: '0', unit: '円' },
          ]}
        />

        <LPSection num="01" tone="cream" screenLabel="02 What">
          <Eyebrow>WHAT IS</Eyebrow>
          <SectionTitle>「建設業許可」とは何か。</SectionTitle>
          <Lead>
            <strong>建設業法</strong>にもとづき、<strong>500万円以上の工事（建築一式は1,500万円以上）</strong>を請け負う建設業者に必要な許可です。許可は29業種に分類され、業種ごとに取得します。
          </Lead>
          <InfoCardGrid items={[
            { icon: '📊', title: '一般 vs 特定', body: '元請として4,500万円以上の下請契約をするなら「特定」、それ未満は「一般」。下請専業なら一般のみで足ります。' },
            { icon: '🗾', title: '知事 vs 大臣', body: '営業所が1都道府県内のみなら「知事許可」、複数都道府県にまたがるなら「大臣許可」。広島県内のみなら知事許可。' },
            { icon: '⏱️', title: '標準処理期間', body: '知事許可で約30日、大臣許可で約120日。許可後は5年ごとの更新が必要です。' },
            { icon: '⚠️', title: '無許可営業は罰則', body: '3年以下の懲役または300万円以下の罰金。元請業者からの要請で許可取得が必要になるケースも増えています。' },
          ]} />
        </LPSection>

        <LPSection num="02" tone="white" screenLabel="03 Who">
          <Eyebrow>WHO NEEDS IT</Eyebrow>
          <SectionTitle>許可が必要なケース</SectionTitle>
          <Lead>500万円未満の小規模工事だけなら許可不要ですが、以下のような状況では取得が事実上必須です。</Lead>
          <InfoCardGrid items={[
            { icon: '💰', title: '500万円以上の工事を請けたい', body: '1件あたり500万円以上（税込）の工事を請け負うには必須。建築一式は1,500万円以上。' },
            { icon: '🤝', title: '元請から要請されている',     body: 'ゼネコン・公共工事の元請から「許可業者でないと発注できない」と言われるケース。' },
            { icon: '🏛️', title: '公共工事に入札したい',       body: '経営事項審査（経審）の前提として建設業許可が必須。入札参加には許可+経審+入札参加資格申請が必要。' },
            { icon: '📈', title: '事業を法人化・拡大したい',   body: '個人から法人へ、または事業を大きくするタイミングでの取得が一般的。融資審査でも有利。' },
          ]} />
        </LPSection>

        <LPSection num="03" tone="cream" screenLabel="04 Requirements">
          <Eyebrow>REQUIREMENTS</Eyebrow>
          <SectionTitle>建設業許可の5要件</SectionTitle>
          <Lead>以下の5つすべてを満たさないと許可は取得できません。<strong>事前のチェックが極めて重要</strong>です。</Lead>
          <InfoCardGrid items={[
            { icon: '👔', title: '① 経営業務の管理責任者', body: '建設業の経営経験5年以上の役員等が必要。法人なら常勤役員、個人なら本人または支配人。' },
            { icon: '🛠️', title: '② 専任技術者',           body: '取得したい業種の国家資格保有者、または10年以上の実務経験者を営業所ごとに専任配置。' },
            { icon: '🤝', title: '③ 誠実性',               body: '請負契約に関して不正・不誠実な行為をする恐れが明らかでないこと。' },
            { icon: '💰', title: '④ 財産的基礎',           body: '自己資本500万円以上、または500万円以上の融資能力（残高証明書）。' },
            { icon: '🚫', title: '⑤ 欠格事由がないこと',   body: '過去5年以内の禁錮以上の刑、暴力団員、許可取消し処分から5年未満 等に該当しないこと。' },
          ]} />
          <CTABand
            title="自社の状況で許可が取れるか、無料診断します。"
            sub="経管・専技の経験年数の数え方、必要書類の揃え方——お電話で状況をお伺いすれば、その場で可能性を判定できます。"
          />
        </LPSection>

        <LPSection num="04" tone="navy" screenLabel="05 Why">
          <Eyebrow>WHY EX-OFFICER</Eyebrow>
          <SectionTitle tone="white">広島県警察 13年の経験は、<br/>建設業許可にも活きます。</SectionTitle>
          <Lead tone="on-navy">
            建設業者の方は<strong>道路使用許可</strong>（警察）と<strong>建設業許可</strong>（県）の両方が必要な現場が多くあります。警察窓口と県窓口、両方の感覚をもつ私だからこそ、案件の組み立てがスムーズです。
          </Lead>
          <QuoteBlock author="代表行政書士 西岡祐也（元広島県警察官）">
            建設業の現場では、道路使用許可と建設業許可をセットで取らないと工事が始められないケースが多くあります。私は警察にも県にも顔がきく行政書士として、両方を並行して進められます。これが「元警察官行政書士」の本当の強みです。
          </QuoteBlock>
        </LPSection>

        <LPSection num="05" tone="cream" screenLabel="06 Process">
          <Eyebrow>PROCESS</Eyebrow>
          <SectionTitle>ご依頼から許可取得まで、<br/>約2ヶ月（知事許可）。</SectionTitle>
          <ProcessSteps steps={[
            { title: 'LINE / 電話でご相談', desc: <>会社の状況・経管/専技の候補者・取得したい業種をお伺いします。<strong>初回相談は無料</strong>。</>, duration: '当日〜翌営業日' },
            { title: '5要件の事前審査・お見積もり', desc: '経管/専技の経験を裏付け可能か、財産的基礎は満たすか、必要書類を確認。問題なければ正式お見積もり。', duration: '3〜5日' },
            { title: '裏付け書類の収集', desc: <>住民票・身分証明書・登記事項証明書・<strong>確定申告書（5〜10年分）</strong>・健康保険被保険者証 等。経管/専技の経験を証明する書類が要となります。</>, duration: '14〜21日' },
            { title: '申請書類の作成', desc: '建設業許可申請書（様式第一号〜十四号）、財務諸表、誓約書、営業所案内図 等、多数の様式を作成します。', duration: '7〜10日' },
            { title: '広島県への申請', desc: '広島県土木建築局建設産業課（東館3階）へ申請書を提出。手数料 90,000円（広島県収入証紙）が必要です。', duration: '即日' },
            { title: '審査・許可', desc: <>標準処理期間は<strong>約30日（知事許可）</strong>。許可通知書が届いた日から営業可能。許可番号が発行され、5年間有効です。</>, duration: '申請から約30日' },
          ]} />
        </LPSection>

        <LPSection num="06" tone="white" id="pricing" screenLabel="07 Pricing">
          <Eyebrow>PRICING</Eyebrow>
          <SectionTitle>料金プラン</SectionTitle>
          <Lead>個人/法人・業種数・経管/専技の証明難易度によって料金が変動するため、<strong>お見積もり制</strong>です。</Lead>
          <PricingTable
            heading="建設業許可（知事・新規）一括代行プラン"
            price="要見積もり"
            priceNote=""
            rows={[
              { label: '5要件の事前審査', val: '含む' },
              { label: '許可申請書（全様式）の作成', val: '含む' },
              { label: '財務諸表の建設業会計への組替', val: '含む' },
              { label: '添付書類の取得代行', val: '実費別' },
              { label: '広島県への申請代行', val: '含む' },
              { label: '広島県収入証紙（手数料）', val: '90,000円（実費）' },
              { label: '更新・業種追加・決算変更届', val: '別途お見積もり' },
            ]}
            note="※ 概算は料金シミュレーターでご確認いただけます（15万円〜）。経管・専技の経験裏付けが難しいケース・複数業種同時取得・大臣許可は別途お見積もりです。"
          />
        </LPSection>

        <LPSection num="07" tone="cream" screenLabel="08 FAQ">
          <Eyebrow>FAQ</Eyebrow>
          <SectionTitle>よくあるご質問</SectionTitle>
          <FAQ items={[
            {
              q: '一人親方ですが、許可は取れますか？',
              a: 'はい、可能です。個人事業主でも、経管要件・専技要件・財産的基礎を満たせば取得できます。むしろ元請からの信頼が高まり、受注の幅が広がります。',
            },
            {
              q: '経管の5年経験は、自社での経験が必要ですか？',
              a: '他社で建設業の役員・個人事業主だった経験も認められます。前職の登記事項証明書や確定申告書で証明します。経験年数の数え方には独特のルールがあるので、まずはご相談ください。',
            },
            {
              q: '資格がありません。専任技術者になれますか？',
              a: '取得したい業種について10年以上の実務経験があれば専任技術者になれます。経験を証明する書類（注文書・請求書・工事台帳等）の用意が必要です。資格保有なら経験不要で即時就任可能です。',
            },
            {
              q: '500万円の自己資本がありません。何か方法はありますか？',
              a: '金融機関の残高証明書（500万円以上、申請日前1ヶ月以内のもの）で代替できます。一時的に資金を集めて証明書を取得すれば要件を満たせます。',
            },
            {
              q: '更新を忘れてしまったらどうなりますか？',
              a: '許可は失効します。再取得には新規申請と同じ手続きが必要で、5要件の証明も最初からやり直しです。更新は満了日の30日前までに申請が必要。私からも更新時期をお知らせします。',
            },
            {
              q: '道路使用許可とセットで頼めますか？',
              a: 'もちろんです。建設業者向けにセット割引もご用意しています。LP「道路使用・占用許可」もあわせてご覧ください。',
            },
          ]} />
        </LPSection>

        <LPSection num="08" tone="white" screenLabel="09 Related">
          <Eyebrow>RELATED</Eyebrow>
          <SectionTitle>関連サービス</SectionTitle>
          <Lead>建設業のお客様にあわせてご依頼いただくケースが多いサービスです。</Lead>
          <RelatedLPs items={[
            { icon: '🚗', title: '道路使用・占用許可', price: '要見積もり', href: 'douroshiyou.html' },
            { icon: '🏢', title: '会社設立',           price: '150,000円〜', href: 'kaisha-setsuritsu.html' },
            { icon: '💰', title: '創業融資サポート',   price: '55,000円〜+成功報酬', href: 'sogyo-yushi.html' },
            { icon: '♻️', title: '古物商許可',         price: '60,000円〜', href: 'kobutu.html' },
          ]} />
        </LPSection>

        <Contact />
        <InfoStrip />
        <Footer />
        <FloatingLineCTA />
      </React.Fragment>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
